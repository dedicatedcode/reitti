<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{settings.title}">Settings - Reitti</title>
    <link rel="icon" th:href="@{/img/logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/logo.svg}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/lineicons.css}">
    <script th:src="@{/js/messages.js(v=${appVersion})}"></script>
    <script th:src="@{/js/vendor/htmx.min.js}"></script>
    <script th:src="@{/js/util.js}"></script>
</head>
<body class="settings-page">
<div class="navigation-container" th:replace="~{fragments/main-navigation :: main-navigation('settings')}"></div>
<div class="settings-container">
    <div th:replace="~{fragments/settings-navigation :: settings-nav(${activeSection}, ${dataManagementEnabled}, ${isAdmin})}"></div>
    <div class="settings-content-area">
        <div id="job-status" class="settings-section active">
            <div th:fragment="queue-stats-content">
                <h2 th:text="#{jobs.title}">Job Status</h2>

                    <div class="jobs-section settings-card">
                        <h3 th:text="#{jobs.pending.title}">Pending &amp; Running Jobs</h3>
                        <div th:if="${#lists.isEmpty(pendingJobs)}">
                            <p th:text="#{jobs.pending.empty}">No pending or running jobs.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(pendingJobs)}">
                            <table>
                                <thead>
                                <tr>
                                    <th th:text="#{jobs.table.name}">Name</th>
                                    <th th:text="#{jobs.table.description}">Description</th>
                                    <th th:text="#{jobs.table.state}">State</th>
                                    <th th:text="#{jobs.table.enqueuedAt}">Enqueued At</th>
                                    <th th:text="#{jobs.table.scheduledAt}">Scheduled At</th>
                                    <th th:text="#{jobs.table.actions}">Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="job : ${pendingJobs}">
                                    <td th:text="${job.name()}"></td>
                                    <td th:text="${job.description()}"></td>
                                    <td>
                                        <span class="job-state" th:classappend="${'job-state-' + #strings.toLowerCase(job.state())}">
                                            <i th:class="${'lnr ' + (job.state().name() == 'COMPLETED' ? 'lnr-checkmark-circle' : job.state().name() == 'FAILED' ? 'lnr-cross-circle' : job.state().name() == 'RUNNING' ? 'lnr-sync' : job.state().name() == 'AWAITING' ? 'lnr-clock' : 'lnr-question-circle')}"></i>
                                            <span th:text="${job.state()}">STATE</span>
                                        </span>
                                    </td>
                                    <td th:text="${job.enqueuedAt() != null ? #temporals.format(job.enqueuedAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                                    <td th:text="${job.scheduledAt() != null ? #temporals.format(job.scheduledAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                                    <td>
                                        <button th:if="${job.canCancel()}"
                                                class="btn btn-danger"
                                                th:attr="hx-delete=@{/api/v1/queue-stats/{id}(id=${job.id()})}"
                                                hx-target="#job-status"
                                                hx-swap="innerHTML"
                                                th:text="#{form.cancel}">Cancel</button>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Past Jobs -->
                    <div class="jobs-section settings-card">
                        <h3 th:text="#{jobs.past.title}">Past Jobs</h3>
                        <div th:if="${#lists.isEmpty(pastJobs)}">
                            <p th:text="#{jobs.past.empty}">No past jobs available.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(pastJobs)}">
                            <table>
                                <thead>
                                <tr>
                                    <th th:text="#{jobs.table.id}">ID</th>
                                    <th th:text="#{jobs.table.name}">Name</th>
                                    <th th:text="#{jobs.table.description}">Description</th>
                                    <th th:text="#{jobs.table.state}">State</th>
                                    <th th:text="#{jobs.table.enqueuedAt}">Enqueued At</th>
                                    <th th:text="#{jobs.table.finishedAt}">Finished At</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="job : ${pastJobs}">
                                    <td th:text="${job.id()}"></td>
                                    <td th:text="${job.name()}"></td>
                                    <td th:text="${job.description()}"></td>
                                    <td>
                                        <span class="job-state" th:classappend="${'job-state-' + #strings.toLowerCase(job.state())}">
                                            <i th:class="${'lnr ' + (job.state().name() == 'COMPLETED' ? 'lnr-checkmark-circle' : job.state().name() == 'FAILED' ? 'lnr-cross-circle' : job.state().name() == 'RUNNING' ? 'lnr-sync' : job.state().name() == 'AWAITING' ? 'lnr-clock' : 'lnr-question-circle')}"></i>
                                            <span th:text="${job.state()}">STATE</span>
                                        </span>
                                    </td>
                                    <td th:text="${job.enqueuedAt() != null ? #temporals.format(job.enqueuedAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                                    <td th:text="${job.finishedAt() != null ? #temporals.format(job.finishedAt(), 'yyyy-MM-dd HH:mm:ss') : '-'}"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                <div style="margin-top: 20px;">
                    <button class="btn"
                            hx-trigger="click, every 5s"
                            th:hx-get="@{/settings/queue-stats-content}"
                            hx-target="#job-status"
                            hx-swap="innerHTML"
                            th:text="#{jobs.refresh}">Refresh Status</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
<script th:inline="javascript">
    window.userSettings = /*[[${userSettings}]]*/ {}
</script>
</html>
