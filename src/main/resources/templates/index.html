<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">Reitti - Your Location Timeline</title>
    <link rel="icon" th:href="@{/img/logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/logo.svg}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/leaflet.css}" href="/css/leaflet.css">
    <link rel="stylesheet" th:href="@{/css/date-picker.css}" href="/css/date-picker.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/lineicons.css}" href="/css/lineicons.css">
    <link rel="stylesheet" th:href="@{/css/photo-client.css}" href="/css/photo-client.css">
    <link rel="stylesheet" th:href="@{/css/inline-edit.css}" href="/css/inline-edit.css">
    <link rel="stylesheet" th:href="@{/css/avatar-marker.css}" href="/css/avatar-marker.css">
    <link rel="stylesheet" th:href="@{/css/maplibre-gl.5.16.0.min.css}" href="/css/maplibre-gl.5.16.0.min.css">
    <link th:if="${userSettings.customCssUrl}" rel="stylesheet" th:href="${userSettings.customCssUrl}">
    <script th:src="@{/js/HumanizeDuration.js}"></script>
    <script th:src="@{/js/date-picker-combined.js}"></script>
    <script th:src="@{/js/timeline-scroll-indicator.js}"></script>
    <script th:src="@{/js/photo-client.js}"></script>
    <script th:src="@{/js/vendor/htmx.min.js}"></script>
    <script th:src="@{/js/polygon-editor.js}"></script>
    <script th:src="@{/js/util.js}"></script>
    <script th:src="@{/js/vendor/deckgl.9.2.5.min.js}"></script>
    <script th:src="@{/js/vendor/maplibre-gl.5.16.0.min.js}"></script>
    <script th:src="@{/js/vendor/supercluster.7.0.0.min.js}"></script>
    <script th:src="@{/js/timeline-control.js}"></script>
    <style>
        #timeline-controls {
            position: absolute;
            bottom: 170px;
            color: var( --color-highlight);
            display: block;
            background: #3b3b3ba6;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
            font-family: var(--serif-font);
        }

        #timeline-controls.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-10px);
            pointer-events: none;
        }

        .timer-display {
            text-align: center;
        }

        #current-date {
            display: block;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #time-slider {
            flex-grow: 1;
            cursor: pointer;
        }

        .time-bounds {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            align-self: end;
        }

        #loading-overlay {
            opacity: 0;
            position: absolute;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        #progress-bar {
            width: 0;
            height: 100%;
            background: var(--color-highlight);
            transition: width 0.2s ease-out;
        }

        #status-text {
            text-align: right;
            font-size: 0.8rem;
            font-family: sans-serif;
            color: var(--color-background-dark-light);
            text-shadow: 0 0 2px var(--color-highlight);
            padding-right: 180px;
        }

        #tooltip::-webkit-scrollbar {
            width: 4px;
        }
        #tooltip::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 2px;
        }
        #tooltip {
            /* Ensure the tooltip doesn't stay open if the mouse moves too fast */
            pointer-events: auto; /* Changed to auto so user can scroll the list */
            transition: opacity 0.1s ease-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .today-fab i {
            font-size: 1rem;
        }

        /* FAB Container Styles */
        .fab-container {
            position: fixed;
            bottom: 117px;
            left: 50%;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--color-background-dark-light);
            color: var(--color-highlight);
            border: 1px solid var(--color-highlight);
            padding: 0;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        body.datepicker-hidden .fab-container {
            bottom: 20px;
        }

        .fab-btn {
            height: 40px;
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-background-dark-light);
            color: var(--color-highlight);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            padding: 0;
        }

        .fab-btn:first-child {
            border-top-left-radius: 24px;
            border-bottom-left-radius: 24px;
        }

        .fab-btn:last-child {
            border-top-right-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .fab-btn.active,
        .fab-btn:hover {
            background: var(--color-highlight);
            color: var(--color-background-dark);
            box-shadow: 0 6px 16px rgba(245, 222, 179, 0.4);
        }

        /* Play button section with hover-triggered speed control */
        .play-section {
            position: relative;
            display: flex;
            align-items: center;
        }

        .speed-control {
            opacity: 0;
            visibility: hidden;
            transition: all .3s ease;
            border-radius: 8px;
            width: 0;
            white-space: nowrap;
            pointer-events: none; /* Add this to prevent interference */
        }

        .play-section:hover .speed-control {
            opacity: 1;
            visibility: visible;
            width: 120px;
            margin: 0 4px;
            pointer-events: auto; /* Re-enable pointer events when visible */
        }

        .speed-control select {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Today button specific styles */
        .today-btn {
            background: var(--color-background-dark-light);
            min-width: 40px;
            padding: 0 12px;
        }

        .today-btn span {
            margin-left: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Expanded state when today button is visible */
        .fab-container.has-today {
            padding: 8px 12px;
            gap: 12px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .fab-container {
                bottom: 15px;
                right: 15px;
                padding: 6px 10px;
            }

            .fab-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            .speed-control {
                left: 46px;
            }

            .today-btn span {
                display: none; /* Hide text on small screens */
            }
        }

        .settings-menu {
            position: fixed;
            bottom: 180px; /* Above the FAB container */
            right: 20px;
            width: 300px;
            max-height: 400px;
            background: var(--color-background-dark);
            color: var(--color-text-white);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .settings-menu.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .settings-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--color-background-dark);
            color: var(--color-text-white);
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid #eee;
        }

        .settings-menu-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            padding-left: 8px;
        }

        .close-settings-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .close-settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-menu-content {
            padding: 16px;
            max-height: 320px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .settings-action-btn {
            background: var(--color-highlight);
            color: var(--color-text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .settings-action-btn:hover {
            background: #45a049;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.visible {
            opacity: 1;
        }

        .settings-menu-content .divider {
            font-size: 1rem;
            margin: 0;
            margin-bottom: 8px;
        }

        /* Responsive adjustments for settings menu */
        @media (max-width: 768px) {
            .settings-menu {
                right: 10px;
                left: 10px;
                width: auto;
                bottom: 160px;
                max-height: 60vh;
            }

            .settings-menu-header {
                padding: 12px 16px;
            }

            .settings-menu-content {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div id="deck-controls" style="position: fixed; top: 50px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; z-index: 10000; width: 250px; font-family: sans-serif; font-size: 12px;">
    <h4 style="margin: 0 0 10px 0; text-align: center;">Deck.gl Parameters</h4>

    <!-- Tab Navigation -->
    <div style="display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap;">
        <button class="tab-btn active" data-tab="trips"
                style="flex: 1; padding: 5px; background: #444; border: none; color: white; cursor: pointer; border-radius: 3px;">
            Trips
        </button>
        <button class="tab-btn" data-tab="visits"
                style="flex: 1; padding: 5px; background: #444; border: none; color: white; cursor: pointer; border-radius: 3px;">
            Visits
        </button>
        <button class="tab-btn" data-tab="paths"
                style="flex: 1; padding: 5px; background: #444; border: none; color: white; cursor: pointer; border-radius: 3px;">
            Paths
        </button>
        <button class="tab-btn" data-tab="bundled"
                style="flex: 1; padding: 5px; background: #444; border: none; color: white; cursor: pointer; border-radius: 3px;">
            Bundled
        </button>
        <button class="tab-btn" data-tab="heatmap"
                style="flex: 1; padding: 5px; background: #444; border: none; color: white; cursor: pointer; border-radius: 3px;">
            Heatmap
        </button>
    </div>

    <!-- Trips Tab -->
    <div id="tab-trips" class="tab-content" style="display: block;">
        <div style="margin-bottom: 10px;">
            <label for="trail-length">Trail Length (seconds):</label>
            <input type="range" id="trail-length" min="100" max="10000" value="1800" step="100" style="width: 100%;">
            <span id="trail-length-value">1800</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="comet-width">Comet Width (pixels):</label>
            <input type="range" id="comet-width" min="1" max="20" value="8" step="1" style="width: 100%;">
            <span id="comet-width-value">8</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="comet-opacity">Comet Opacity (0-255):</label>
            <input type="range" id="comet-opacity" min="0" max="255" value="255" step="5" style="width: 100%;">
            <span id="comet-opacity-value">255</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="shadow-width">Shadow Width (pixels):</label>
            <input type="range" id="shadow-width" min="1" max="20" value="6" step="1" style="width: 100%;">
            <span id="shadow-width-value">6</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="shadow-opacity">Shadow Opacity (0-255):</label>
            <input type="range" id="shadow-opacity" min="0" max="255" value="51" step="5" style="width: 100%;">
            <span id="shadow-opacity-value">51</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="shadow-offset-x">Shadow Offset X:</label>
            <input type="range" id="shadow-offset-x" min="-0.001" max="0.001" value="0.00005" step="0.00001"
                   style="width: 100%;">
            <span id="shadow-offset-x-value">0.00005</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="shadow-offset-y">Shadow Offset Y:</label>
            <input type="range" id="shadow-offset-y" min="-0.001" max="0.001" value="-0.00005" step="0.00001"
                   style="width: 100%;">
            <span id="shadow-offset-y-value">-0.00005</span>
        </div>
    </div>

    <!-- Visits Tab -->
    <div id="tab-visits" class="tab-content" style="display: none;">
        <div style="margin-bottom: 10px;">
            <label for="visit-radius">Visit Radius (pixels):</label>
            <input type="range" id="visit-radius" min="5" max="50" value="50" step="1" style="width: 100%;">
            <span id="visit-radius-value">50</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="visit-opacity">Visit Opacity (0-255):</label>
            <input type="range" id="visit-opacity" min="0" max="255" value="140" step="1" style="width: 100%;">
            <span id="visit-opacity-value">140</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="visit-polygon-opacity">Polygon Opacity (0-255):</label>
            <input type="range" id="visit-polygon-opacity" min="0" max="255" value="140" step="1" style="width: 100%;">
            <span id="visit-polygon-opacity-value">140</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="visit-line-width">Line Width (pixels):</label>
            <input type="range" id="visit-line-width" min="1" max="10" value="3" step="1" style="width: 100%;">
            <span id="visit-line-width-value">3</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="visit-min-zoom">Minimum Zoon:</label>
            <input type="range" id="visit-min-zoom" min="1" max="22" value="15" step="1" style="width: 100%;">
            <span id="visit-min-zoom-value">3</span>
        </div>
    </div>

    <!-- Paths Tab -->
    <div id="tab-paths" class="tab-content" style="display: none;">
        <div style="margin-bottom: 10px;">
            <label for="path-width">Path Width (pixels):</label>
            <input type="range" id="path-width" min="1" max="20" value="4" step="1" style="width: 100%;">
            <span id="path-width-value">4</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="path-opacity">Path Opacity (0-255):</label>
            <input type="range" id="path-opacity" min="0" max="255" value="40" step="1" style="width: 100%;">
            <span id="path-opacity-value">40</span>
        </div>
        <div style="margin-bottom: 10px;">
            <label for="path-opacity_static">Path Opacity Static (0-255):</label>
            <input type="range" id="path-opacity_static" min="0" max="255" value="200" step="1" style="width: 100%;">
            <span id="path-opacity_static-value">200</span>
        </div>
    </div>

    <!-- Bundled Tab -->
    <div id="tab-bundled" class="tab-content" style="display: none;">
        <div style="margin-bottom: 10px;">
            <label for="bundled-precision">Bundled Precision (degrees):</label>
            <input type="range" id="bundled-precision" min="0.00001" max="0.001" value="0.0001" step="0.00001"
                   style="width: 100%;">
            <span id="bundled-precision-value">0.0001</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-aura-width">Aura Width (pixels):</label>
            <input type="range" id="bundled-aura-width" min="1" max="30" value="24" step="1" style="width: 100%;">
            <span id="bundled-aura-width-value">24</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-aura-opacity">Aura Opacity (0-255):</label>
            <input type="range" id="bundled-aura-opacity" min="0" max="255" value="15" step="5" style="width: 100%;">
            <span id="bundled-aura-opacity-value">15</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-core-width">Core Width (pixels):</label>
            <input type="range" id="bundled-core-width" min="1" max="20" value="8" step="1" style="width: 100%;">
            <span id="bundled-core-width-value">8</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-core-opacity">Core Opacity (0-255):</label>
            <input type="range" id="bundled-core-opacity" min="0" max="255" value="200" step="5" style="width: 100%;">
            <span id="bundled-core-opacity-value">200</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-path-width">Path Width (pixels):</label>
            <input type="range" id="bundled-path-width" min="1" max="20" value="6" step="1" style="width: 100%;">
            <span id="bundled-path-width-value">6</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="bundled-path-opacity">Path Opacity (0-255):</label>
            <input type="range" id="bundled-path-opacity" min="0" max="255" value="30" step="5" style="width: 100%;">
            <span id="bundled-path-opacity-value">30</span>
        </div>
    </div>

    <!-- Heatmap Tab -->
    <div id="tab-heatmap" class="tab-content" style="display: none;">
        <div style="margin-bottom: 10px;">
            <label for="heatmap-radius">Radius (pixels):</label>
            <input type="range" id="heatmap-radius" min="5" max="100" value="25" step="1" style="width: 100%;">
            <span id="heatmap-radius-value">25</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="heatmap-intensity">Intensity:</label>
            <input type="range" id="heatmap-intensity" min="0.1" max="20" value="5" step="0.1" style="width: 100%;">
            <span id="heatmap-intensity-value">5</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="heatmap-threshold">Threshold:</label>
            <input type="range" id="heatmap-threshold" min="0" max="1" value="0.01" step="0.001" style="width: 100%;">
            <span id="heatmap-threshold-value">0.01</span>
        </div>

        <div style="margin-bottom: 10px;">
            <label for="heatmap-opacity">Opacity (0-255):</label>
            <input type="range" id="heatmap-opacity" min="0" max="255" value="200" step="5" style="width: 100%;">
            <span id="heatmap-opacity-value">200</span>
        </div>
    </div>

    <button id="reset-params"
            style="width: 100%; padding: 8px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">
        Reset to Defaults
    </button>
</div>
<div id="message-container">
    <div id="sse-message"></div>
</div>
<div id="new-map" style="display: block"></div>
<div id="loading-overlay">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="status-text">Ready</div>
</div>
<!-- Auto-update overlay -->
<div id="auto-update-overlay" class="auto-update-overlay">
    <button sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_USER', 'ROLE_MAGIC_LINK_FULL_ACCESS')" class="overlay-button exit-button" onclick="disableAutoUpdate()" th:title="#{map.auto-update.disable.title}">
        <i class="lni lni-pause"></i>
    </button>
    <button class="overlay-button fullscreen-button" onclick="toggleFullscreen()" th:title="#{map.fullscreen.toggle.title}" title="Toggle Fullscreen">
        <i class="lni lni-arrow-all-direction"></i>
    </button>
    <div class="date" id="auto-update-date"></div>
    <div class="time" id="auto-update-time"></div>
</div>
<div class="navigation-container" th:replace="~{fragments/main-navigation :: main-navigation('index')}"></div>
<div class="timeline">
    <div class="timeline-container"
         th:hx-get="@{/timeline/content/range}"
         hx-trigger="dateChanged from:body"
         hx-vals="js:{startDate: getTimelineParams().startDate, endDate: getTimelineParams().endDate, timezone: getTimelineParams().timezone}"
         hx-indicator="#loading-indicator">
        <div id="loading-indicator" class="timeline-entry" th:text="#{timeline.loading}">Loading...</div>
    </div>
    <button type="button" class="timeline-toggle-btn" id="timeline-toggle-btn" onclick="toggleTimeline()" th:title="#{timeline.state.hide.title}" title="Hide Timeline">
        <i class="lni lni-exit"></i>
    </button>
</div>
<button type="button" class="datepicker-toggle-btn" id="datepicker-toggle-btn" onclick="toggleDatePicker()" th:title="#{datepicker.state.hide.title}" title="Hide Date Picker">
    <i class="lni lni-exit-down"></i>
</button>
<div id="date-picker-container"></div>

<div id="tooltip" style="position: absolute; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 4px; display: none; font-family: sans-serif; font-size: 12px; max-width: 300px;"></div>

<div id="timeline-controls"></div>

<div class="fab-container" id="fab-container">
    <!-- Play button with hover-triggered speed control -->
    <div class="play-section">
        <button type="button" class="btn fab-btn" id="play-btn" title="Start Animation">
            <i class="lni lni-play"></i>
        </button>
        <div class="speed-control" id="speed-control">
            <select id="speed-selector">
                <option value="1">Normal (1x)</option>
                <option value="60">Fast (60x)</option>
                <option value="3600">Super Fast (3600x)</option>
                <option value="auto" selected>Auto-Adjust</option>
            </select>
        </div>
    </div>
    <button type="button" class="btn fab-btn" id="toggle-time-control-btn" title="Show time controls">
        <i class="lni lni-stopwatch"></i>
    </button>
    <!-- Today button (hidden by default) -->

<script th:inline="javascript">

    ///delete later

    window.userSettings = /*[[${userSettings}]]*/ {}

    const messagesDiv = document.getElementById('sse-message');

    // #### NEW MAP ####
    let globalTripData = [];

    const map = new maplibregl.Map({

    });

    map.on('move', () => {
        const currentState = {

        };

    });

    const photoClient = new PhotoClient(true);

    let userConfigs = [];
    let animationId = null;
    let lastFrameTime = null;

    let isPlaying = false;

    const playBtn = document.getElementById('play-btn');

    playBtn.onclick = () => {
        if (isPlaying) {
            stopAnimation();
        } else {
            startAnimation();
        }
    };

    function startAnimation() {
        isPlaying = true;
        playBtn.innerHTML = '<i class="lni lni-pause"></i>'; // Change icon to Pause
        lastFrameTime = null;
        animationId = requestAnimationFrame(animate);
    }

    function stopAnimation() {
        isPlaying = false;
        playBtn.innerHTML = '<i class="lni lni-play"></i>'; // Change icon to Play
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
        timelineControl.setOffset(0);
    }

    let timeMultiplier = 30; // Default: 1 second = 1 minute

    function calculateSpeed(globalMinTimestamp, globalMaxTimestamp) {
        if (document.getElementById('aggregate-toggle').checked) {
            timeMultiplier = 60 * 60 * 24 / 30;
        } else {
            const totalSeconds = globalMaxTimestamp - globalMinTimestamp;
            const targetDuration = 30;
            timeMultiplier = totalSeconds / targetDuration;
            console.log(`Animation speed set to: ${timeMultiplier}x real time`);
        }
    }

    function animate(now) {
        if (!isPlaying) return;
        if (lastFrameTime === null) {
            lastFrameTime = now; // Capture the start time
            animationId = requestAnimationFrame(animate); // Request next frame
            return; // Exit early without moving the slider
        }
        // 1. Calculate how much real time has passed since the last frame
        // 'now' is provided automatically by requestAnimationFrame
        const deltaTime = (now - lastFrameTime) / 1000; // convert ms to seconds
        lastFrameTime = now; // Update for the next frame

        // 2. Logic to prevent "jumps" (e.g., if the user changes tabs)
        if (deltaTime > 0.1) {
            animationId = requestAnimationFrame(animate);
            return;
        }

        // 3. Advance the slider
        let step = timeMultiplier * deltaTime;
        let newValue = parseFloat(timelineControl.getOffset()) + step;

        // 4. Loop logic
        if (newValue > parseFloat(timelineControl.getMax())) {
            newValue = 0;
        }

        // 5. Update UI and Map
        timelineControl.setOffset(newValue);
        updateTripsLayer(newValue);

        // 6. Request the next frame
        animationId = requestAnimationFrame(animate);
    }

    function formatDateTime(ts) {
        return new Date(ts).toLocaleDateString(window.userSettings.selectedLocale, { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function showLoadingMetadate(done) {
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('status-text');
        const overlay = document.getElementById('loading-overlay');
        // Make sure it's visible if we just started
        overlay.style.opacity = '1';
        if (done) {
            text.innerText = "Loading metadata ...";
            bar.style.width = '0%';
            bar.style.transition = 'width 0.5s ease-in-out';
        } else {
            text.innerText = "Metadata loaded";
            bar.style.width = '100%';
            bar.style.transition = 'width 0.5s ease-in-out';
        }
    }
    function showLoadingProgress(current, total) {
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('status-text');
        const overlay = document.getElementById('loading-overlay');

        // Make sure it's visible if we just started
        overlay.style.opacity = '1';

        if (total === 0) {
            text.innerText = "No data found";
            bar.style.width = `100%`;
            setTimeout(() => {
                overlay.style.transition = 'opacity 1s ease';
                overlay.style.opacity = '0';
            }, 1500);
            return;
        }

        const percentage = Math.min(100, Math.round((current / total) * 100));
        bar.style.width = `${percentage}%`;

        const currentFormatted = current.toLocaleString();
        const totalFormatted = total.toLocaleString();
        text.innerText = `Loading: ${currentFormatted} / ${totalFormatted} points`;

        // If finished, fade out after 1 second
        if (current >= total) {
            text.innerText = `Load Complete: ${totalFormatted} points`;
            setTimeout(() => {
                overlay.style.transition = 'opacity 1s ease';
                overlay.style.opacity = '0';
            }, 1500);
        }
    }

    async function loadVisits(loadingConfig) {
        const response = await fetch(window.contextPath + loadingConfig.map.visitsUrl);
        const data = await response.json();

        const color = hexToRgb(loadingConfig.color || "#646464");
        globalVisitsData = data.places.map(p => ({
            id: p.place.id,
            coordinates: [p.lng, p.lat],
            polygon: p.place.polygon,
            totalDurationSec: p.totalDurationMs / 1000,
            color: color,
            name: p.place.name,
            activeRanges: p.visits.map(v => ({
                start: Math.floor(new Date(v.startTime).getTime() / 1000) - globalMinTimestamp,
                end: Math.floor(new Date(v.endTime).getTime() / 1000) - globalMinTimestamp
            })).sort((a, b) => a.start - b.start),
            originalVisits: p.visits
        }));
    }

    function flyToHomeLocation() {
        map.flyTo({
            center: [window.userSettings.homeLongitude, window.userSettings.homeLatitude],
            zoom: 15,
            pitch: 45
        });
    }

    function fitMapToBounds(bounds) {
        map.fitBounds(bounds, {
            padding: {
                top: 50,
                bottom: 100,
                right: 100,
                left: 450
            },
            duration: 2000,
            essential: true
        });
    }

    async function loadMetaData(loadingConfig) {
        showLoadingMetadate(false);
        const metaResponse = await fetch(window.contextPath + loadingConfig.map.metaDataUrl);
        const meta = await metaResponse.json();
        showLoadingMetadate(true);
        globalMinTimestamp = meta.minTimestamp;
        globalMaxTimestamp = meta.maxTimestamp;
        calculateSpeed(globalMinTimestamp, globalMaxTimestamp);
        globalBounds = [
            [meta.minLng, meta.minLat], // Southwest corner
            [meta.maxLng, meta.maxLat]  // Northeast corner
        ];
        if (meta.totalPoints > 0) {
            fitMapToBounds(globalBounds);
        } else {
            flyToHomeLocation();
        }

        timelineControl.setup({
            minTimestamp: globalMinTimestamp,
            maxTimestamp: globalMaxTimestamp,
            aggregate: document.getElementById('aggregate-toggle').checked
        });
        showLoadingProgress(0, meta.totalPoints);

        await loadVisits(loadingConfig);
        await startStreamingPoints(loadingConfig, meta.totalPoints);
    }

    async function startStreamingPoints(loadingConfig, totalExpected) {
        const response = await fetch(window.contextPath + loadingConfig.map.streamUrl);
        const reader = response.body.getReader();
        const color = hexToRgb(loadingConfig.color);
        let lastRenderTime = 0;
        let pointsProcessed = 0;
        let leftover = null;

        while (true) {
            const { done, value } = await reader.read();
            if (done) {
                showLoadingProgress(pointsProcessed, totalExpected);
                updateTripsLayer(timelineControl.getOffset());
                break;
            }

            // 1. Combine leftover bytes from the previous chunk with the new chunk
            let combinedValue = value;
            if (leftover) {
                combinedValue = new Uint8Array(leftover.length + value.length);
                combinedValue.set(leftover);
                combinedValue.set(value, leftover.length);
                leftover = null;
            }

            // 2. Calculate how many full 12-byte points we have
            const totalBytes = combinedValue.length;
            const pointsCount = Math.floor(totalBytes / 12);
            const validBytesLength = pointsCount * 12;

            // 3. Keep any trailing bytes that don't make a full point
            if (validBytesLength < totalBytes) {
                leftover = combinedValue.slice(validBytesLength);
            }

            // 4. Process only the full points
            const floatArray = new Float32Array(
                combinedValue.buffer,
                combinedValue.byteOffset,
                pointsCount * 3 // 3 floats per point
            );

            for (let i = 0; i < floatArray.length; i += 3) {
                addPointToMapData(color, floatArray[i+1], floatArray[i], floatArray[i+2]);
                pointsProcessed++;
            }
            const now = performance.now();
            if (now - lastRenderTime > 100) {
                updateTripsLayer(timelineControl.getOffset());
                showLoadingProgress(pointsProcessed, totalExpected);
                lastRenderTime = now;
            }
        }
    }

    function addPointToMapData(color, lng, lat, ts) {
        const tsLinear = ts - globalMinTimestamp;
        const tsAggregate = ts % 86400;

        let currentTrip = globalTripData[globalTripData.length - 1];

        // 1. Check for redundancy BEFORE doing any math
        if (currentTrip && currentTrip.path.length > 0) {
            const lastIdx = currentTrip.path.length - 1;
            if (isRedundant(
                currentTrip.path[lastIdx],
                currentTrip.absTimestamps[lastIdx],
                [lng, lat],
                ts
            )) {
                return; // Drop the point safely
            }
        }

        const GAP_THRESHOLD = 900;
        if (!currentTrip || (ts - currentTrip.lastAbsTs) > GAP_THRESHOLD) {
            currentTrip = {
                path: [],
                shadowPath: [],
                snappedPath: [],
                timestampsLinear: [],
                timestampsAggregate: [],
                absTimestamps: [], // We track this for the filter logic
                lastAbsTs: ts,
                color: color
            };
            globalTripData.push(currentTrip);
        }

        const point = [lng, lat];
        currentTrip.path.push(point);

        currentTrip.shadowPath.push([
            point[0] + deckParams.trips.shadowOffset[0],
            point[1] + deckParams.trips.shadowOffset[1]
        ]);

        currentTrip.snappedPath.push(snapPoint(point, 0.0016));
        currentTrip.timestampsLinear.push(tsLinear);
        currentTrip.timestampsAggregate.push(tsAggregate);
        currentTrip.absTimestamps.push(ts);
        currentTrip.lastAbsTs = ts;
    }

    function isRedundant(lastPoint, lastTs, newPoint, newTs) {
        if (!lastPoint) return false;

        const spatialThreshold = 0.00002; // ~2 meters
        const temporalThreshold = 30;    // 30 seconds

        const dx = lastPoint[0] - newPoint[0];
        const dy = lastPoint[1] - newPoint[1];
        const distSq = dx * dx + dy * dy;

        const timeDiff = newTs - lastTs;

        // If we've stayed in the same spot for more than 30s,
        // we keep the point to prevent "time-skipping" in the animation.
        if (timeDiff > temporalThreshold) return false;

        // If we haven't moved much AND not much time has passed, it's redundant.
        return distSq < (spatialThreshold * spatialThreshold);
    }

    function snapPoint(point, precision = 0.0008) {
        return [
            Math.round(point[0] / precision) * precision,
            Math.round(point[1] / precision) * precision
        ];
    }

    function updateTripsLayer(offset) {
        const viewState = {
            longitude: map.getCenter().lng,
            latitude: map.getCenter().lat,
            zoom: map.getZoom()
        };

        const isAggregate = document.getElementById('aggregate-toggle')?.checked || false;
        const viewMode = document.getElementById('view-mode')?.value || 'LINEAR';
        const totalTimeSpanSec = isAggregate ? 24 * 60 * 60 : globalMaxTimestamp - globalMinTimestamp;
        const calculatedTrail = Math.max(1800, totalTimeSpanSec * 0.02);
        const layers = [];


        if (globalTripData.length === 0) {
            layers.push(...photoClient.getLayers(offset, viewState))
            deckOverlay.setProps({layers});
            return
        }
        // --- BASE VISUALIZATION ---
        if (viewMode === 'HEATMAP') {
            layers.push(new deck.HeatmapLayer({
                id: 'heatmap-base',
                data: globalTripData.flatMap(t => t.path),
                getPosition: d => d,
                radiusPixels: deckParams.heatmap.radius,
                intensity: deckParams.heatmap.intensity,
                threshold: deckParams.heatmap.threshold,
                opacity: deckParams.heatmap.opacity / 255,
                aggregation: 'SUM',
                getPath: [globalTripData[globalTripData.length - 1]?.path.length],
                updateTriggers: {
                    radiusPixels: [deckParams.heatmap.radius],
                    intensity: [deckParams.heatmap.intensity],
                    threshold: [deckParams.heatmap.threshold],
                    opacity: [deckParams.heatmap.opacity],
                    data: [globalTripData.length, globalTripData[globalTripData.length - 1]?.path.length],
                }
            }));
        } else if (viewMode === 'BUNDLED') {
            layers.push(new deck.PathLayer({
                id: 'bundled-aura',
                data: globalTripData,
                getPath: d => d.snappedPath,
                getColor: d => [...d.color, deckParams.bundled.auraOpacity],
                getWidth: deckParams.bundled.auraWidth,
                widthMinPixels: 6,
                capRounded: true,
                jointRounded: true,
                parameters: {
                    blendFunc: [770, 1],
                    blendEquation: 32774,
                    depthTest: false
                },
                updateTriggers: {
                    data: [globalTripData.length],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length],
                    getColor: [deckParams.bundled.auraOpacity],
                    getWidth: [deckParams.bundled.auraWidth]
                }
            }));

            // 2. The "Core" - Narrow, higher opacity, keeps the color saturated
            layers.push(new deck.PathLayer({
                id: 'bundled-core',
                data: globalTripData,
                getPath: d => d.snappedPath,
                getColor: d => [...d.color, deckParams.bundled.coreOpacity],
                getWidth: deckParams.bundled.coreWidth,
                widthMinPixels: 2,
                parameters: {
                    blendFunc: [770, 771],
                    blendEquation: 32774,
                    depthTest: false
                },
                updateTriggers: {
                    data: [globalTripData.length],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length],
                    getWidth: [deckParams.bundled.coreWidth],
                    getColor: [deckParams.bundled.coreOpacity]
                }
            }));

            layers.push(new deck.PathLayer({
                id: 'bundled-paths',
                data: globalTripData,
                getPath: d => {
                    const p = deckParams.bundled.precision;
                    return d.path.map(coord => [
                        Math.round(coord[0] / p) * p,
                        Math.round(coord[1] / p) * p
                    ]);
                },
                getWidth: deckParams.bundled.pathWidth,
                widthMinPixels: 2,
                getColor: d => [...d.color, deckParams.bundled.pathOpacity],

                // This allows the colors to "sum" together mathematically
                parameters: {
                    blendFunc: [770, 1], // GL_SRC_ALPHA, GL_ONE
                    blendEquation: 32774 // GL_FUNC_ADD
                },
                capRounded: true,
                jointRounded: true,
                updateTriggers: {
                    getColor: [deckParams.bundled.pathOpacity],
                    getWidth: [deckParams.bundled.pathWidth],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length, deckParams.bundled.precision]
                }
            }));
        } else {
            // STANDARD PATHS
            layers.push(new deck.PathLayer({
                id: 'static-paths',
                data: globalTripData,
                getPath: d => d.path,
                getColor: d => {
                    let alpha = timelineControl.isIdle() ? deckParams.paths.opacity_static : deckParams.paths.opacity;
                    if (isAggregate) {
                        alpha = alpha * 0.5;
                    }
                    return [...d.color, alpha];
                },
                getWidth: deckParams.paths.width,
                widthMinPixels: deckParams.paths.width,
                capRounded: true,
                updateTriggers: {
                    getColor: [offset, deckParams.paths.opacity, deckParams.paths.opacity_static],
                    getWidth: [deckParams.paths.width],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length]
                }
            }));
        }
        const mode = isAggregate ? 'agg' : 'lin';
        const visibility = !timelineControl.isIdle();
        if (!globalTripData || globalTripData.length === 0) return;

        layers.push(new deck.TripsLayer({
            id: `trips-shadow-${mode}`,
            data: globalTripData,
            // We offset the path coordinates slightly for the shadow effect
            getPath: d => d.shadowPath,
            getTimestamps: d => isAggregate ? d.timestampsAggregate : d.timestampsLinear,
            getColor: [255, 255, 255],
            opacity: deckParams.trips.shadowOpacity * visibility,
            widthMinPixels: deckParams.trips.shadowWidth,
            trailLength: calculatedTrail,
            currentTime: offset,
            parameters: {
                blendFunc: [770, 1],
                blendEquation: 32774,
                depthTest: false
            },updateTriggers: {
                getTimestamps: [isAggregate],
                currentTime: [offset],
                widthMinPixels: [deckParams.trips.shadowWidth],
                trailLength: [deckParams.trips.trailLength],
                opacity: [visibility, deckParams.trips.shadowOpacity],
                getPath: [
                    deckParams.shadowOffset,
                    globalTripData[globalTripData.length - 1]?.path.length]
            }
        }));

        layers.push(new deck.TripsLayer({
            id: `trips-core-${mode}`,
            data: globalTripData,
            getPath: d => d.path,
            getTimestamps: d => isAggregate ? d.timestampsAggregate : d.timestampsLinear,
            getColor: d => [...d.color, deckParams.trips.cometOpacity],
            opacity: deckParams.trips.cometOpacity * visibility,
            widthMinPixels: deckParams.trips.cometWidth,
            trailLength: calculatedTrail,
            currentTime: offset,
            updateTriggers: {
                getColor: [deckParams.trips.cometOpacity],
                widthMinPixels: [deckParams.trips.cometWidth],
                trailLength: [deckParams.trips.trailLength],
                getTimestamps: [isAggregate],
                currentTime: [offset],
                opacity: [visibility, deckParams.trips.cometOpacity],
                getPath: [globalTripData[globalTripData.length - 1]?.path.length]
            }
        }));
        layers.push(...getVisitLayers(offset));
        layers.push(...photoClient.getLayers(offset, viewState));

        deckOverlay.setProps({layers});
    }

    function getVisitLayers(offset) {
        const totalTimeSpanSec = globalMaxTimestamp - globalMinTimestamp;
        const oneDaySec = 86400;

        // Adjustment factor: how many 'days' are we looking at?
        const dayMultiplier = totalTimeSpanSec / oneDaySec;
        const isOverview = timelineControl.isIdle();

        return [
            // 1. Polygon Layer
            new deck.PolygonLayer({
                id: 'visit-polygons',
                data: globalVisitsData.filter(p => p.polygon),
                getPolygon: d => d.polygon.coordinates,
                getFillColor: d => [...d.color, deckParams.visits.polygonOpacity],
                getLineColor: d => [...d.color, 255],
                visible: isOverview && map.getZoom() > deckParams.visits.minZoom,
                updateTripsLayer: {
                    getFillColor: [deckParams.visits.polygonOpacity],
                    visible: [isOverview, map.zoom, deckParams.visits.minZoom],
                    data: globalVisitsData.filter(p => p.activeRanges.some(r => r.start <= offset && r.end >= offset))
                }
            }),
            new deck.ScatterplotLayer({
                id: 'place-outer-circles',
                data: globalVisitsData,
                getPosition: d => d.coordinates,
                getRadius: d => {
                    if (timelineControl.isIdle()) {
                        const seconds = d.totalDurationSec;
                        if (seconds <= 0) return 0;
                        const minRadius = deckParams.visits.radius;
                        return minRadius + (Math.pow(seconds, 0.6) * 0.2);
                    } else {
                        const seconds = getAccumulatedSeconds(d, offset);
                        if (seconds <= 0) return 0;
                        // Use a Power scale (0.5 to 0.7) but divide the input by the dayMultiplier.
                        // This "compresses" the growth as the timeframe gets longer.
                        const normalizedSeconds = seconds / Math.sqrt(dayMultiplier);
                        const minRadius = 15;
                        const maxRadius = 300; // Hard physical limit in meters
                        const calculatedRadius = minRadius + (Math.pow(normalizedSeconds, 0.6) * 0.5);
                        return Math.min(calculatedRadius, maxRadius);
                    }
                },

                getFillColor: d => {
                    if (timelineControl.isIdle()) {
                        return [...d.color, deckParams.visits.opacity];
                    } else {
                        const effect = getActiveVisitEffect(d, offset);
                        // Fade the alpha channel as it leaves
                        const alpha = 140 * effect.opacity;
                        return [...d.color, alpha];
                    }
                },

                getLineColor: d => {
                    if (timelineControl.isIdle()) {
                        return [...d.color, 200];
                    } else {
                        const effect = getActiveVisitEffect(d, offset);
                        // Fade the alpha channel as it leaves
                        const alpha = 140 * effect.opacity;
                        return [...d.color, alpha];
                    }
                },
                transitions: {
                    getRadius: {
                        type: 'spring',
                        stiffness: 0.05,
                        damping: 0.15
                    }
                },
                parameters: {
                  depthTest: false
                },
                stroked: true,
                lineWidthMinPixels: 2,
                pickable: true,
                visible: !isOverview || map.getZoom() > deckParams.visits.minZoom,
                onHover: info => updateTooltip(info),
                updateTriggers: {
                    visible: [map.zoom, deckParams.visits.minZoom],
                    getFillColor: [offset, isOverview, deckParams.visits.opacity, deckParams.visits.minZoom],
                    getLineColor: [offset, isOverview, deckParams.visits.opacity, deckParams.visits.minZoom],
                    getRadius: [deckParams.visits.radius, offset]
                },

            }),

            new deck.ScatterplotLayer({
                id: 'place-inner-circles',
                data: globalVisitsData,
                getPosition: d => d.coordinates,
                getRadius: 8,
                stroked: true,
                lineWidthMinPixels: deckParams.visits.lineWidth,
                getLineColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? 255 : 0;
                    return [0,0,0 , alpha];
                },
                getFillColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? 255 : 0;
                    return [255,255,255, alpha];
                },
                updateTriggers: {
                    getFillColor: [offset, isOverview],
                    lineWidth: [deckParams.visits.lineWidth]
                },
                pickable: true, // MUST BE TRUE
                onHover: info => updateTooltip(info),
            })
        ];
    }

    function getAccumulatedSeconds(visit, offset) {
        let accumulated = 0;

        for (const range of visit.activeRanges) {
            if (offset < range.start) {
                // Comet hasn't reached this stay yet
                break;
            } else if (offset >= range.end) {
                // Stay is fully completed, add the whole duration
                accumulated += (range.end - range.start);
            } else {
                // Comet is currently inside this stay range
                accumulated += (offset - range.start);
                // Since ranges are chronological, we can stop here
                break;
            }
        }
        return accumulated;
    }

    function getActiveVisitEffect(visit, offset) {
        const exitFadeDuration = 300; // 5 minutes (in seconds) to shrink/fade completely
        let accumulated = 0;
        let multiplier = 0;

        for (const range of visit.activeRanges) {
            if (offset < range.start) {
                // Future visit: do nothing
                break;
            } else if (offset >= range.start && offset <= range.end) {
                // Currently visiting: Full size
                accumulated += (offset - range.start);
                multiplier = 1.0;
            } else if (offset > range.end) {
                // Past visit: Add full duration
                accumulated += (range.end - range.start);

                // Calculate decay: how recently did we leave?
                const timeSinceLeft = offset - range.end;
                const decay = 1.0 - (timeSinceLeft / exitFadeDuration);

                // We take the "freshest" decay. If we just left, multiplier is near 1.
                // If we left a long time ago, multiplier is 0.
                multiplier = Math.max(multiplier, Math.min(1, decay));
            }
        }

        return { seconds: accumulated, opacity: multiplier };
    }

        if (!startDate && !endDate) {
            if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {

            }

            // If the selected date is not today, switch to today

    function scheduleTimelineReload(eventData) {
        // Add event to pending events
        pendingEvents.push(eventData);

        if (firstEventTime === null) {
            firstEventTime = Date.now();

            // Set maximum wait timeout (30 seconds from first event)
            maxWaitTimeoutId = setTimeout(() => {
                if (autoUpdateMode && pendingEvents.length > 0) {
                    console.log(`Auto-update: Reloading timeline data after max wait time (30s) with ${pendingEvents.length} accumulated events`);
                    executeTimelineReload();
                }
            }, 30000);
        }

        if (reloadTimeoutId) {
            clearTimeout(reloadTimeoutId);
        }

        reloadTimeoutId = setTimeout(() => {
            if (autoUpdateMode && pendingEvents.length > 0) {
                console.log(`Auto-update: Reloading timeline data after 5s settle time with ${pendingEvents.length} accumulated events`);
                executeTimelineReload();
            }
        }, 5000);
    }

    function executeTimelineReload() {
        // Clear all timeouts
        if (reloadTimeoutId) {
            clearTimeout(reloadTimeoutId);
            reloadTimeoutId = null;
        }
        if (maxWaitTimeoutId) {
            clearTimeout(maxWaitTimeoutId);
            maxWaitTimeoutId = null;
        }

        // Reload timeline
        document.body.dispatchEvent(new CustomEvent('dateChanged'));

        // Clear pending events and reset first event time
        pendingEvents = [];
        firstEventTime = null;
    }

    function connectSSE() {
        if (!autoUpdateMode) {
            return; // Don't connect if auto-update is disabled
        }

        console.log('Connecting to SSE...');
        eventSource = new EventSource(window.contextPath + '/events');

        eventSource.onopen = function() {
            console.log('SSE connection opened.');
            messagesDiv.innerHTML = ''; // Clear any error messages
            messagesDiv.classList.remove('active');

            // Clear any pending reconnect timeout since we're connected
            if (reconnectTimeoutId) {
                clearTimeout(reconnectTimeoutId);
                reconnectTimeoutId = null;
            }
        };

        eventSource.onerror = function(error) {
            console.error('EventSource failed:', error);
            messagesDiv.innerHTML = `<p><strong>${window.locale.sse.error}</strong></p>`;
            messagesDiv.classList.add('active');

            // Close the current connection
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }

            // Schedule reconnection after 5 seconds if still in auto-update mode
            if (autoUpdateMode && !reconnectTimeoutId) {
                console.log('Scheduling SSE reconnection in 5 seconds...');
                reconnectTimeoutId = setTimeout(() => {
                    reconnectTimeoutId = null;
                    connectSSE();
                }, 5000);
            }
        };

        eventSource.onmessage = function(event) {
            console.log('Received generic event:', event.data);

            // Clear error messages on successful message receipt (fallback for onopen)
            if (messagesDiv.classList.contains('active')) {
                messagesDiv.innerHTML = '';
                messagesDiv.classList.remove('active');
            }

            // Clear any pending reconnect timeout since we're receiving messages
            if (reconnectTimeoutId) {
                clearTimeout(reconnectTimeoutId);
                reconnectTimeoutId = null;
            }

            // Parse the event data
            try {
                const eventData = JSON.parse(event.data);

                // Check if the event has a date field and it matches today
                if (eventData.date) {
                    const today = getCurrentLocalDate(); // YYYY-MM-DD format
                    const eventDate = eventData.date;

                    // If event date matches today and we're in auto-update mode, schedule reload
                    if (eventDate === today && autoUpdateMode) {
                        console.log('Auto-update: Scheduling timeline reload due to SSE event for today');
                        scheduleTimelineReload(eventData);
                    }
                }
            } catch (error) {
                console.warn('Could not parse SSE event data:', error);
            }
        };
    }

    function openSettingsMenu() {
        const menu = document.getElementById('settings-menu');
        const overlay = document.getElementById('settings-overlay');

        if (menu && overlay) {
            menu.style.display = 'block';
            overlay.style.display = 'block';

            // Trigger reflow to enable transition
            setTimeout(() => {
                menu.classList.add('visible');
                overlay.classList.add('visible');
            }, 10);
        }
    }

    function closeSettingsMenu() {
        const menu = document.getElementById('settings-menu');
        const overlay = document.getElementById('settings-overlay');

        if (menu && overlay) {
            menu.classList.remove('visible');
            overlay.classList.remove('visible');

            // Wait for transition to complete before hiding
            setTimeout(() => {
                menu.style.display = 'none';
                overlay.style.display = 'none';
            }, 300);
        }
    }

    function loadSettings() {
        return  {
            aggregate: localStorage.getItem('aggregate') === 'true',

    function toggleTimeControls() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        // Check if controls are currently visible
        const isVisible = !timelineControls.classList.contains('hidden');

        if (isVisible) {
            // Hide the controls
            timelineControls.classList.add('hidden');
            toggleBtn.classList.remove('active');
            toggleBtn.title = window.locale.timeline.state.show;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'true');
        } else {
            // Show the controls
            timelineControls.classList.remove('hidden');
            toggleBtn.classList.add('active');
            toggleBtn.title = window.locale.timeline.state.hide;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'false');
        }
    }

    function restoreTimelineControlsState() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const isHidden = localStorage.getItem('timelineControlsHidden') === 'true';

        if (isHidden) {
            timelineControls.classList.add('hidden');
            toggleBtn.title = window.locale.timeline.state.show;
            toggleBtn.classList.remove('active');
        } else {
            timelineControls.classList.remove('hidden');
            toggleBtn.title = window.locale.timeline.state.hide;
            toggleBtn.classList.add('active');
        }
    }

                tabButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');

    // Apply deck parameters function
    function applyDeckParams() {
        // Update the globalTripData with new bundled precision if needed
        if (globalTripData.length > 0) {
            globalTripData.forEach(trip => {
                // Recalculate snappedPath based on new bundled precision
                const p = deckParams.bundled.precision;
                trip.snappedPath = trip.path.map(coord => [
                    Math.round(coord[0] / p) * p,
                    Math.round(coord[1] / p) * p
                ]);
            });
        }

        // Trigger a re-render of the deck.gl layers
        updateTripsLayer(timelineControl.getOffset());
    }
