<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">Reitti - Your Location Timeline</title>
    <link rel="icon" th:href="@{/img/logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/logo.svg}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/leaflet.css}" href="/css/leaflet.css">
    <link rel="stylesheet" th:href="@{/css/date-picker.css}" href="/css/date-picker.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/lineicons.css}" href="/css/lineicons.css">
    <link rel="stylesheet" th:href="@{/css/photo-client.css}" href="/css/photo-client.css">
    <link rel="stylesheet" th:href="@{/css/inline-edit.css}" href="/css/inline-edit.css">
    <link rel="stylesheet" th:href="@{/css/avatar-marker.css}" href="/css/avatar-marker.css">
    <link rel="stylesheet" th:href="@{/css/maplibre-gl.5.16.0.min.css}" href="/css/maplibre-gl.5.16.0.min.css">
    <link th:if="${userSettings.customCssUrl}" rel="stylesheet" th:href="${userSettings.customCssUrl}">
    <script th:src="@{/js/HumanizeDuration.js}"></script>
    <script th:src="@{/js/date-picker-combined.js}"></script>
    <script th:src="@{/js/timeline-scroll-indicator.js}"></script>
    <script th:src="@{/js/photo-client.js}"></script>
    <script th:src="@{/js/htmx.min.js}"></script>
    <script th:src="@{/js/polygon-editor.js}"></script>
    <script th:src="@{/js/util.js}"></script>
    <script th:src="@{/js/deckgl.9.2.5.min.js}"></script>
    <script th:src="@{/js/maplibre-gl.5.16.0.min.js}"></script>
    <style>
        #timeline-controls {
            position: absolute;
            bottom: 170px;
            color: var( --color-highlight);
            display: block;
            background: #3b3b3ba6;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 10;
            font-family: var(--serif-font);
        }

        #timeline-controls.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-10px);
            pointer-events: none;
        }

        .timer-display {
            text-align: center;
        }

        #current-date {
            display: block;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #time-slider {
            flex-grow: 1;
            cursor: pointer;
        }

        .time-bounds {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            align-self: end;
        }

        #loading-overlay {
            opacity: 0;
            position: absolute;
            width: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        #progress-bar {
            width: 0;
            height: 100%;
            background: var(--color-highlight);
            transition: width 0.2s ease-out;
        }

        #status-text {
            text-align: right;
            font-size: 0.8rem;
            font-family: sans-serif;
            color: var(--color-background-dark-light);
            text-shadow: 0 0 2px var(--color-highlight);
            padding-right: 180px;
        }

        #tooltip::-webkit-scrollbar {
            width: 4px;
        }
        #tooltip::-webkit-scrollbar-thumb {
            background: #666;
            border-radius: 2px;
        }
        #tooltip {
            /* Ensure the tooltip doesn't stay open if the mouse moves too fast */
            pointer-events: auto; /* Changed to auto so user can scroll the list */
            transition: opacity 0.1s ease-out;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .today-fab i {
            font-size: 1rem;
        }

        /* FAB Container Styles */
        .fab-container {
            position: fixed;
            bottom: 117px;
            left: 50%;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--color-background-dark-light);
            color: var(--color-highlight);
            border: 1px solid var(--color-highlight);
            padding: 0;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        body.datepicker-hidden .fab-container {
            bottom: 20px;
        }

        .fab-btn {
            height: 40px;
            min-width: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-background-dark-light);
            color: var(--color-highlight);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            padding: 0;
        }

        .fab-btn:first-child {
            border-top-left-radius: 24px;
            border-bottom-left-radius: 24px;
        }

        .fab-btn:last-child {
            border-top-right-radius: 24px;
            border-bottom-right-radius: 24px;
        }

        .fab-btn.active,
        .fab-btn:hover {
            background: var(--color-highlight);
            color: var(--color-background-dark);
            box-shadow: 0 6px 16px rgba(245, 222, 179, 0.4);
        }

        /* Play button section with hover-triggered speed control */
        .play-section {
            position: relative;
            display: flex;
            align-items: center;
        }

        .speed-control {
            opacity: 0;
            visibility: hidden;
            transition: all .3s ease;
            border-radius: 8px;
            width: 0;
            white-space: nowrap;
            pointer-events: none; /* Add this to prevent interference */
        }

        .play-section:hover .speed-control {
            opacity: 1;
            visibility: visible;
            width: 120px;
            margin: 0 4px;
            pointer-events: auto; /* Re-enable pointer events when visible */
        }

        .speed-control select {
            padding: 4px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Today button specific styles */
        .today-btn {
            background: var(--color-background-dark-light);
            min-width: 40px;
            padding: 0 12px;
        }

        .today-btn span {
            margin-left: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        /* Expanded state when today button is visible */
        .fab-container.has-today {
            padding: 8px 12px;
            gap: 12px;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .fab-container {
                bottom: 15px;
                right: 15px;
                padding: 6px 10px;
            }

            .fab-btn {
                width: 36px;
                height: 36px;
                font-size: 14px;
            }

            .speed-control {
                left: 46px;
            }

            .today-btn span {
                display: none; /* Hide text on small screens */
            }
        }

        .settings-menu {
            position: fixed;
            bottom: 180px; /* Above the FAB container */
            right: 20px;
            width: 300px;
            max-height: 400px;
            background: var(--color-background-dark);
            color: var(--color-text-white);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            z-index: 1001;
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .settings-menu.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .settings-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: var(--color-background-dark);
            color: var(--color-text-white);
            border-radius: 12px 12px 0 0;
            border-bottom: 1px solid #eee;
        }

        .settings-menu-header h3 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
            padding-left: 8px;
        }

        .close-settings-btn {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .close-settings-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .settings-menu-content {
            padding: 16px;
            max-height: 320px;
            overflow-y: auto;
        }

        .settings-section {
            margin-bottom: 20px;
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 8px 0;
        }

        .settings-action-btn {
            background: var(--color-highlight);
            color: var(--color-text-white);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .settings-action-btn:hover {
            background: #45a049;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .settings-overlay.visible {
            opacity: 1;
        }

        .settings-menu-content .divider {
            font-size: 1rem;
            margin: 0;
            margin-bottom: 8px;
        }

        /* Responsive adjustments for settings menu */
        @media (max-width: 768px) {
            .settings-menu {
                right: 10px;
                left: 10px;
                width: auto;
                bottom: 160px;
                max-height: 60vh;
            }

            .settings-menu-header {
                padding: 12px 16px;
            }

            .settings-menu-content {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

<div id="deck-controls" style="position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px; border-radius: 8px; z-index: 10000; width: 250px; font-family: sans-serif; font-size: 12px;">
    <h4 style="margin: 0 0 10px 0; text-align: center;">Deck.gl Parameters</h4>

    <div style="margin-bottom: 10px;">
        <label for="trail-length">Trail Length (seconds):</label>
        <input type="range" id="trail-length" min="100" max="10000" value="1800" step="100" style="width: 100%;">
        <span id="trail-length-value">1800</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="comet-width">Comet Width (pixels):</label>
        <input type="range" id="comet-width" min="1" max="20" value="8" step="1" style="width: 100%;">
        <span id="comet-width-value">8</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="path-width">Path Width (pixels):</label>
        <input type="range" id="path-width" min="1" max="20" value="8" step="1" style="width: 100%;">
        <span id="path-width-value">8</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="path-opacity">Path Opacity (0-255):</label>
        <input type="range" id="path-opacity" min="0" max="255" value="40" step="5" style="width: 100%;">
        <span id="path-opacity-value">40</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="visit-radius">Visit Radius (pixels):</label>
        <input type="range" id="visit-radius" min="5" max="50" value="15" step="1" style="width: 100%;">
        <span id="visit-radius-value">15</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="visit-opacity">Visit Opacity (0-255):</label>
        <input type="range" id="visit-opacity" min="0" max="255" value="40" step="5" style="width: 100%;">
        <span id="visit-opacity-value">40</span>
    </div>

    <div style="margin-bottom: 10px;">
        <label for="bundled-precision">Bundled Precision (degrees):</label>
        <input type="range" id="bundled-precision" min="0.00001" max="0.001" value="0.0001" step="0.00001"
               style="width: 100%;">
        <span id="bundled-precision-value">0.0001</span>
    </div>

    <button id="reset-params"
            style="width: 100%; padding: 8px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px;">
        Reset to Defaults
    </button>
</div>

<div id="message-container">
    <div id="sse-message"></div>
</div>
<div id="new-map" style="display: block"></div>
<div id="loading-overlay">
    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="status-text">Ready</div>
</div>
<!-- Auto-update overlay -->
<div id="auto-update-overlay" class="auto-update-overlay">
    <button sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_USER', 'ROLE_MAGIC_LINK_FULL_ACCESS')" class="overlay-button exit-button" onclick="disableAutoUpdate()" th:title="#{map.auto-update.disable.title}">
        <i class="lni lni-pause"></i>
    </button>
    <button class="overlay-button fullscreen-button" onclick="toggleFullscreen()" th:title="#{map.fullscreen.toggle.title}" title="Toggle Fullscreen">
        <i class="lni lni-arrow-all-direction"></i>
    </button>
    <div class="date" id="auto-update-date"></div>
    <div class="time" id="auto-update-time"></div>
</div>
<div class="navigation-container" th:replace="~{fragments/main-navigation :: main-navigation('index')}"></div>
<div class="timeline">
    <div class="timeline-container"
         th:hx-get="@{/timeline/content/range}"
         hx-trigger="dateChanged from:body"
         hx-vals="js:{startDate: getTimelineParams().startDate, endDate: getTimelineParams().endDate, timezone: getTimelineParams().timezone}"
         hx-indicator="#loading-indicator">
        <div id="loading-indicator" class="timeline-entry" th:text="#{timeline.loading}">Loading...</div>
    </div>
    <button type="button" class="timeline-toggle-btn" id="timeline-toggle-btn" onclick="toggleTimeline()" th:title="#{timeline.state.hide.title}" title="Hide Timeline">
        <i class="lni lni-exit"></i>
    </button>
</div>
<button type="button" class="datepicker-toggle-btn" id="datepicker-toggle-btn" onclick="toggleDatePicker()" th:title="#{datepicker.state.hide.title}" title="Hide Date Picker">
    <i class="lni lni-exit-down"></i>
</button>
<div id="date-picker-container"></div>

<div id="tooltip" style="position: absolute; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 4px; display: none; font-family: sans-serif; font-size: 12px; max-width: 300px;"></div>

<div id="timeline-controls">
    <div class="time-bounds">
        <span id="start-label" style="align-self: end;">--</span>
        <div class="timer-display">
            <span id="current-date">Select Date</span>
            <span id="current-time">00:00</span>
        </div>

        <span id="end-label" style="align-self: end;">--</span>
    </div>
    <div class="slider-container">
        <input type="range" id="time-slider" min="0" max="100" value="0" step="1"></div>
</div>

<div class="fab-container" id="fab-container">
    <!-- Play button with hover-triggered speed control -->
    <div class="play-section">
        <button type="button" class="btn fab-btn" id="play-btn" title="Start Animation">
            <i class="lni lni-play"></i>
        </button>
        <div class="speed-control" id="speed-control">
            <select id="speed-selector">
                <option value="1">Normal (1x)</option>
                <option value="60">Fast (60x)</option>
                <option value="3600">Super Fast (3600x)</option>
                <option value="auto" selected>Auto-Adjust</option>
            </select>
        </div>
    </div>
    <button type="button" class="btn fab-btn" id="toggle-time-control-btn" title="Show time controls">
        <i class="lni lni-stopwatch"></i>
    </button>
    <!-- Today button (hidden by default) -->
    <button type="button" class="btn fab-btn today-btn" id="today-fab" onclick="goToToday()" style="display: none;"
            th:title="#{datepicker.today.title}" title="Go to Today">
        <i class="lni lni-calendar-days"></i>
        <span th:text="#{datepicker.today}">Today</span>
    </button>

    <!-- Settings button -->
    <button type="button" class="btn fab-btn settings-btn" id="settings-btn" title="Settings">
        <i class="lni lni-gear-1"></i>
    </button>
</div>

<!-- Settings Menu (hidden by default) -->
<div id="settings-menu" class="settings-menu visible" style="display: block">
    <div class="settings-menu-header">
        <h3 th:text="#{settings.title}">Settings</h3>
        <button class="close-settings-btn" onclick="closeSettingsMenu()">
            <i class="lni lni-xmark-circle"></i>
        </button>
    </div>
    <div class="settings-menu-content">
        <div class="divider left">Map Appearance</div>
        <div class="settings-section">
            <div class="form-group">
                <label for="view-mode">View Mode</label>
                <select id="view-mode">
                    <option value="LINEAR">Standard Paths</option>
                    <option value="HEATMAP">Density Heatmap</option>
                    <option value="BUNDLED">Edge Bundling</option>
                </select>
            </div>
            <div class="form-group">
                <label for="aggregate-toggle">24h aggregate?</label>
                <input type="checkbox" id="aggregate-toggle">
            </div>
        </div>
        <div class="divider left">Date Selection</div>
        <div class="settings-section">
        </div>
    </div>
</div>

<!-- Settings Overlay (for closing when clicking outside) -->
<div id="settings-overlay" class="settings-overlay" style="display: none;" onclick="closeSettingsMenu()"></div>

<script th:inline="javascript">

    ///delete later
    let deckParams = {
        trailLength: 1800,
        cometWidth: 8,
        pathWidth: 8,
        pathOpacity: 40,
        visitRadius: 15,
        visitOpacity: 40,
        bundledPrecision: 0.0001
    };

    window.contextPath = /*[[@{/}]]*/ "/";
    window.contextPath = window.contextPath.replace(/\/$/, '');

    // Locale object for JavaScript
    window.locale = {
        today: /*[[#{datepicker.today}]]*/ 'Today',
        days: [
            /*[[#{datepicker.days.sun}]]*/ 'Sun',
            /*[[#{datepicker.days.mon}]]*/ 'Mon',
            /*[[#{datepicker.days.tue}]]*/ 'Tue',
            /*[[#{datepicker.days.wed}]]*/ 'Wed',
            /*[[#{datepicker.days.thu}]]*/ 'Thu',
            /*[[#{datepicker.days.fri}]]*/ 'Fri',
            /*[[#{datepicker.days.sat}]]*/ 'Sat'
        ],
        months: [
            /*[[#{datepicker.months.jan}]]*/ 'Jan',
            /*[[#{datepicker.months.feb}]]*/ 'Feb',
            /*[[#{datepicker.months.mar}]]*/ 'Mar',
            /*[[#{datepicker.months.apr}]]*/ 'Apr',
            /*[[#{datepicker.months.may}]]*/ 'May',
            /*[[#{datepicker.months.jun}]]*/ 'Jun',
            /*[[#{datepicker.months.jul}]]*/ 'Jul',
            /*[[#{datepicker.months.aug}]]*/ 'Aug',
            /*[[#{datepicker.months.sep}]]*/ 'Sep',
            /*[[#{datepicker.months.oct}]]*/ 'Oct',
            /*[[#{datepicker.months.nov}]]*/ 'Nov',
            /*[[#{datepicker.months.dec}]]*/ 'Dec'
        ],
        sse: {
            error: /*[[#{sse.error.connection-lost}]]*/ 'Connection to server lost! Will reconnect ...',
        },
        autoupdate: {
          latestLocation:  /*[[#{map.auto-update.latest-location}]]*/ 'Latest location',
          state: {
              enable: /*[[#{map.auto-update.enable.title}]]*/ 'Enter Auto-Update Mode',
              disable: /*[[#{map.auto-update.disable.title}]]*/ 'Leave Auto-Update Mode',
          }
        },
        datepicker: {
            state : {
                hide: /*[[#{datepicker.state.hide.title}]]*/ 'Hide Date Picker',
                show:  /*[[#{datepicker.state.show.title}]]*/ 'Show Date Picker'
            }
        },
        timeline: {
            state : {
                hide: /*[[#{timeline.state.hide.title}]]*/ 'Hide Timeline',
                show:  /*[[#{timeline.state.show.title}]]*/ 'Show Timeline'

            }
        },
        map: {
            popup: {
                labels: {
                    totalDuration:  /*[[#{map.popup.labels.total_duration}]]*/ 'Total duration:',
                    from:  /*[[#{map.popup.labels.from}]]*/ 'From',
                    to:  /*[[#{map.popup.labels.to}]]*/ 'To',
                }
            }
        }
    };

    window.userSettings = /*[[${userSettings}]]*/ {}

    const messagesDiv = document.getElementById('sse-message');
    let autoUpdateMode = false;
    let autoUpdateTimer = null;
    let autoUpdateTimeInterval = null;
    let eventSource = null;
    let reloadTimeoutId = null;
    let maxWaitTimeoutId = null;
    let pendingEvents = [];
    let firstEventTime = null;
    let reconnectTimeoutId = null;

    // Store current date range selection
    let currentDateRange = null;

    // #### NEW MAP ####
    let globalTripData = [];
    let globalPlacesData = [];

    let globalMinTimestamp = 0;
    let globalMaxTimestamp = 0;

    const mapNew = new maplibregl.Map({
        container: 'new-map',
        style: '/map/reitti.json',
        center: [window.userSettings.homeLongitude, window.userSettings.homeLatitude],
        zoom: 3,
        pitch: 45,
    });

    const deckOverlay = new deck.MapboxOverlay({
        layers: []
    });

    mapNew.addControl(deckOverlay);

    let userConfigs = [];
    let currentTime = 0;
    let animationId = null;
    let lastFrameTime = null;

    let isPlaying = false;
    let currentSliderValue = 0;

    const playBtn = document.getElementById('play-btn');
    const slider = document.getElementById('time-slider');
    const timeLabel = document.getElementById('time-display');

    slider.oninput = (e) => {
        const currentOffset = parseFloat(e.target.value); // 0 to totalDuration

        // 1. Calculate actual date
        const actualTimeInSeconds = minTimestamp + currentOffset;
        const date = new Date(actualTimeInSeconds * 1000); // JS needs milliseconds

        // 2. Format for display (e.g., "Jan 15, 14:30")
        timeLabel.innerText = date.toLocaleString(window.userSettings.selectedLocale, {
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        // 3. Update the deck.gl layer
        updateTripsLayer(currentOffset);
    };

    // Update display text when sliding
    document.getElementById('time-slider').oninput = function (e) {
        const offset = parseInt(e.target.value);
        const absoluteSeconds = globalMinTimestamp + offset;
        const dateObj = new Date(absoluteSeconds * 1000);
        currentSliderValue = offset;

        document.getElementById('current-date').innerText = dateObj.toLocaleDateString(window.userSettings.selectedLocale, {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        document.getElementById('current-time').innerText = dateObj.toLocaleTimeString(window.userSettings.selectedLocale, {
            hour: '2-digit', minute: '2-digit'
        });

        // Trigger deck.gl update
        updateTripsLayer(offset);
    };

    playBtn.onclick = () => {
        if (isPlaying) {
            pauseAnimation();
        } else {
            startAnimation();
        }
    };

    function startAnimation() {
        isPlaying = true;
        playBtn.innerHTML = '<i class="lni lni-pause"></i>'; // Change icon to Pause
        lastFrameTime = null;
        animationId = requestAnimationFrame(animate);
    }

    function pauseAnimation() {

        playBtn.innerHTML = '<i class="lni lni-play"></i>'; // Change icon to Play
        if (animationId) {

    let timeMultiplier = 60; // Default: 1 second = 1 minute

    function calculateSpeed(globalMinTimestamp, globalMaxTimestamp) {
        const totalSeconds = globalMaxTimestamp - globalMinTimestamp;
        const targetDuration = 60;
        timeMultiplier = totalSeconds / targetDuration;
        console.log(`Animation speed set to: ${timeMultiplier}x real time`);
    }

    function animate(now) {
        if (!isPlaying) return;
        if (lastFrameTime === null) {
            lastFrameTime = now; // Capture the start time
            animationId = requestAnimationFrame(animate); // Request next frame
            return; // Exit early without moving the slider
        }
        // 1. Calculate how much real time has passed since the last frame
        // 'now' is provided automatically by requestAnimationFrame
        const deltaTime = (now - lastFrameTime) / 1000; // convert ms to seconds
        lastFrameTime = now; // Update for the next frame

        // 2. Logic to prevent "jumps" (e.g., if the user changes tabs)
        if (deltaTime > 0.1) {
            animationId = requestAnimationFrame(animate);
            return;
        }

        // 3. Advance the slider
        let step = timeMultiplier * deltaTime;
        let newValue = parseFloat(slider.value) + step;

        // 4. Loop logic
        if (newValue > parseFloat(slider.max)) {
            newValue = 0;
        }

        // 5. Update UI and Map
        slider.value = newValue;
        updateTimeDisplay(newValue);
        updateTripsLayer(newValue);

        // 6. Request the next frame
        animationId = requestAnimationFrame(animate);
    }

    function updateTimeDisplay(offset) {
        // offset is the "seconds since start" from the slider
        // globalMinTimestamp is the "Unix start time" from the backend
        const absoluteSeconds = globalMinTimestamp + parseInt(offset);
        const dateObj = new Date(absoluteSeconds * 1000);

        document.getElementById('current-date').innerText = dateObj.toLocaleDateString(window.userSettings.selectedLocale, {
            day: '2-digit', month: 'short', year: 'numeric'
        });

        document.getElementById('current-time').innerText = dateObj.toLocaleTimeString(window.userSettings.selectedLocale, {
            hour: '2-digit', minute: '2-digit'
        });
    }

        // Set the range in seconds
        slider.min = 0;

    function showLoadingProgress(current, total) {
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('status-text');
        const overlay = document.getElementById('loading-overlay');

        // Make sure it's visible if we just started
        overlay.style.opacity = '1';

        if (total === 0) {
            text.innerText = "No data found";
            bar.style.width = `100%`;
            setTimeout(() => {
                overlay.style.transition = 'opacity 1s ease';
                overlay.style.opacity = '0';
            }, 1500);
            return;
        }

        const percentage = Math.min(100, Math.round((current / total) * 100));
        bar.style.width = `${percentage}%`;

        const currentFormatted = current.toLocaleString();
        const totalFormatted = total.toLocaleString();
        text.innerText = `Loading: ${currentFormatted} / ${totalFormatted} points`;

        // If finished, fade out after 1 second
        if (current >= total) {
            text.innerText = `Load Complete: ${totalFormatted} points`;
            setTimeout(() => {
                overlay.style.transition = 'opacity 1s ease';
                overlay.style.opacity = '0';
            }, 1500);
        }
    }

    async function loadVisits(loadingConfig) {
        const response = await fetch(window.contextPath + loadingConfig.map.visitsUrl);
        const data = await response.json();

        const color = hexToRgb(loadingConfig.color || "#646464");
        globalPlacesData = data.places.map(p => ({
            id: p.place.id,
            coordinates: [p.lng, p.lat],
            polygon: p.place.polygon,
            totalDurationSec: p.totalDurationMs / 1000,
            color: color,
            name: p.place.name,
            activeRanges: p.visits.map(v => ({
                start: Math.floor(new Date(v.startTime).getTime() / 1000) - globalMinTimestamp,
                end: Math.floor(new Date(v.endTime).getTime() / 1000) - globalMinTimestamp
            })),
            originalVisits: p.visits
        }));
    }

    async function loadMetaData(loadingConfig) {
        const metaResponse = await fetch(window.contextPath + loadingConfig.map.metaDataUrl);
        const meta = await metaResponse.json();

        globalMinTimestamp = meta.minTimestamp;
        globalMaxTimestamp = meta.maxTimestamp;
        calculateSpeed(globalMinTimestamp, globalMaxTimestamp);

        if (meta.totalPoints > 0) {
            mapNew.fitBounds([
                [meta.minLng, meta.minLat], // Southwest corner
                [meta.maxLng, meta.maxLat]  // Northeast corner
            ], {
                padding: {
                    top: 50,
                    bottom: 100,
                    right: 100,
                    left: 450
                },
                duration: 2000,
                essential: true
            });
        }

        initSlider(globalMinTimestamp, globalMaxTimestamp);

        showLoadingProgress(0, meta.totalPoints);
        await loadVisits(loadingConfig);
        startStreamingPoints(loadingConfig, meta.totalPoints);
    }

    async function startStreamingPoints(loadingConfig, totalExpected) {
        const response = await fetch(window.contextPath + loadingConfig.map.streamUrl);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        const color = hexToRgb(loadingConfig.color);
        let pointsProcessed = 0;
        let partialChunk = '';
        let lastRenderTime = 0;
        while (true) {
            const { value, done } = await reader.read();
            if (done) {
                // 1. Process any remaining data in the buffer
                if (partialChunk.trim()) {
                    const point = JSON.parse(partialChunk);
                    addPointToMapData(color, point);
                    pointsProcessed++;
                }

                // 2. Final UI Update: Catch the "remainder" points
                showLoadingProgress(pointsProcessed, totalExpected);
                updateTripsLayer(currentSliderValue);

                console.log(`Stream finished. Total points: ${pointsProcessed}`);
                break;
            }
            const chunk = decoder.decode(value, { stream: true });
            const lines = (partialChunk + chunk).split('\n');
            partialChunk = lines.pop(); // Save the incomplete last line

            for (const line of lines) {
                if (line.trim()) {
                    const point = JSON.parse(line);
                    addPointToMapData(color, point);
                    pointsProcessed++;
                }
            }
            const now = performance.now();
            if (now - lastRenderTime > 100) {
                updateTripsLayer(currentSliderValue);
                showLoadingProgress(pointsProcessed, totalExpected);
                lastRenderTime = now;
            }
        }
        showLoadingProgress(pointsProcessed, totalExpected);
    }

    function addPointToMapData(color, p) {
        const tsLinear = p.ts - globalMinTimestamp;
        const tsAggregate = p.ts % 86400;

        let currentTrip = globalTripData[globalTripData.length - 1];
        const GAP_THRESHOLD = 900;

        if (!currentTrip || (p.ts - currentTrip.lastAbsTs) > GAP_THRESHOLD) {
            currentTrip = {
                path: [],
                snappedPath: [],
                timestampsLinear: [],
                timestampsAggregate: [],
                lastAbsTs: p.ts,
                color: color
            };
            globalTripData.push(currentTrip);
        }

        const point = [p.lng, p.lat];
        currentTrip.path.push(point);
        currentTrip.snappedPath.push(snapPoint(point, 0.00002));
        currentTrip.timestampsLinear.push(tsLinear);
        currentTrip.timestampsAggregate.push(tsAggregate);
        currentTrip.lastAbsTs = p.ts;
    }

    function snapPoint(point, precision = 0.0008) {
        return [
            Math.round(point[0] / precision) * precision,
            Math.round(point[1] / precision) * precision
        ];
    }
    function updateTripsLayer(offset) {
        const isAggregate = document.getElementById('aggregate-toggle')?.checked || false;
        const viewMode = document.getElementById('view-mode')?.value || 'LINEAR';

        // Trail: 30 mins for 24h mode, or 2% of the year for linear
        const trailLength = isAggregate
            ? 1800
            : (globalMaxTimestamp - globalMinTimestamp) * 0.02;

        const layers = [];

        // --- BASE VISUALIZATION ---
        if (viewMode === 'HEATMAP') {
            layers.push(new deck.HeatmapLayer({
                id: 'heatmap-base',
                data: globalTripData.flatMap(t => t.path),
                getPosition: d => d,
                radiusPixels: 25,
                intensity: 5,     // Crank this up to see thin paths
                threshold: 0.01,  // Lower threshold to show faint movements
                aggregation: 'SUM',
                getPath: [globalTripData[globalTripData.length - 1]?.path.length]
            }));
        } else if (viewMode === 'BUNDLED') {
            const BUNDLE_PRECISION = 0.0001; // Roughly 100m. Adjust for "tightness"
            layers.push(new deck.PathLayer({
                id: 'bundled-aura',
                data: globalTripData,
                getPath: d => d.snappedPath,
                getColor: d => [...d.color, 15],
                getWidth: deckParams.pathWidth * 3, // Use parameter (scaled up for aura)
                widthMinPixels: 6,
                capRounded: true,
                jointRounded: true,
                parameters: {
                    blendFunc: [770, 1],
                    blendEquation: 32774,
                    depthTest: false
                },
                updateTriggers: {
                    data: [globalTripData.length],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length]
                }
            }));

            // 2. The "Core" - Narrow, higher opacity, keeps the color saturated
            layers.push(new deck.PathLayer({
                id: 'bundled-core',
                data: globalTripData,
                getPath: d => d.snappedPath,
                getColor: d => [...d.color, 200],
                getWidth: deckParams.pathWidth, // Use parameter
                widthMinPixels: 2,
                parameters: {
                    blendFunc: [770, 771],
                    blendEquation: 32774,
                    depthTest: false
                },
                updateTriggers: {
                    data: [globalTripData.length],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length],
                    getWidth: [deckParams.pathWidth]
                }
            }));

            layers.push(new deck.PathLayer({
                id: 'bundled-paths',
                data: globalTripData,
                getPath: d => {
                    const p = 0.00008;
                    return d.path.map(coord => [
                        Math.round(coord[0] / p) * p,
                        Math.round(coord[1] / p) * p
                    ]);
                },
                getWidth: 6,
                widthMinPixels: 2,
                // Use a very low alpha (e.g., 15/255).
                // 17 overlaps will result in a fully bright "hotspot"
                getColor: d => [...d.color, 30],

                // This allows the colors to "sum" together mathematically
                parameters: {
                    blendFunc: [770, 1], // GL_SRC_ALPHA, GL_ONE
                    blendEquation: 32774 // GL_FUNC_ADD
                },
                capRounded: true,
                jointRounded: true,
                updateTriggers: {
                    getColor: [offset],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length]
                }
            }));
        } else {
            // STANDARD PATHS
            layers.push(new deck.PathLayer({
                id: 'static-paths',
                data: globalTripData,
                getPath: d => d.path,
                getColor: d => {
                    const alpha = offset !== 0 ? deckParams.pathOpacity : 255; // Use parameter
                    return [...d.color, alpha];
                },
                getWidth: deckParams.pathWidth, // Use parameter
                widthMinPixels: 2,
                capRounded: true,
                updateTriggers: {
                    getColor: [offset, deckParams.pathOpacity],
                    getWidth: [deckParams.pathWidth],
                    getPath: [globalTripData[globalTripData.length - 1]?.path.length]
                }
            }));
        }

        // --- THE ANIMATED COMET (Always Top) ---
        layers.push(new deck.TripsLayer({
            id: `trips-layer-${isAggregate ? 'aggregate' : 'linear'}`,
            data: globalTripData,
            getPath: d => d.path,
            getTimestamps: d => isAggregate ? d.timestampsAggregate : d.timestampsLinear,
            getColor: d => [...d.color, 255],
            opacity: offset !== 0 ? 1.0 : 0,
            getWidth: deckParams.cometWidth, // Use cometWidth parameter
            widthMinPixels: 2,
            trailLength: deckParams.trailLength, // Use parameter
            currentTime: offset,
            updateTriggers: {
                getTimestamps: [isAggregate],
                currentTime: [offset],
                getWidth: [deckParams.cometWidth],
                trailLength: [deckParams.trailLength],
                getPath: [globalTripData[globalTripData.length - 1]?.path.length]
            }
        }));

        // --- THE VISITS ---
        layers.push(...getVisitLayers(offset));

        deckOverlay.setProps({layers});
    }
    function getVisitLayers(offset) {
        const isOverview = offset === 0;

        return [
            // 1. Polygon Layer
            new deck.PolygonLayer({
                id: 'visit-polygons',
                data: globalPlacesData.filter(p => p.polygon),
                getPolygon: d => d.polygon.coordinates,
                getFillColor: d => [...d.color, 140], // Use parameter
                getLineColor: d => [...d.color, 255],
                visible: mapNew.getZoom() > 14
            }),

            new deck.ScatterplotLayer({
                id: 'place-outer-circles',
                data: globalPlacesData,
                getPosition: d => d.coordinates,
                getRadius: d => {
                    const logValue = Math.log10(d.totalDurationSec + 1);
                    return deckParams.visitRadius + (logValue * 15); // Use parameter as base
                },
                getFillColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? deckParams.visitOpacity : 0; // Use parameter
                    return [...d.color, alpha];
                },
                updateTriggers: {
                    getFillColor: [offset, isOverview, deckParams.visitOpacity],
                    getLineColor: [offset, isOverview, deckParams.visitOpacity],
                    getRadius: [deckParams.visitRadius]
                },
                stroked: true,
                getLineColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? deckParams.visitOpacity : 0; // Use parameter
                    return [...d.color, alpha];
                },
                lineWidthMinPixels: 3,
                pickable: true,
                onHover: info => updateTooltip(info),
            }),

            new deck.ScatterplotLayer({
                id: 'place-inner-circles',
                data: globalPlacesData,
                getPosition: d => d.coordinates,
                getRadius: 8,
                stroked: true,
                lineWidthMinPixels: 3,
                getLineColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? 80 : 0;
                    return [...d.color, alpha];
                },
                getFillColor: d => {
                    const isActive = d.activeRanges.some(r => offset >= r.start && offset <= r.end);
                    const alpha = (isOverview || isActive) ? 80 : 0;
                    return [255,255,255, alpha];
                },
                updateTriggers: { getFillColor: [offset, isOverview] },
                pickable: true, // MUST BE TRUE
                onHover: info => updateTooltip(info),
            })
        ];
    }

    function loadStartingDate() {
        const urlParams = new URLSearchParams(window.location.search);
        const newestData = window.userSettings.newestData;

        let startDate = urlParams.get('startDate');
        let endDate = urlParams.get('endDate');
        if (startDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(startDate)) {
                startDate = null;
            }
        }
        if (endDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(endDate)) {
                endDate = null;
            }
        }

        console.log('Starting date:', startDate, endDate);
        console.log('Newest data:', newestData);

        if (!startDate && !endDate) {
            if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
                return [getCurrentLocalDate(), ];
            } else if (window.userSettings.newestData) {
                return [getAsLocalDate(window.userSettings.newestData),];
            } else {
                return [getCurrentLocalDate(), ];
            }
        } else if (!startDate && endDate) {
            return [endDate, ];
        } else if (startDate && !endDate) {
            return [startDate, ];
        } else if (startDate === endDate) {
            return [startDate, ];
        }
        else {
            return [startDate, endDate];
        }
    }

                window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate(), null);
            }

            // Connect to SSE with automatic reconnection
            connectSSE();

            // Disable auto-update mode
            disableAutoUpdate();

    function disableAutoUpdate() {
        autoUpdateMode = false;

        // Clear the timer
        if (autoUpdateTimer) {
            clearInterval(autoUpdateTimer);
            autoUpdateTimer = null;
        }

        // Clear time update interval
        if (autoUpdateTimeInterval) {
            clearInterval(autoUpdateTimeInterval);
            autoUpdateTimeInterval = null;
        }

        // Clear any pending reload timeout
        if (reloadTimeoutId) {
            clearTimeout(reloadTimeoutId);
            reloadTimeoutId = null;
        }

        // Clear max wait timeout
        if (maxWaitTimeoutId) {
            clearTimeout(maxWaitTimeoutId);
            maxWaitTimeoutId = null;
        }

        // Clear pending events
        pendingEvents = [];
        firstEventTime = null;

        // Clear reconnect timeout
        if (reconnectTimeoutId) {
            clearTimeout(reconnectTimeoutId);
            reconnectTimeoutId = null;
        }

        if (eventSource) {
            eventSource.close();
            eventSource = null;
        }

        rawLocationLoader.removePulsatingMarkers();

        // Hide auto-update overlay
        hideAutoUpdateOverlay();

        // Show timeline and date picker again
        showUIElements();

        const btn = document.getElementById('auto-update-btn');
        const icon = btn.querySelector('i');
        icon.className = 'lni lni-play';
        btn.title = window.locale.autoupdate.state.enable;
        if (window.horizontalDatePicker) {
            window.horizontalDatePicker.setSelectedRange(getSelectedDate(), null);
        }

        document.body.classList.remove('auto-update-mode');

    }

    function startAutoUpdateTimer() {
        // Check every 30 seconds if we need to switch to today's date
        autoUpdateTimer = setInterval(() => {
            if (!autoUpdateMode) {
                return; // Exit if auto-update mode was disabled
            }

            // If the selected date is not today, switch to today
            if (!isSelectedDateToday()) {
                console.log('Auto-update: Switching to today\'s date');
                if (window.horizontalDatePicker) {
                    window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate());
                }
            }
        }, 30000); // 30 seconds
    }

    function isSelectedDateToday() {
        const today = getCurrentLocalDate();
        const selectedDate = getSelectedDate();
        return selectedDate === today;
    }

    function scheduleTimelineReload(eventData) {
        // Add event to pending events
        pendingEvents.push(eventData);

        if (firstEventTime === null) {
            firstEventTime = Date.now();

            // Set maximum wait timeout (30 seconds from first event)
            maxWaitTimeoutId = setTimeout(() => {
                if (autoUpdateMode && pendingEvents.length > 0) {
                    console.log(`Auto-update: Reloading timeline data after max wait time (30s) with ${pendingEvents.length} accumulated events`);
                    executeTimelineReload();
                }
            }, 30000);
        }

        if (reloadTimeoutId) {
            clearTimeout(reloadTimeoutId);
        }

        reloadTimeoutId = setTimeout(() => {
            if (autoUpdateMode && pendingEvents.length > 0) {
                console.log(`Auto-update: Reloading timeline data after 5s settle time with ${pendingEvents.length} accumulated events`);
                executeTimelineReload();
            }
        }, 5000);
    }

    function executeTimelineReload() {
        // Clear all timeouts
        if (reloadTimeoutId) {
            clearTimeout(reloadTimeoutId);
            reloadTimeoutId = null;
        }
        if (maxWaitTimeoutId) {
            clearTimeout(maxWaitTimeoutId);
            maxWaitTimeoutId = null;
        }

        // Reload timeline
        document.body.dispatchEvent(new CustomEvent('dateChanged'));

        // Clear pending events and reset first event time
        pendingEvents = [];
        firstEventTime = null;
    }

    function connectSSE() {
        if (!autoUpdateMode) {
            return; // Don't connect if auto-update is disabled
        }

        console.log('Connecting to SSE...');
        eventSource = new EventSource(window.contextPath + '/events');

        eventSource.onopen = function() {
            console.log('SSE connection opened.');
            messagesDiv.innerHTML = ''; // Clear any error messages
            messagesDiv.classList.remove('active');

            // Clear any pending reconnect timeout since we're connected
            if (reconnectTimeoutId) {
                clearTimeout(reconnectTimeoutId);
                reconnectTimeoutId = null;
            }
        };

        eventSource.onerror = function(error) {
            console.error('EventSource failed:', error);
            messagesDiv.innerHTML = `<p><strong>${window.locale.sse.error}</strong></p>`;
            messagesDiv.classList.add('active');

            // Close the current connection
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }

            // Schedule reconnection after 5 seconds if still in auto-update mode
            if (autoUpdateMode && !reconnectTimeoutId) {
                console.log('Scheduling SSE reconnection in 5 seconds...');
                reconnectTimeoutId = setTimeout(() => {
                    reconnectTimeoutId = null;
                    connectSSE();
                }, 5000);
            }
        };

        eventSource.onmessage = function(event) {
            console.log('Received generic event:', event.data);

            // Clear error messages on successful message receipt (fallback for onopen)
            if (messagesDiv.classList.contains('active')) {
                messagesDiv.innerHTML = '';
                messagesDiv.classList.remove('active');
            }

            // Clear any pending reconnect timeout since we're receiving messages
            if (reconnectTimeoutId) {
                clearTimeout(reconnectTimeoutId);
                reconnectTimeoutId = null;
            }

            // Parse the event data
            try {
                const eventData = JSON.parse(event.data);

                // Check if the event has a date field and it matches today
                if (eventData.date) {
                    const today = getCurrentLocalDate(); // YYYY-MM-DD format
                    const eventDate = eventData.date;

                    // If event date matches today and we're in auto-update mode, schedule reload
                    if (eventDate === today && autoUpdateMode) {
                        console.log('Auto-update: Scheduling timeline reload due to SSE event for today');
                        scheduleTimelineReload(eventData);
                    }
                }
            } catch (error) {
                console.warn('Could not parse SSE event data:', error);
            }
        };
    }

    function updateAutoUpdateTime() {
        const now = new Date();
        const dateElement = document.getElementById('auto-update-date');
        const timeElement = document.getElementById('auto-update-time');

        // Use browser locale for date formatting
        const dateOptions = {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        };
        const formattedDate = now.toLocaleDateString(navigator.language, dateOptions);

        // Use browser locale for time formatting
        const timeOptions = {
            hour: '2-digit',
            minute: '2-digit',
            hour12: false
        };
        const formattedTime = now.toLocaleTimeString(navigator.language, timeOptions);

        dateElement.textContent = formattedDate;
        timeElement.textContent = formattedTime;

    function updateTodayFabVisibility() {
        const todayFab = document.getElementById('today-fab');
        if (!todayFab || !window.horizontalDatePicker) return;

        const today = getCurrentLocalDate();
        const isDatePickerHidden = document.body.classList.contains('datepicker-hidden');
        const isTodayVisible = window.horizontalDatePicker.isDateVisible(today);

        // Check if today is selected
        const selectedRange = window.horizontalDatePicker.getSelectedRange();
        const isTodaySelected = selectedRange && selectedRange.startDate === today &&
                               (!selectedRange.endDate || selectedRange.endDate === today);

        // Show FAB if date picker is visible and (today is not visible OR today is not selected)
        if (!isDatePickerHidden && (!isTodayVisible || !isTodaySelected)) {
            todayFab.style.display = 'flex';
        } else {
            todayFab.style.display = 'none';
        }

    function updateEditPlaceLinks() {
        const currentUrl = window.location.href;
        const editLinks = document.querySelectorAll('.timeline-container .edit-icon[href*="/settings/places/"]');

        editLinks.forEach(link => {
            const href = link.getAttribute('href');
            const url = new URL(href, window.location.origin);
            url.searchParams.set('returnUrl', currentUrl);
            link.setAttribute('href', url.toString());
        });
    }

        toggleAutoUpdate();

    document.addEventListener('DOMContentLoaded', function () {
        if (window.userSettings.uiMode !== 'SHARED_LIVE_MODE_ONLY') {
            // Restore timeline state on page load
            restoreTimelineState();
            // Restore date picker state on page load
            restoreDatePickerState();
        } else {
            document.body.classList.add('datepicker-hidden')
            document.body.classList.add('timeline-hidden')
        }

        function loadTimelineData() {
            // photoClient.updatePhotosForRange(startDate, endDate, getUserTimezone());
            userConfigs.forEach(config => {
                console.log('Loading timeline data for user:', JSON.stringify(config));
                loadMetaData(config)
            });
        }

        function calculateUserConfigs() {
            const timelineContainers = document.querySelectorAll('.user-timeline-section');
            const configs = [];
            timelineContainers.forEach(container => {
                const config = {
                    respectBounds: true,
                    url: container.dataset.rawLocationPointsUrl,
                    color: container.dataset.baseColor,
                    avatarUrl: container.dataset.userAvatarUrl,
                    avatarFallback: container.dataset.avatarFallback,
                    displayName: container.dataset.displayName,
                    map: {
                        metaDataUrl: container.dataset.locationMetadataUrl,
                        streamUrl: container.dataset.locationStreamUrl,
                        visitsUrl: container.dataset.processedVisitsUrl
                    }
                };
                configs.push(config);
            });
            return configs;
        }

        // Add HTMX event handlers for timeline updates
        document.body.addEventListener('htmx:afterSwap', function (event) {
            if (event.detail.target.classList.contains('timeline-container')) {
                userConfigs = calculateUserConfigs();

                // Timeline content has been updated, update map markers
                const params = getTimelineParams();
                const requestedStart = Math.floor(new Date(params.startDate).getTime() / 1000);
                const requestedEnd = Math.floor(new Date(params.endDate).getTime() / 1000);

                // 2. Setup the UI immediately
                globalTripData = [];
                updateTripsLayer(0);
                initSlider(requestedStart, requestedEnd);
                loadTimelineData();

                // Initialize scroll indicator after timeline is updated
                if (window.timelineScrollIndicator) {
                    window.timelineScrollIndicator.cleanup();
                }
                window.timelineScrollIndicator = new TimelineScrollIndicator();
                window.timelineScrollIndicator.init();

                updateEditPlaceLinks();
            }
        });
        // Handle clicks on timeline entries
        document.querySelector('.timeline-container').addEventListener('click', function (event) {
            const entry = event.target.closest('.timeline-entry');
            if (!entry) return;

            const editingElement = event.target.closest('.editing');
            if (editingElement || event.target.classList.contains('edit-icon')) {
                return;
            }
            // Check if this entry is already active (deselection case)
            const isCurrentlyActive = entry.classList.contains('active');

            // Remove active class from all entries
            document.querySelectorAll('.timeline-container .timeline-entry')
                .forEach(e => e.classList.remove('active'));
            const isTrip = entry.classList.contains('trip');

            if (isCurrentlyActive) {
                if (window.originalBounds && window.originalBounds.isValid()) {
                    map.flyToBounds(window.originalBounds, rawLocationLoader.fitToBoundsConfig);
                }
            } else {
                // Selection: set time range and zoom to specific entry
                entry.classList.add('active');
                const newBounds = L.latLngBounds();

                const lat = parseFloat(entry.dataset.lat);
                const lng = parseFloat(entry.dataset.lng);
                const startTime = entry.dataset.start;
                const endTime = entry.dataset.end;

                // Set selected time range in raw location loader
                if (isTrip && startTime && endTime) {
                    rawLocationLoader.setSelectedTimeRange(startTime, endTime).then(selectedRangeBounds => {
                        if (selectedRangeBounds && selectedRangeBounds.isValid()) {
                            newBounds.extend(selectedRangeBounds);
                        }

                        if (!isNaN(lat) && !isNaN(lng)) {
                            newBounds.extend([lat, lng]);
                        }

                        if (newBounds.isValid()) {
                            map.flyToBounds(newBounds, rawLocationLoader.fitToBoundsConfig);
                        }
                    });
                    return; // Exit early since we handle bounds in the promise
                }

                if (!isNaN(lat) && !isNaN(lng)) {
                    newBounds.extend([lat, lng]);
                }

                if (newBounds.isValid()) {
                    map.flyToBounds(newBounds, rawLocationLoader.fitToBoundsConfig);
                }
            }
        });

        window.horizontalDatePicker = new DatePicker('date-picker-container', {
            daysToShow: 14,
            prefetchDays: 25,
            allowRangeSelection: true,
            singleDateMode: true, // Enable single date mode with locking
            dateFormat: 'YYYY-MM-DD',
            locale: navigator.language,
            strings: {
                clickToUnlockDate: /*[[#{datepicker.click-to-unlock-date}]]*/ 'Click to unlock date',
                clickToLockDate: /*[[#{datepicker.click-to-lock-date}]]*/ 'Click to lock date',
                clickToClearSelection: /*[[#{datepicker.click-to-clear-selection}]]*/ 'Click to clear selection',
                clickToCreateRange: /*[[#{datepicker.click-to-create-range}]]*/ 'Click to create range',
                clickToExpandRangeBackward: /*[[#{datepicker.click-to-expand-range-backward}]]*/ 'Click to expand range backward',
                clickToExpandRangeForward: /*[[#{datepicker.click-to-expand-range-forward}]]*/ 'Click to expand range forward',
                clickToAdjustRangeStart: /*[[#{datepicker.click-to-adjust-range-start}]]*/ 'Click to adjust range start',
                clickToUnlockMonth: /*[[#{datepicker.click-to-unlock-month}]]*/ 'Click to unlock month',
                clickToLockMonth: /*[[#{datepicker.click-to-lock-month}]]*/ 'Click to lock month',
                clickToUnlockYear: /*[[#{datepicker.click-to-unlock-year}]]*/ 'Click to unlock year',
                clickToLockYear: /*[[#{datepicker.click-to-lock-year}]]*/ 'Click to lock year',
                select: /*[[#{datepicker.select}]]*/ 'Select',
                to: /*[[#{datepicker.to}]]*/ 'to'
            }
        });

        window.horizontalDatePicker.on('selectionChange', function (data) {
            console.log(`Selection changed`, data);
            const startDate = new Date(data.startDate + 'T00:00:00');
            let endDate;
            if (data.endDate) {
                endDate = new Date(data.endDate + 'T00:00:00');
            } else {
                switch (data.timeband) {
                    case 'day':
                        endDate = startDate;
                        break;
                    case 'month':
                        endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0);
                        break;
                    case 'year':
                        endDate = new Date(startDate.getFullYear(), 11, 31);
                        break;
                }
            }
            currentDateRange = {
                startDate: window.horizontalDatePicker.formatDate(startDate),
                endDate: window.horizontalDatePicker.formatDate(endDate)
            };
            updateUrlWithDate(currentDateRange);
            // Trigger HTMX reload of timeline
            document.body.dispatchEvent(new CustomEvent('dateChanged'));

            // Check if today FAB should be shown
            updateTodayFabVisibility();
        });

        // Listen for date picker view changes to update FAB visibility
        window.horizontalDatePicker.on('viewChange', function () {
            updateTodayFabVisibility();
        });

        const startingDate = loadStartingDate();
        console.log(`Starting date: ${startingDate[0]} - ${startingDate[1]}`)
        window.horizontalDatePicker.setSelectedRange(startingDate[0], startingDate[1]);

        document.getElementById('speed-selector').onchange = function(e) {
            if (e.target.value === 'auto') {
                calculateSpeed(globalMinTimestamp, globalMaxTimestamp);
            } else {
                timeMultiplier = parseInt(e.target.value);
            }
        };

        const settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) {
            settingsBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // Prevent event bubbling
                openSettingsMenu();
            });
        }

        // Close settings menu when clicking outside
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('settings-menu');
            const overlay = document.getElementById('settings-overlay');
            const settingsBtn = document.getElementById('settings-btn');

            if (menu && overlay && menu.classList.contains('visible')) {
                // Check if click is outside menu and not on settings button
                if (!menu.contains(e.target) && !settingsBtn.contains(e.target)) {
                    closeSettingsMenu();
                }
            }
        });

        // Load and apply settings on page load
        const savedSettings = loadSettings();
        applySettings(savedSettings);

        const toggleTimeControlsBtn = document.getElementById('toggle-time-control-btn');
        if (toggleTimeControlsBtn) {
            toggleTimeControlsBtn.addEventListener('click', function() {
                toggleTimeControls();
            });
        }

        document.getElementById('view-mode').onchange = function(e) {
            updateMapMode(e.target.value);
        };

        restoreTimelineControlsState();

        document.getElementById('aggregate-toggle').onchange = (e) => {
            const isAggregate = e.target.checked;
            const slider = document.getElementById('time-slider');

            if (isAggregate) {
                slider.max = 86400; // 24 hours
                slider.step = 60;    // 1 minute increments
            } else {
                slider.max = globalMaxTimestamp - globalMinTimestamp;
                slider.step = 1;
            }
            slider.value = 0; // Reset to start of day/range
            localStorage.setItem('aggregate', isAggregate);
            updateTripsLayer(0);
        };
    })

    function updateMapMode(value) {
        localStorage.setItem('view-mode', value);
        updateTripsLayer(0);
    }

    function openSettingsMenu() {
        const menu = document.getElementById('settings-menu');
        const overlay = document.getElementById('settings-overlay');

        if (menu && overlay) {
            menu.style.display = 'block';
            overlay.style.display = 'block';

            // Trigger reflow to enable transition
            setTimeout(() => {
                menu.classList.add('visible');
                overlay.classList.add('visible');
            }, 10);
        }
    }

    function closeSettingsMenu() {
        const menu = document.getElementById('settings-menu');
        const overlay = document.getElementById('settings-overlay');

        if (menu && overlay) {
            menu.classList.remove('visible');
            overlay.classList.remove('visible');

            // Wait for transition to complete before hiding
            setTimeout(() => {
                menu.style.display = 'none';
                overlay.style.display = 'none';
            }, 300);
        }
    }

    function loadSettings() {
        return  {
            aggregate: localStorage.getItem('aggregate') === 'true',
            mapMode: localStorage.getItem('view-mode') || 'LINEAR',
        };
    }

    function applySettings(settings) {
        const aggregateToggle = document.getElementById('aggregate-toggle');
        aggregateToggle.checked = settings.aggregate;
        document.getElementById('view-mode').value = settings.mapMode;
    }

    function toggleTimeControls() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        // Check if controls are currently visible
        const isVisible = !timelineControls.classList.contains('hidden');

        if (isVisible) {
            // Hide the controls
            timelineControls.classList.add('hidden');
            toggleBtn.classList.remove('active');
            toggleBtn.title = window.locale.timeline.state.show;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'true');
        } else {
            // Show the controls
            timelineControls.classList.remove('hidden');
            toggleBtn.classList.add('active');
            toggleBtn.title = window.locale.timeline.state.hide;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'false');
        }
    }

    function restoreTimelineControlsState() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const isHidden = localStorage.getItem('timelineControlsHidden') === 'true';

        if (isHidden) {
            timelineControls.classList.add('hidden');
            toggleBtn.title = window.locale.timeline.state.show;
            toggleBtn.classList.remove('active');
        } else {
            timelineControls.classList.remove('hidden');
            toggleBtn.title = window.locale.timeline.state.hide;
            toggleBtn.classList.add('active');
        }
    }

    // Function to update the display values for sliders
    function updateSliderDisplays() {
        document.getElementById('trail-length-value').textContent = deckParams.trailLength;
        document.getElementById('comet-width-value').textContent = deckParams.cometWidth;
        document.getElementById('path-width-value').textContent = deckParams.pathWidth;
        document.getElementById('path-opacity-value').textContent = deckParams.pathOpacity;
        document.getElementById('visit-radius-value').textContent = deckParams.visitRadius;
        document.getElementById('visit-opacity-value').textContent = deckParams.visitOpacity;
        document.getElementById('bundled-precision-value').textContent = deckParams.bundledPrecision;
    }

    // Function to apply the parameters to deck.gl layers
    function applyDeckParams() {
        // Update the globalTripData with new bundled precision if needed
        if (globalTripData.length > 0) {
            globalTripData.forEach(trip => {
                // Recalculate snappedPath based on new bundled precision
                const p = deckParams.bundledPrecision;
                trip.snappedPath = trip.path.map(coord => [
                    Math.round(coord[0] / p) * p,
                    Math.round(coord[1] / p) * p
                ]);
            });
        }

        // Trigger a re-render of the deck.gl layers
        updateTripsLayer(currentSliderValue);
    }

    document.getElementById('trail-length').addEventListener('input', function (e) {
        deckParams.trailLength = parseInt(e.target.value);
        updateSliderDisplays();
        applyDeckParams(); // Apply immediately
    });

        deckParams.cometWidth = parseInt(e.target.value);
        updateSliderDisplays();
        applyDeckParams(); // Apply immediately
    });

    });

        deckParams.visitRadius = parseInt(e.target.value);
        updateSliderDisplays();

            trailLength: 1800,
            cometWidth: 8,
            pathWidth: 8,
            pathOpacity: 40,
            visitRadius: 15,

            bundledPrecision: 0.0001

        document.getElementById('trail-length').value = deckParams.trailLength;
        document.getElementById('comet-width').value = deckParams.cometWidth;
        document.getElementById('path-width').value = deckParams.pathWidth;
        document.getElementById('path-opacity').value = deckParams.pathOpacity;
        document.getElementById('visit-radius').value = deckParams.visitRadius;
        document.getElementById('visit-opacity').value = deckParams.visitOpacity;
        document.getElementById('bundled-precision').value = deckParams.bundledPrecision;

        updateSliderDisplays();
        applyDeckParams();
        console.log('Reset deck.gl parameters to defaults');
    });

    // Initialize displays on page load
    document.addEventListener('DOMContentLoaded', function () {
        updateSliderDisplays();
    });
