<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">Reitti - Your Location Timeline</title>
    <link rel="manifest" crossorigin="use-credentials" th:href="@{/manifest.json}">
    <link rel="apple-touch-icon" th:href="@{/img/logo-192x192.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/logo-180x180.png}">
    <link rel="icon" th:href="@{/img/logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/logo.svg}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/leaflet.css}" href="/css/leaflet.css">
    <link rel="stylesheet" th:href="@{/css/date-picker.css}" href="/css/date-picker.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/lineicons.css}" href="/css/lineicons.css">
    <link rel="stylesheet" th:href="@{/css/photo-client.css}" href="/css/photo-client.css">
    <link rel="stylesheet" th:href="@{/css/inline-edit.css}" href="/css/inline-edit.css">
    <link rel="stylesheet" th:href="@{/css/avatar-marker.css}" href="/css/avatar-marker.css">
    <link rel="stylesheet" th:href="@{/css/maplibre-gl.5.16.0.min.css}" href="/css/maplibre-gl.5.16.0.min.css">
    <link rel="stylesheet" th:href="@{/css/time-control.css}" href="/css/time-control.css">
    <link th:if="${userSettings.customCssUrl}" rel="stylesheet" th:href="${userSettings.customCssUrl}">
    <script th:src="@{/js/messages.js(v=${appVersion})}"></script>
    <script th:src="@{/js/HumanizeDuration.js}"></script>
    <script th:src="@{/js/date-picker-combined.js}"></script>
    <script th:src="@{/js/timeline-scroll-indicator.js}"></script>
    <script th:src="@{/js/vendor/htmx.min.js}"></script>
    <script th:src="@{/js/polygon-editor.js}"></script>
    <script th:src="@{/js/util.js}"></script>
    <script th:src="@{/js/vendor/deckgl.9.2.6.min.js}"></script>
    <script th:src="@{/js/vendor/maplibre-gl.5.17.0.min.js}"></script>
    <script th:src="@{/js/vendor/supercluster.7.0.0.min.js}"></script>
    <script th:src="@{/js/timeline-control.js}"></script>
    <script th:src="@{/js/map-customization.js}"></script>
    <script th:src="@{/js/gps-data-manager.js}"></script>
    <script th:src="@{/js/map-renderer.js}"></script>
    <script th:src="@{/js/map-controls.js}"></script>
    <script th:src="@{/js/PhotoClusterManager.js}"></script>
    <script th:src="@{/js/LiveModeController.js}"></script>
    <script th:src="@{/js/SettingsMenu.js}"></script>
    <script th:src="@{/js/auto-complete.js}"></script>
    <script th:src="@{/js/vendor/chart.js}"></script>
    <style>
        /* Overlay styles */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .overlay-content {
            position: relative;
            background: var(--color-background-dark, #1e1e1e);
            border-radius: 12px;
            min-width: 360px;
            max-width: 600px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
            padding: 0 24px 24px 24px;
        }

        .overlay-content h2 {
            border-bottom: 1px solid var(--color-highlight);
            padding-bottom: 12px;
            color: var(--color-highlight);
            font-weight: 100;
            font-family: var(--sans-serif-font);
        }


    </style>
</head>
<body>
<div id="new-map" style="display: block"></div>
<div id="loading-overlay" class="loading-overlay">
    <div class="progress-container">
        <div id="progress-bar" class="loading-progress-bar"></div>
    </div>
    <div id="status-text" class="status-text">Ready</div>
</div>
<div id="metadata-overlay" class="overlay hidden">
    <div class="overlay-backdrop" onclick="closeMetadataOverlay()"></div>
    <div class="overlay-content" id="metadata-overlay-content">
        <!-- Content loaded via HTMX -->
    </div>
</div>
<!-- Auto-update overlay -->
<div id="auto-update-overlay" class="auto-update-overlay">
    <button sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_USER', 'ROLE_MAGIC_LINK_FULL_ACCESS')"
            class="overlay-button exit-button" th:title="#{map.auto-update.disable.title}">
        <i class="lni lni-pause"></i>
    </button>
    <button sec:authorize="hasAnyRole('ROLE_MAGIC_LINK_ONLY_LIVE', 'ROLE_MAGIC_LINK_ONLY_LIVE_WITH_PHOTOS', 'ROLE_MAGIC_LINK_ONLY_LAST_LOCATION')"
            class="overlay-button exit-button" th:title="#{js.map.display-control.title}">
        <div id="live-mode-map-controls-section"></div>
    </button>
    <button class="overlay-button fullscreen-button" onclick="toggleFullscreen()" th:title="#{map.fullscreen.toggle.title}" title="Toggle Fullscreen">
        <i class="lni lni-arrow-all-direction"></i>
    </button>
    <div class="date" id="auto-update-date"></div>
    <div class="time" id="auto-update-time"></div>
</div>
<div class="navigation-container" th:replace="~{fragments/main-navigation :: main-navigation('index')}"></div>

<div class="timeline">
    <div class="timeline-container"
         th:hx-get="@{/timeline/content/range}"
         hx-trigger="dateChanged from:body"
         hx-vals="js:{startDate: getTimelineParams().startDate, endDate: getTimelineParams().endDate, timezone: getTimelineParams().timezone}"
         hx-indicator="#loading-indicator">
        <div id="loading-indicator" class="timeline-entry" th:text="#{timeline.loading}">Loading...</div>
    </div>
</div>

<div id="auto-update-user-selection" th:hx-get="@{/timeline/user-selection}" class="hidden"
     hx-trigger="dateChanged  from:body"
     hx-vals="js:{startDate: getTimelineParams().startDate, endDate: getTimelineParams().endDate, timezone: getTimelineParams().timezone}">

</div>
<div id="date-picker-container"></div>
<div id="tooltip" style="position: absolute; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 4px; display: none; font-family: sans-serif; font-size: 12px; max-width: 300px;"></div>

<div id="timeline-controls"></div>
<div class="fab-container" id="fab-container">
    <div id="hover-info" class="range-selection-info hidden">
        2012-01-01 - 2013-03-23
    </div>
    <div class="play-section">
        <button type="button" class="btn fab-btn" id="play-btn" title="Start Animation">
            <i class="lni lni-play"></i>
        </button>
        <div class="speed-control" id="speed-control">
            <select id="speed-selector" th:title="#{map.time-control.speed.title}">
                <option value="1" th:text="#{map.time-control.speed.normal}">Normal (1x)</option>
                <option value="60" th:text="#{map.time-control.speed.fast}">Fast (60x)</option>
                <option value="3600" th:text="#{map.time-control.speed.super_fast}">Super Fast (3600x)</option>
                <option value="auto" th:text="#{map.time-control.speed.auto}">Auto-Adjust</option>
                <option value="adaptive" selected th:text="#{map.time-control.speed.adaptive}">Adaptive</option>
            </select>
        </div>
    </div>
    <button type="button" class="btn fab-btn" id="toggle-time-control-btn"  th:title="#{map.time-control.speed.show.title}" title="Show time controls">
        <i class="lni lni-stopwatch"></i>
    </button>
    <span class="time-display" id="time-display"></span>
    <button type="button" class="btn fab-btn today-btn" id="today-fab" onclick="goToToday()" style="display: none;"
            th:title="#{datepicker.today.title}" title="Go to Today">
        <i class="lni lni-calendar-days"></i>
        <span th:text="#{datepicker.today}">Today</span>
    </button>

    <div id="map-controls-section"></div>

    <!-- Settings button -->
    <button type="button" class="btn fab-btn settings-btn" id="settings-btn" th:title="#{map.map-settings.button.title}" title="Settings">
        <i class="lni lni-gear-1"></i>
    </button>
</div>

<div id="settings-menu-container"></div>

<script th:inline="javascript">
    window.contextPath = /*[[@{/}]]*/ "/";
    window.contextPath = window.contextPath.replace(/\/$/, '');

    // Locale object for JavaScript
    window.locale = {
        today: t('datepicker.today'),
        days: [
            t('datepicker.days.sun'),
            t('datepicker.days.mon'),
            t('datepicker.days.tue'),
            t('datepicker.days.wed'),
            t('datepicker.days.thu'),
            t('datepicker.days.fri'),
            t('datepicker.days.sat')
        ],
        months: [
            t('datepicker.months.jan'),
            t('datepicker.months.feb'),
            t('datepicker.months.mar'),
            t('datepicker.months.apr'),
            t('datepicker.months.may'),
            t('datepicker.months.jun'),
            t('datepicker.months.jul'),
            t('datepicker.months.aug'),
            t('datepicker.months.sep'),
            t('datepicker.months.oct'),
            t('datepicker.months.nov'),
            t('datepicker.months.dec')
        ]
    };


    window.userSettings = /*[[${userSettings}]]*/ {}
    window.reittiCustomMapStyles = /*[(${mapStylesJson})]*/ [];
    window.reittiActiveMapStyleId = /*[[${activeMapStyleId}]]*/ null;

    let gpsDataManagers = [];
    let currentDateRange = null;


    const timelineControl = new TimelineControl(
        document.getElementById('timeline-controls'),
        document.getElementById('time-display')
    );

    timelineControl.on('offsetChanged', () => {
        mapRenderer.updateViewState(createViewState([]))
    })

    const liveModeController = new LiveModeController('auto-update-btn', 'auto-update-overlay');
    const settingsMenu = new SettingsMenu('settings-menu-container');

    liveModeController.on('autoUpdateModeChanged', (autoUpdateMode) => {
        const timeline = document.querySelector('.timeline');
        const datePicker = document.getElementById('date-picker-container');
        const fabContainer = document.getElementById('fab-container');
        const autoUpdateUserSelection = document.getElementById('auto-update-user-selection');

        if (autoUpdateMode) {
            timeline.classList.add('hidden');
            datePicker.classList.add('hidden');
            fabContainer.classList.add('hidden');
            autoUpdateUserSelection.classList.remove('hidden');
            if (window.horizontalDatePicker) {
                window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate(), null);
            }
            timelineControl.hide();
        } else {
            timeline.classList.remove('hidden');
            datePicker.classList.remove('hidden');
            fabContainer.classList.remove('hidden');
            autoUpdateUserSelection.classList.add('hidden');
        }
        updateAvatarsVisibility();
        handleAutoTodaySelectionTimer(autoUpdateMode)
    })

    const mapControls = new MapControls('map-controls-section');
    const mapRenderer = new MapRenderer('new-map', userSettings, createViewState());

    let previousCameraState = null;
    let activeFocus = null;

    mapRenderer.updateViewState(createViewState( [] ) );
    mapControls.on('selectionChanged', () => {
        mapRenderer.updateViewState(createViewState([]));
    });
    mapControls.on('compassClicked', () => mapRenderer.setBearing(0));

    if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
        mapControls.mountTo(document.getElementById('live-mode-map-controls-section'));
    }
    let userConfigs = [];
    let animationId = null;
    let lastFrameTime = null;
    let isPlaying = false;
    let timeMultiplier = 30; // Default: 1 second = 1 minute

    const playBtn = document.getElementById('play-btn');

    playBtn.onclick = () => {
        if (isPlaying) {
            stopAnimation();
        } else {
            startAnimation();
        }
    };

    function updateAvatarsVisibility() {
        const isAutoUpdate = Boolean(liveModeController && liveModeController.isActive());

        if (isAutoUpdate) {
            mapRenderer.enableAvatars();
            return;
        }

        const settingEnabled = localStorage.getItem('showAvatars') !== 'false';
        if (!settingEnabled) {
            mapRenderer.disableAvatars();
            return;
        }

        // Normal mode: only show avatars if the selected date is today
        const today = getCurrentLocalDate(); // e.g. "2023-06-01"
        const selectedStart = currentDateRange?.startDate;
        const isSingleToday = selectedStart === today && (!currentDateRange?.endDate || currentDateRange.endDate === today);

        if (!isSingleToday) {
            mapRenderer.disableAvatars();
            return;
        }

        const todayStart = Math.floor(new Date(today + 'T00:00:00').getTime());
        const todayEnd = todayStart + 86400000; // 24 hours

        mapRenderer.enableAvatars(todayStart, todayEnd);
    }

    function startAnimation() {
        isPlaying = true;
        playBtn.innerHTML = '<i class="lni lni-pause"></i>'; // Change icon to Pause
        lastFrameTime = null;
        animationId = requestAnimationFrame(animate);
    }

    function stopAnimation() {
        isPlaying = false;
        playBtn.innerHTML = '<i class="lni lni-play"></i>'; // Change icon to Play
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
        timelineControl.setOffset(0);
        mapRenderer.updateViewState(createViewState([]));
    }

    function calculateTimelineMultiplier() {
        const params = getTimelineParams();
        const aggregateToggle = document.getElementById('aggregate-toggle');

        if (aggregateToggle && aggregateToggle.checked) {
            timeMultiplier = 60 * 60 * 24 / 30;
        } else {
            const totalSeconds = params.endDateUtcSeconds - params.startDateUtcSeconds;
            const targetDuration = 30;
            timeMultiplier = totalSeconds / targetDuration;
            console.log(`Animation speed set to: ${timeMultiplier}x real time`);
        }
    }

    let linearProgress = 0;

    function animate(now) {
        if (!isPlaying) return;
        if (lastFrameTime === null) {
            lastFrameTime = now;
            animationId = requestAnimationFrame(animate);
            return;
        }

        const deltaTime = (now - lastFrameTime) / 1000; // seconds
        lastFrameTime = now;

        // Prevent large jumps (e.g., tab switching)
        if (deltaTime > 0.1) {
            animationId = requestAnimationFrame(animate);
            return;
        }

        const manager = gpsDataManagers[0];

        // Calculate linear progress (0 → 1) over the full loop

        const totalLoopTime = parseFloat(timelineControl.getMaxOffset()) / timeMultiplier;
        const activityPerSecond = manager.totalActivity / totalLoopTime;
        linearProgress += (deltaTime * activityPerSecond) / manager.totalActivity;

        if (linearProgress >= 1) {
            linearProgress -= 1; // loop back to start
        }

        const warp = document.getElementById('speed-selector').value === 'adaptive';
        let adaptedOffset;
        if (manager && typeof manager.getDisplayTimestamp === 'function') {
            const minTs = manager.minTimestamp;
            if (timelineControl.aggregate) {
                // aggregate mode: timestamp is seconds-of-day (0–86400)
                adaptedOffset = linearProgress * 86400;
            } else {
                const adaptedTimestamp = manager.getDisplayTimestamp(linearProgress, warp, timelineControl.aggregate);
                adaptedOffset = adaptedTimestamp - minTs;
            }
        } else {
            adaptedOffset = linearProgress * parseFloat(timelineControl.getMaxOffset());
        }
        // Apply the adapted offset to the slider and the map
        timelineControl.setOffset(adaptedOffset);
        mapRenderer.updateViewState(createViewState([]));

        animationId = requestAnimationFrame(animate);
    }

    function formatDateTime(ts) {
        switch (window.userSettings.timeMode) {
            case 'TWENTY_FOUR_HOUR':
                return new Date(ts).toLocaleDateString(window.userSettings.selectedLocale, { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
            case 'TWELVE_HOUR':
                return new Date(ts).toLocaleDateString(window.userSettings.selectedLocale, { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

    }

    function updateStatus(message, current, total) {
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('status-text');
        const overlay = document.getElementById('loading-overlay');

        overlay.style.transition = 'none';
        overlay.style.opacity = '1';

        const percentage = Math.min(100, Math.round((current / total) * 100));
        bar.style.width = `${percentage}%`;

        const currentFormatted = current?.toLocaleString();
        const totalFormatted = total?.toLocaleString();

        text.innerText = message
            .replace('{0}', currentFormatted)
            .replace('{1}', totalFormatted);

        // Handle completion
        if (current >= total) {
            fadeOutOverlay(overlay);
        }
    }

    function loadGpsData(requestedStart, requestedEnd) {
        const RENDER_CHUNK_SIZE = 50000;
        const completedManagers = new Set();

        gpsDataManagers.forEach((gpsDataManager, index) => {
            let lastRenderedPointCount = 0;
            gpsDataManager.load(requestedStart, requestedEnd, (current, total, stage) => {

                switch (stage) {
                    case 'metadata':
                        updateStatus("Fetching metadata...", 10, 100);

                        break;
                    case 'streaming':
                        updateStatus("Loading point {0} / {1}", current, total);
                        if (current - lastRenderedPointCount >= RENDER_CHUNK_SIZE) {
                            lastRenderedPointCount = current;
                            requestAnimationFrame(() => {
                                mapRenderer._refitBounds();
                                mapRenderer.updateViewState(createViewState());
                            });
                        }
                        break;
                    case 'bundling':
                        updateStatus("Optimizing routes: {0} / {1} points", current, total);
                        break;
                    case 'complete':
                        lastRenderedPointCount = 0;
                        const aggregateToggle = document.getElementById('aggregate-toggle');
                        timelineControl.setup({
                            aggregate: aggregateToggle ? aggregateToggle.checked : false,
                            minTimestamp: gpsDataManager.minTimestamp,
                            maxTimestamp: gpsDataManager.maxTimestamp,
                        })
                        calculateTimelineMultiplier();
                        updateStatus("Finished processing {1} points", current, total);
                        mapRenderer.updateViewState(createViewState());
                        completedManagers.add(index);
                        if (completedManagers.size === gpsDataManagers.length) {
                            mapRenderer.finishedLoading();
                        }

                }
            });
        });
    }

    function fadeOutOverlay(overlay) {
        setTimeout(() => {
            overlay.style.transition = 'opacity 1s ease';
            overlay.style.opacity = '0';
        }, 1500);
    }

    function getSelectedDate() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('startDate') && urlParams.has('endDate')) {
            return urlParams.get('startDate');
        } else if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
            return getCurrentLocalDate();
        } else if (window.userSettings.newestData) {
            return getAsLocalDate(window.userSettings.newestData);
        } else {
            return getCurrentLocalDate();
        }
    }

    function getTimelineParams() {
        const timezone = getUserTimezone();
        if (currentDateRange && currentDateRange.startDate && currentDateRange.endDate) {
            // Range mode - use actual range
            const startDate = new Date(currentDateRange.startDate);
            startDate.setHours(0, 0, 0, 0);
            const requestedStartUTCSeconds = Math.floor(startDate.getTime() / 1000);
            const endDate = new Date(currentDateRange.endDate);
            endDate.setHours(23, 59, 59);
            const requestedEndUTCSeconds = Math.floor(endDate.getTime() / 1000);
            return {
                startDate: currentDateRange.startDate,
                startDateUtcSeconds: requestedStartUTCSeconds,
                endDate: currentDateRange.endDate,
                endDateUtcSeconds: requestedEndUTCSeconds,
                timezone: timezone
            };
        } else {
            throw new Error('Invalid date range');
        }
    }

    function showUser(userHeader) {
        mapRenderer.setSelectedManager(userHeader.getAttribute('data-user-id'));
    }

    function toggleDeviceMenu(btn) {
        const container = btn.closest('.device-toggle-container');
        const menu = container.querySelector('.device-menu');
        document.querySelectorAll('.device-menu:not(.hidden)').forEach(m => {
            if (m !== menu) {
                m.classList.add('hidden');
            }
        });
        menu.classList.toggle('hidden');
    }

    function enableDeviceGpsDataManager(userId, deviceId, displayName, color, avatarUrl, avatarFallback, showAvatar, metaDataUrl, streamUrl) {
        const config = {
            id: `${userId}_${deviceId}`,
            respectBounds: true,
            color: color,
            avatarUrl: avatarUrl,
            avatarFallback: avatarFallback,
            showAvatar: showAvatar,
            displayName: displayName,
            map: {
                metaDataUrl: metaDataUrl,
                streamUrl: streamUrl,
            },
            continuous: false
        };
        gpsDataManagers.push(new GpsDataManager(config, window.userSettings, getUserTimezone()));
    }

    function restoreDeviceVisibility() {
        document.querySelectorAll('.device-header').forEach(checkbox => {
            const userId = checkbox.dataset.userId;
            const deviceId = checkbox.dataset.deviceId;
            const displayName = checkbox.dataset.displayName;
            const metaDataUrl = checkbox.dataset.deviceMetadataUrl;
            const streamUrl = checkbox.dataset.deviceStreamUrl;
            const color = checkbox.dataset.deviceColor;
            const avatarUrl = checkbox.dataset.avatarUrl;
            const avatarFallback = checkbox.dataset.avatarFallback;
            const showAvatar = checkbox.dataset.showAvatar;
            enableDeviceGpsDataManager(userId, deviceId, displayName, color, avatarUrl, avatarFallback, showAvatar, metaDataUrl, streamUrl);
        });
    }

    function followUser(btn) {
        const userHeader = btn.closest('.user-header');
        const rawUserId = userHeader.getAttribute('data-user-id');
        const badge = userHeader.querySelector('.user-follow-badge');
        const wasSelected = badge.classList.contains('active');

        // Deselect all badges
        document.querySelectorAll('.user-header .user-follow-badge').forEach(element => {
            element.classList.remove('active');
        });

        // Uncheck all checkboxes
        document.querySelectorAll('.user-follow-checkbox').forEach(cb => {
            cb.checked = false;
        });

        if (!wasSelected) {
            // Check every checkbox that belongs to this user
            document.querySelectorAll(`.user-follow-checkbox[data-user-id="${rawUserId}"]`).forEach(cb => {
                cb.checked = true;
            });
            const followedBadge = document.querySelectorAll(`.user-header[data-user-id="${userHeader.dataset.userId}"] .user-follow-badge`);
            // Activate all badges for this user
            followedBadge.forEach(badge => badge.classList.add('active'));

            mapRenderer.setSelectedManager(rawUserId);
            localStorage.setItem('followedUser', rawUserId);
        } else {
            mapRenderer.setSelectedManager(null);
            localStorage.removeItem('followedUser');
        }
    }

    function selectDevice(userHeader) {
        document.querySelectorAll('.user-header').forEach(header => {
            header.classList.remove('active');
        });
        document.querySelectorAll('.device-header').forEach(header => {
            header.classList.remove('active');
        });
        userHeader.classList.add('active');

        const userId = userHeader.getAttribute('data-user-id');
        const deviceId = userHeader.getAttribute('data-device-id');
        mapRenderer.setSelectedManager(`${userId}_${deviceId}`);
    }

    function selectUser(userHeader) {
        document.querySelectorAll('.user-header').forEach(header => {
            header.classList.remove('active');
        });
        document.querySelectorAll('.device-header').forEach(header => {
            header.classList.remove('active');
        });

        userHeader.classList.add('active');

        const userId = userHeader.getAttribute('data-user-id');

        document.querySelectorAll('.user-timeline-section').forEach(section => {
            section.classList.remove('active');
        });

        const targetSection = document.querySelector(`.user-timeline-section[data-user-id="${userId}"]`);
        if (targetSection) {
            targetSection.classList.add('active');
        }
        mapRenderer.setSelectedManager(userHeader.getAttribute('data-user-id'));
    }

    function updateUrlWithDate(currentDateRange) {
        const url = new URL(window.location);
        url.searchParams.set('startDate', currentDateRange.startDate);
        url.searchParams.set('endDate', currentDateRange.endDate);
        url.searchParams.delete('date');
        window.history.pushState({}, '', url);
    }

    function loadStartingDate() {
        const urlParams = new URLSearchParams(window.location.search);

        let startDate = urlParams.get('startDate');
        let endDate = urlParams.get('endDate');
        if (startDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(startDate)) {
                startDate = null;
            }
        }
        if (endDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(endDate)) {
                endDate = null;
            }
        }

        if (!startDate && !endDate) {
            if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
                return [getCurrentLocalDate(), ];
            } else if (window.userSettings.newestData) {
                return [getAsLocalDate(window.userSettings.newestData),];
            } else {
                return [getCurrentLocalDate(), ];
            }
        } else if (!startDate && endDate) {
            return [endDate, ];
        } else if (startDate && !endDate) {
            return [startDate, ];
        } else if (startDate === endDate) {
            return [startDate, ];
        }
        else {
            return [startDate, endDate];
        }
    }

    function handleAutoTodaySelectionTimer(autoUpdateMode) {
        // Check every 30 seconds if we need to switch to today's date
        if (!autoUpdateMode) {
            if (autoUpdateTimer) {
                clearInterval(autoUpdateTimer);
                autoUpdateTimer = null;
            }
        } else {
            autoUpdateTimer = setInterval(() => {
                if (!autoUpdateMode) {
                    return; // Exit if auto-update mode was disabled
                }

                // If the selected date is not today, switch to today
                if (!isSelectedDateToday()) {
                    console.log('Auto-update: Switching to today\'s date');
                    if (window.horizontalDatePicker) {
                        window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate());
                    }
                }
            }, 30000); // 30 seconds
        }
    }

    function isSelectedDateToday() {
        const today = getCurrentLocalDate();
        const selectedDate = getSelectedDate();
        return selectedDate === today;
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function updateTodayFabVisibility() {
        const todayFab = document.getElementById('today-fab');
        if (!todayFab || !window.horizontalDatePicker) return;

        const today = getCurrentLocalDate();
        const isDatePickerHidden = document.body.classList.contains('datepicker-hidden');
        const isTodayVisible = window.horizontalDatePicker.isDateVisible(today);

        // Check if today is selected
        const selectedRange = window.horizontalDatePicker.getSelectedRange();
        const isTodaySelected = selectedRange && selectedRange.startDate === today &&
                               (!selectedRange.endDate || selectedRange.endDate === today);

        // Show FAB if date picker is visible and (today is not visible OR today is not selected)
        if (!isDatePickerHidden && (!isTodayVisible || !isTodaySelected)) {
            todayFab.style.display = 'flex';
        } else {
            todayFab.style.display = 'none';
        }
    }

    function goToToday() {
        if (window.horizontalDatePicker) {
            window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate(), null);
        }
    }

    function updateEditPlaceLinks() {
        const currentUrl = window.location.href;
        const editLinks = document.querySelectorAll('.timeline-container .edit-icon[href*="/settings/places/"]');

        editLinks.forEach(link => {
            const href = link.getAttribute('href');
            const url = new URL(href, window.location.origin);
            url.searchParams.set('returnUrl', currentUrl);
            link.setAttribute('href', url.toString());
        });
    }

    if (window.userSettings.uiMode === "SHARED_LIVE_MODE_ONLY") {
        liveModeController.enterLiveMode();
    }

    function createViewState(highlightTimes = []) {
        const aggregateToggle = document.getElementById('aggregate-toggle');
        const viewModeSelect = document.getElementById('view-mode');

        return {
            ...mapControls.getState(),
            aggregated: aggregateToggle ? aggregateToggle.checked : false,
            viewMode: viewModeSelect ? viewModeSelect.value : 'LINEAR',
            currentTime: timelineControl.getValue(),
            animating: !timelineControl.isIdle(),
            highlightTimes: highlightTimes,
            showPhotos: window.userSettings.photoMode === 'ENABLED',
        };
    }

    function updateFollowedUser() {
        if (localStorage.getItem('followedUser')) {
            const followedUserId = localStorage.getItem('followedUser');
            const followedBadge = document.querySelectorAll(`.user-header[data-user-id="${followedUserId}"] .user-follow-badge`);
            const followedCheckbox = document.querySelectorAll(`.user-header[data-user-id="${followedUserId}"] .user-follow-checkbox`);

            if (followedBadge) {
                followedBadge.forEach(badge => badge.classList.add('active'));
                followedCheckbox.forEach(cb => cb.checked = 'true');

                mapRenderer.setSelectedManager(followedUserId);
            } else {
                console.warn(`User with ID ${followedUserId} not found in the DOM. Will drop it from local storage.`);
                localStorage.removeItem('followedUser');
            }
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        if (window.userSettings.uiMode !== 'SHARED_LIVE_MODE_ONLY') {
            settingsMenu.restoreState();
        } else {
            document.body.classList.add('datepicker-hidden')
            timelineControl.hide();
        }

        function calculateUserConfigs() {
            const timelineContainers = document.querySelectorAll('.user-timeline-section');
            const configs = [];
            timelineContainers.forEach(container => {
                const config = {
                    id: container.dataset.userId,
                    respectBounds: true,
                    url: container.dataset.rawLocationPointsUrl,
                    color: container.dataset.baseColor,
                    avatarUrl: container.dataset.userAvatarUrl,
                    avatarFallback: container.dataset.avatarFallback,
                    showAvatar: true,
                    displayName: container.dataset.displayName,
                    map: {
                        metaDataUrl: container.dataset.locationMetadataUrl,
                        streamUrl: container.dataset.locationStreamUrl,
                        visitsUrl: container.dataset.processedVisitsUrl
                    },
                    continuous: true
                };
                configs.push(config);
            });
            return configs;
        }

        document.body.addEventListener('htmx:afterSwap', function (event) {
            if (event.detail.target.classList.contains('timeline-container')) {
                userConfigs = calculateUserConfigs();
                gpsDataManagers = [];
                updateFollowedUser();
                stopAnimation();

                const params = getTimelineParams();
                mapRenderer.reset();
                activeFocus = null;
                previousCameraState = null;
                if (window.userSettings.photoMode === 'ENABLED') {
                    try {
                        fetch(`${window.contextPath}/api/v1/photos/immich/range?timezone=${getUserTimezone()}&startDate=${params.startDate}&endDate=${params.endDate}`)
                            .then(response => {
                                    if (response.ok) {
                                        return response.json()
                                    } else {
                                        reject(response)
                                    }
                                }
                            ).then(value => mapRenderer.setPhotos(value), error => mapRenderer.setPhotos([]));
                    } catch (error) {
                        mapRenderer.setPhotos([]);
                    }
                }

                const aggregateToggle = document.getElementById('aggregate-toggle');
                timelineControl.setup({
                    minTimestamp: params.startDateUtcSeconds,
                    maxTimestamp: params.endDateUtcSeconds,
                    aggregate: aggregateToggle ? aggregateToggle.checked : false
                });

                userConfigs.forEach(config => {
                    const gpsDataManager = new GpsDataManager(config, window.userSettings, getUserTimezone());
                    gpsDataManagers.push(gpsDataManager)
                });
                restoreDeviceVisibility()
                mapRenderer.setGpsDataManagers(gpsDataManagers);
                loadGpsData(params.startDateUtcSeconds, params.endDateUtcSeconds);

                // Initialize scroll indicator after timeline is updated
                if (window.timelineScrollIndicator) {
                    window.timelineScrollIndicator.cleanup();
                }
                window.timelineScrollIndicator = new TimelineScrollIndicator();
                window.timelineScrollIndicator.init();
                updateAvatarsVisibility();
                updateEditPlaceLinks();
            }
        });

        function onVisitClick(visit) {
            const deselect = activeFocus && activeFocus.type === 'visit' && activeFocus.id === visit.id;
            if (deselect) {
                if (previousCameraState) {
                    mapRenderer.flyTo(previousCameraState);
                }
                activeFocus = null;
                previousCameraState = null;
            } else {
                if (previousCameraState == null) {
                    previousCameraState = mapRenderer.getCameraState();
                }
                activeFocus = {type: 'visit', id: visit.id, data: visit};
                mapRenderer.flyTo({
                    center: visit.coordinates,
                    zoom: 16,
                    duration: 1500
                });
                mapRenderer.clearHighlight();
            }
        }

        function onTripClick(trip) {
            const deselect = activeFocus && activeFocus.type === 'trip' && activeFocus.id === trip.id;
            if (deselect) {
                mapRenderer.clearHighlight();
                if (previousCameraState) {
                    mapRenderer.flyTo(previousCameraState);
                }
                activeFocus = null;
                previousCameraState = null;
            } else {
                if (previousCameraState == null) {
                    previousCameraState = mapRenderer.getCameraState();
                }

                const startTimeMs = Date.parse(trip.startTime);
                const endTimeMs = Date.parse(trip.endTime);

                const offest = 5 * 60;
                const startTimeSeconds = (startTimeMs / 1000) - offest;
                const endTimeSeconds = (endTimeMs / 1000) + offest;

                if (isNaN(startTimeSeconds) || isNaN(endTimeSeconds)) {
                    console.error("Could not parse trip timestamps:", trip.startTime, trip.endTime);
                    previousCameraState = null;
                    return;
                }

                const tripBounds = mapRenderer.setHighlight({
                    managerId: trip.managerId,
                    startTime: startTimeSeconds,
                    endTime: endTimeSeconds
                });

                if (tripBounds) {
                    activeFocus = {type: 'trip', id: trip.id, data: trip};
                    mapRenderer.fitMapToBounds(tripBounds);
                } else {
                    previousCameraState = null;
                }
            }
        }

        function invalidateSavedState(e) {
            if (e.originalEvent && previousCameraState) {
                console.log("User interaction detected, clearing saved camera state.");
                previousCameraState = null;
            }
        }

        mapRenderer.on('dragstart', invalidateSavedState);
        mapRenderer.on('zoomstart', invalidateSavedState);
        mapRenderer.on('rotatestart', invalidateSavedState);
        mapRenderer.on('boxzoomstart', invalidateSavedState);



        // Handle clicks on timeline entries
        document.querySelector('.timeline-container').addEventListener('click', function (event) {
            const entry = event.target.closest('.timeline-entry');
            if (!entry) return;

            const wasActive = entry.classList.contains('active');

            const editingElement = event.target.closest('.editing');
            if (editingElement || event.target.classList.contains('edit-icon')) {
                return;
            }
            document.querySelectorAll('.timeline-container .timeline-entry').forEach(e => e.classList.remove('active'));
            if (!wasActive) {
                entry.classList.add('active');
            }
            if (entry.classList.contains('visit')) {
                onVisitClick({
                    id: entry.dataset.id,
                    coordinates: [parseFloat(entry.dataset.lng), parseFloat(entry.dataset.lat)]
                });
            } else {
                onTripClick({
                    id: entry.dataset.id,
                    managerId: entry.dataset.userId,
                    startTime: entry.dataset.start,
                    endTime: entry.dataset.end
                });
            }
        });

        window.horizontalDatePicker = new DatePicker('date-picker-container', {
            daysToShow: 14,
            prefetchDays: 25,
            allowRangeSelection: true,
            singleDateMode: true, // Enable single date mode with locking
            dateFormat: 'YYYY-MM-DD',
            locale: navigator.language,
            strings: {
                clickToUnlockDate: t('datepicker.click-to-unlock-date'),
                clickToLockDate: t('datepicker.click-to-lock-date'),
                clickToClearSelection: t('datepicker.click-to-clear-selection'),
                clickToCreateRange: t('datepicker.click-to-create-range'),
                clickToExpandRangeBackward: t('datepicker.click-to-expand-range-backward'),
                clickToExpandRangeForward: t('datepicker.click-to-expand-range-forward'),
                clickToAdjustRangeStart: t('datepicker.click-to-adjust-range-start'),
                clickToUnlockMonth: t('datepicker.click-to-unlock-month'),
                clickToLockMonth: t('datepicker.click-to-lock-month'),
                clickToUnlockYear: t('datepicker.click-to-unlock-year'),
                clickToLockYear: t('datepicker.click-to-lock-year'),
                select: t('datepicker.select'),
                to: t('datepicker.to')
            },
            onHoverRange: (range, datePicker, itemData) => {
                const element = document.getElementById('hover-info');

                if (range === null) {
                    element.classList.add('hidden');
                } else {
                    const dateTimeFormat = Intl.DateTimeFormat(window.userSettings.selectedLocale, { dateStyle: "medium",});
                    if (range.mode === 'single' && range.timeband === 'day') {
                        element.innerHTML = `<div class="date-info">${dateTimeFormat.format(range.startDate)}</div>`;
                    } else {
                        element.innerHTML = `<div class="date-info">${t('common.time-range', [dateTimeFormat.format(range.startDate), dateTimeFormat.format(range.endDate)])}</div>`;
                    }
                    element.classList.remove('hidden')
                }
            }
        });

        window.horizontalDatePicker.on('selectionChange', function (data) {
            console.log(`Selection changed`, data);
            const startDate = new Date(data.startDate + 'T00:00:00');
            let endDate;
            if (data.endDate) {
                endDate = new Date(data.endDate + 'T00:00:00');
            } else {
                switch (data.timeband) {
                    case 'day':
                        endDate = startDate;
                        break;
                    case 'month':
                        endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0);
                        break;
                    case 'year':
                        endDate = new Date(startDate.getFullYear(), 11, 31);
                        break;
                }
            }
            currentDateRange = {
                startDate: window.horizontalDatePicker.formatDate(startDate),
                endDate: window.horizontalDatePicker.formatDate(endDate)
            };
            updateUrlWithDate(currentDateRange);
            updateTodayFabVisibility();
            document.body.dispatchEvent(new CustomEvent('dateChanged'));
        });

        // Listen for date picker view changes to update FAB visibility
        window.horizontalDatePicker.on('viewChange', function () {
            updateTodayFabVisibility();
        });

        const startingDate = loadStartingDate();

        console.log(`Starting date: ${startingDate[0]} - ${startingDate[1]}`)
        window.horizontalDatePicker.setSelectedRange(startingDate[0], startingDate[1]);

        document.getElementById('speed-selector').onchange = function(e) {
            if (e.target.value === 'auto' || e.target.value === 'adapative') {
                calculateTimelineMultiplier();
            } else {
                timeMultiplier = parseInt(e.target.value);
            }
        };

        const settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) {
            settingsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                settingsMenu.open();
            });
        }

        document.addEventListener('click', function (event) {
            document.querySelectorAll('.device-menu:not(.hidden)').forEach(menu => {
                const container = menu.closest('.device-toggle-container');
                if (!container.contains(event.target)) {
                    menu.classList.add('hidden');
                }
            });
        });

        // Add settings change listener
        document.addEventListener('settingsChanged', function (event) {
            const {setting, value} = event.detail;

            switch (setting) {
                case 'mapStyleId':
                    mapControls.setMapStyleId(value);
                    mapRenderer.updateViewState(createViewState([]));
                    break;
                case 'viewMode':
                    mapRenderer.updateViewState(createViewState([]));
                    break;
                case 'aggregate':
                    const params = getTimelineParams();

                    timelineControl.setup({
                        minTimestamp: params.startDateUtcSeconds,
                        maxTimestamp: params.endDateUtcSeconds,
                        aggregate: value
                    });
                    calculateTimelineMultiplier();
                    mapRenderer.updateViewState(createViewState([]));
                    break;
                case 'timelineVisible':
                    document.body.classList.toggle('timeline-hidden', !value);
                    break;
                case 'datepickerVisible':
                    document.body.classList.toggle('datepicker-hidden', !value);
                    break;
                case 'showAvatars':
                    updateAvatarsVisibility();
                    break;
            }
        });
        mapRenderer.updateViewState(createViewState([]));

        document.getElementById('toggle-time-control-btn').addEventListener('click', function () {
            toggleTimeControls();
        });
        restoreTimelineControlsState(window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY');
    })

    function toggleTimeControls() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const isVisible = timelineControl.isVisible();

        if (isVisible) {
            // Hide the controls
            timelineControl.hide();

            toggleBtn.classList.remove('active');
            toggleBtn.title = t('timeline.state.show.title');

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'true');
        } else {
            timelineControl.show();
            // Show the controls
            toggleBtn.classList.add('active');
            toggleBtn.title = t('timeline.state.hide.title');

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'false');
        }
    }

    function restoreTimelineControlsState(defaultHidden) {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const storedValue = localStorage.getItem('timelineControlsHidden');
        const isHidden = storedValue === null ? defaultHidden : storedValue === 'true';

        if (isHidden) {
            timelineControls.classList.add('hidden');
            toggleBtn.title = t('timeline.state.show.title');
            toggleBtn.classList.remove('active');
        } else {
            timelineControls.classList.remove('hidden');
            toggleBtn.title = t('timeline.state.hide.title');
            toggleBtn.classList.add('active');
        }
    }

    // Metadata Overlay
    function openMetadataOverlay() {
        document.getElementById('metadata-overlay').classList.remove('hidden');
    }
    function closeMetadataOverlay() {
        document.getElementById('metadata-overlay').classList.add('hidden');
        // Optionally clear the content to stop any pending requests
        document.getElementById('metadata-overlay-content').innerHTML = '';
    }
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && !document.getElementById('metadata-overlay').classList.contains('hidden')) {
            closeMetadataOverlay();
        }
    });

    function addTagChip(tag) {
        tag = tag.trim();
        if (!tag) return;

        // Avoid duplicates
        const existing = Array.from(document.querySelectorAll('#tags-chips-container .tag-text'))
            .map(el => el.textContent);
        if (existing.includes(tag)) return;

        const chip = document.createElement('span');
        chip.className = 'tag-chip';
        chip.innerHTML = `<span class="tag-text">${tag}</span><span class="tag-remove" onclick="removeTagChip(this)">&times;</span>`;
        document.getElementById('tags-chips-container').appendChild(chip);

        updateTagsHidden();
    }

    function removeTagChip(removeBtn) {
        removeBtn.parentElement.remove();
        updateTagsHidden();
    }

    function updateTagsHidden() {
        const tags = Array.from(document.querySelectorAll('#tags-chips-container .tag-text'))
            .map(el => el.textContent);
        document.getElementById('tags-hidden').value = tags.join(',');
    }

</script>

</body>
