<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml" th:lang="${#locale.toLanguageTag()}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.title}">Reitti - Your Location Timeline</title>
    <link rel="manifest" th:href="@{/manifest.json}">
    <link rel="apple-touch-icon" th:href="@{/icons/icon-192x192.png}">
    <link rel="icon" th:href="@{/img/logo.svg}">
    <link rel="apple-touch-icon" th:href="@{/img/logo.svg}">
    <link rel="shortcut icon" type="image/x-icon" th:href="@{/img/logo.svg}">
    <link rel="stylesheet" th:href="@{/css/leaflet.css}" href="/css/leaflet.css">
    <link rel="stylesheet" th:href="@{/css/date-picker.css}" href="/css/date-picker.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="/css/main.css">
    <link rel="stylesheet" th:href="@{/css/lineicons.css}" href="/css/lineicons.css">
    <link rel="stylesheet" th:href="@{/css/photo-client.css}" href="/css/photo-client.css">
    <link rel="stylesheet" th:href="@{/css/inline-edit.css}" href="/css/inline-edit.css">
    <link rel="stylesheet" th:href="@{/css/avatar-marker.css}" href="/css/avatar-marker.css">
    <link rel="stylesheet" th:href="@{/css/maplibre-gl.5.16.0.min.css}" href="/css/maplibre-gl.5.16.0.min.css">
    <link rel="stylesheet" th:href="@{/css/time-control.css}" href="/css/time-control.css">
    <link th:if="${userSettings.customCssUrl}" rel="stylesheet" th:href="${userSettings.customCssUrl}">
    <script th:src="@{/js/messages.js(v=${appVersion})}"></script>
    <script th:src="@{/js/HumanizeDuration.js}"></script>
    <script th:src="@{/js/date-picker-combined.js}"></script>
    <script th:src="@{/js/timeline-scroll-indicator.js}"></script>
    <script th:src="@{/js/vendor/htmx.min.js}"></script>
    <script th:src="@{/js/polygon-editor.js}"></script>
    <script th:src="@{/js/util.js}"></script>
    <script th:src="@{/js/vendor/deckgl.9.2.6.min.js}"></script>
    <script th:src="@{/js/vendor/maplibre-gl.5.17.0.min.js}"></script>
    <script th:src="@{/js/vendor/supercluster.7.0.0.min.js}"></script>
    <script th:src="@{/js/timeline-control.js}"></script>
    <script th:src="@{/js/map-customization.js}"></script>
    <script th:src="@{/js/gps-data-manager.js}"></script>
    <script th:src="@{/js/map-renderer.js}"></script>
    <script th:src="@{/js/map-controls.js}"></script>
    <script th:src="@{/js/PhotoClusterManager.js}"></script>
    <script th:src="@{/js/LiveModeController.js}"></script>
    <script th:src="@{/js/SettingsMenu.js}"></script>
</head>
<body>
<div id="new-map" style="display: block"></div>
<div id="loading-overlay" class="loading-overlay">
    <div class="progress-container">
        <div id="progress-bar" class="loading-progress-bar"></div>
    </div>
    <div id="status-text" class="status-text">Ready</div>
</div>
<!-- Auto-update overlay -->
<div id="auto-update-overlay" class="auto-update-overlay">
    <button sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_USER', 'ROLE_MAGIC_LINK_FULL_ACCESS')"
            class="overlay-button exit-button" th:title="#{map.auto-update.disable.title}">
        <i class="lni lni-pause"></i>
    </button>
    <button class="overlay-button fullscreen-button" onclick="toggleFullscreen()" th:title="#{map.fullscreen.toggle.title}" title="Toggle Fullscreen">
        <i class="lni lni-arrow-all-direction"></i>
    </button>
    <div class="date" id="auto-update-date"></div>
    <div class="time" id="auto-update-time"></div>
</div>
<div class="navigation-container" th:replace="~{fragments/main-navigation :: main-navigation('index')}"></div>
<div class="timeline">
    <div class="timeline-container"
         th:hx-get="@{/timeline/content/range}"
         hx-trigger="dateChanged from:body"
         hx-vals="js:{startDate: getTimelineParams().startDate, endDate: getTimelineParams().endDate, timezone: getTimelineParams().timezone}"
         hx-indicator="#loading-indicator">
        <div id="loading-indicator" class="timeline-entry" th:text="#{timeline.loading}">Loading...</div>
    </div>
</div>
<div id="date-picker-container"></div>
<div id="tooltip" style="position: absolute; z-index: 10; pointer-events: none; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 4px; display: none; font-family: sans-serif; font-size: 12px; max-width: 300px;"></div>

<div id="timeline-controls"></div>

<div class="fab-container" id="fab-container">
    <!-- Play button with hover-triggered speed control -->
    <div class="play-section">
        <button type="button" class="btn fab-btn" id="play-btn" title="Start Animation">
            <i class="lni lni-play"></i>
        </button>
        <div class="speed-control" id="speed-control">
            <select id="speed-selector" th:title="#{map.time-control.speed.title}">
                <option value="1" th:text="#{map.time-control.speed.normal}">Normal (1x)</option>
                <option value="60" th:text="#{map.time-control.speed.fast}">Fast (60x)</option>
                <option value="3600" th:text="#{map.time-control.speed.super_fast}">Super Fast (3600x)</option>
                <option value="auto" selected th:text="#{map.time-control.speed.auto}">Auto-Adjust</option>
            </select>
        </div>
    </div>
    <button type="button" class="btn fab-btn" id="toggle-time-control-btn"  th:title="#{map.time-control.speed.show.title}" title="Show time controls">
        <i class="lni lni-stopwatch"></i>
    </button>
    <span class="time-display" id="time-display"></span>
    <!-- Today button (hidden by default) -->
    <button type="button" class="btn fab-btn today-btn" id="today-fab" onclick="goToToday()" style="display: none;"
            th:title="#{datepicker.today.title}" title="Go to Today">
        <i class="lni lni-calendar-days"></i>
        <span th:text="#{datepicker.today}">Today</span>
    </button>

    <div id="map-controls-section"></div>

    <!-- Settings button -->
    <button type="button" class="btn fab-btn settings-btn" id="settings-btn" th:title="#{map.map-settings.button.title}" title="Settings">
        <i class="lni lni-gear-1"></i>
    </button>
</div>

<div id="settings-menu-container"></div>

<script th:inline="javascript">
    window.contextPath = /*[[@{/}]]*/ "/";
    window.contextPath = window.contextPath.replace(/\/$/, '');

    // Locale object for JavaScript
    window.locale = {
        today: /*[[#{datepicker.today}]]*/ 'Today',
        days: [
            /*[[#{datepicker.days.sun}]]*/ 'Sun',
            /*[[#{datepicker.days.mon}]]*/ 'Mon',
            /*[[#{datepicker.days.tue}]]*/ 'Tue',
            /*[[#{datepicker.days.wed}]]*/ 'Wed',
            /*[[#{datepicker.days.thu}]]*/ 'Thu',
            /*[[#{datepicker.days.fri}]]*/ 'Fri',
            /*[[#{datepicker.days.sat}]]*/ 'Sat'
        ],
        months: [
            /*[[#{datepicker.months.jan}]]*/ 'Jan',
            /*[[#{datepicker.months.feb}]]*/ 'Feb',
            /*[[#{datepicker.months.mar}]]*/ 'Mar',
            /*[[#{datepicker.months.apr}]]*/ 'Apr',
            /*[[#{datepicker.months.may}]]*/ 'May',
            /*[[#{datepicker.months.jun}]]*/ 'Jun',
            /*[[#{datepicker.months.jul}]]*/ 'Jul',
            /*[[#{datepicker.months.aug}]]*/ 'Aug',
            /*[[#{datepicker.months.sep}]]*/ 'Sep',
            /*[[#{datepicker.months.oct}]]*/ 'Oct',
            /*[[#{datepicker.months.nov}]]*/ 'Nov',
            /*[[#{datepicker.months.dec}]]*/ 'Dec'
        ],
        sse: {
            error: /*[[#{sse.error.connection-lost}]]*/ 'Connection to server lost! Will reconnect ...',
        },
        autoupdate: {
          latestLocation:  /*[[#{map.auto-update.latest-location}]]*/ 'Latest location',
          state: {
              enable: /*[[#{map.auto-update.enable.title}]]*/ 'Enter Auto-Update Mode',
              disable: /*[[#{map.auto-update.disable.title}]]*/ 'Leave Auto-Update Mode',
          }
        },
        datepicker: {
            state : {
                hide: /*[[#{datepicker.state.hide.title}]]*/ 'Hide Date Picker',
                show:  /*[[#{datepicker.state.show.title}]]*/ 'Show Date Picker'
            }
        },
        timeline: {
            state : {
                hide: /*[[#{timeline.state.hide.title}]]*/ 'Hide Timeline',
                show:  /*[[#{timeline.state.show.title}]]*/ 'Show Timeline'

            }
        },
        map: {
            popup: {
                labels: {
                    totalDuration:  /*[[#{map.popup.labels.total_duration}]]*/ 'Total duration:',
                    from:  /*[[#{map.popup.labels.from}]]*/ 'From',
                    to:  /*[[#{map.popup.labels.to}]]*/ 'To',
                }
            },
            displayControl: {
                mode: {
                    "2D": {
                        text:  /*[[#{map.display-control.mode.2d.text}]]*/ '2D',
                        title:  /*[[#{map.display-control.mode.2d.title}]]*/ 'Switch to 2D view',
                    },
                    "3D": {
                        text:  /*[[#{map.display-control.mode.3d.text}]]*/ '3D',
                        title:  /*[[#{map.display-control.mode.3d.title}]]*/ 'Switch to 3D view',
                    }
                },
                northUp: {
                    text:  /*[[#{map.display-control.north-up.text}]]*/ '3D',
                    title:  /*[[#{map.display-control.north-up.title}]]*/ 'Switch to 3D view',
                },
                terrain: {
                    enable: {
                        text: /*[[#{map.display-control.terrain.enable.text}]]*/ 'Enable Terrain',
                        title: /*[[#{map.display-control.terrain.enable.title}]]*/ 'Enable Terrain',
                    },
                    disable: {
                        text: /*[[#{map.display-control.terrain.disable.text}]]*/ 'Disable Terrain',
                        title: /*[[#{map.display-control.terrain.disable.title}]]*/ 'Disable Terrain',
                    }
                },
                buildings: {
                    enable: {
                        text: /*[[#{map.display-control.buildings.enable.text}]]*/ 'Enable Terrain',
                        title: /*[[#{map.display-control.buildings.enable.title}]]*/ 'Enable Terrain',
                    },
                    disable: {
                        text: /*[[#{map.display-control.buildings.disable.text}]]*/ 'Disable Terrain',
                        title: /*[[#{map.display-control.buildings.disable.title}]]*/ 'Disable Terrain',
                    }
                },
                satellite: {
                    enable: {
                        text: /*[[#{map.display-control.satellite.enable.text}]]*/ 'Enable Terrain',
                        title: /*[[#{map.display-control.satellite.enable.title}]]*/ 'Enable Terrain',
                    },
                    disable: {
                        text: /*[[#{map.display-control.satellite.disable.text}]]*/ 'Disable Terrain',
                        title: /*[[#{map.display-control.satellite.disable.title}]]*/ 'Disable Terrain',
                    }
                },
                globeProjection: {
                    enable: {
                        text: /*[[#{map.display-control.globe_projection.enable.text}]]*/ 'Enable Terrain',
                        title: /*[[#{map.display-control.globe_projection.enable.title}]]*/ 'Enable Terrain',
                    },
                    disable: {
                        text: /*[[#{map.display-control.globe_projection.disable.text}]]*/ 'Disable Terrain',
                        title: /*[[#{map.display-control.globe_projection.disable.title}]]*/ 'Disable Terrain',
                    }
                }
            },
            settings: {
                title: /*[[#{settings.title}]]*/ 'Settings',
                dialog: {
                    appearance: {
                        title: /*[[#{map.settings.dialog.appearance.title}]]*/ 'Map Appearance',
                        viewMode: {
                            title: /*[[#{map.settings.dialog.appearance.view-mode.title}]]*/ 'View Mode',
                            standard: /*[[#{map.settings.dialog.appearance.view-mode.standard}]]*/ 'Standard Paths',
                            raw: /*[[#{map.settings.dialog.appearance.view-mode.raw}]]*/ 'Raw Paths',
                            edgedBundling: /*[[#{map.settings.dialog.appearance.view-mode.edged_bundling}]]*/ 'Edge Bundling',
                            aggregate24h: /*[[#{map.settings.dialog.appearance.view-mode.24h_aggregate}]]*/ '24h aggregate?'
                        }
                    },
                    interface: {
                        title: /*[[#{map.settings.dialog.interface.title}]]*/ 'Interface',
                        timelineVisible: /*[[#{map.settings.dialog.interface.timeline-visible}]]*/ 'Timeline Visible',
                        datepickerVisible: /*[[#{map.settings.dialog.interface.datepicker-visible}]]*/ 'Date Selection Visible'
                    }
                }
            }
        },
        common: {
            user: /*[[#{common.user}]]*/ 'User',
            time: /*[[#{common.time}]]*/ 'Time',
            position: /*[[#{common.position}]]*/ 'Position',
            unknown: /*[[#{common.unknown}]]*/ 'Unknown'
        }
    };
    window.userSettings = /*[[${userSettings}]]*/ {}

    let gpsDataManagers = [];
    let currentDateRange = null;


    const timelineControl = new TimelineControl(
        document.getElementById('timeline-controls'),
        document.getElementById('time-display')
    );

    timelineControl.on('offsetChanged', () => {
        mapRenderer.updateViewState(createViewState([]))
    })

    const liveModeController = new LiveModeController('auto-update-btn', 'auto-update-overlay', window.locale);
    const settingsMenu = new SettingsMenu('settings-menu-container', window.locale);

    liveModeController.on('autoUpdateModeChanged', (autoUpdateMode) => {
        const timeline = document.querySelector('.timeline');
        const datePicker = document.getElementById('date-picker-container');
        const fabContainer = document.getElementById('fab-container');

        if (autoUpdateMode) {
            timeline.classList.add('hidden');
            datePicker.classList.add('hidden');
            fabContainer.classList.add('hidden');
            if (window.horizontalDatePicker) {
                window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate(), null);
            }
            mapRenderer.enableAvatars();
        } else {
            timeline.classList.remove('hidden');
            datePicker.classList.remove('hidden');
            fabContainer.classList.remove('hidden');
            mapRenderer.disableAvatars();
        }
        handleAutoTodaySelectionTimer(autoUpdateMode)
    })
    const mapControls = new MapControls('map-controls-section', window.locale);
    const mapRenderer = new MapRenderer('new-map', userSettings, createViewState());

    mapControls.on('selectionChanged', (state) => {
        mapRenderer.updateViewState(createViewState([]));
    });
    mapControls.on('compassClicked', () => mapRenderer.setBearing(0));

    let userConfigs = [];
    let animationId = null;
    let lastFrameTime = null;
    let isPlaying = false;
    let timeMultiplier = 30; // Default: 1 second = 1 minute

    const playBtn = document.getElementById('play-btn');

    playBtn.onclick = () => {
        if (isPlaying) {
            stopAnimation();
        } else {
            startAnimation();
        }
    };

    function startAnimation() {
        isPlaying = true;
        playBtn.innerHTML = '<i class="lni lni-pause"></i>'; // Change icon to Pause
        lastFrameTime = null;
        animationId = requestAnimationFrame(animate);
    }

    function stopAnimation() {
        isPlaying = false;
        playBtn.innerHTML = '<i class="lni lni-play"></i>'; // Change icon to Play
        if (animationId) {
            cancelAnimationFrame(animationId);
        }
        timelineControl.setOffset(0);
        mapRenderer.updateViewState(createViewState([]));
    }

    function calculateTimelineMultiplier() {
        const params = getTimelineParams();
        const aggregateToggle = document.getElementById('aggregate-toggle');

        if (aggregateToggle && aggregateToggle.checked) {
            timeMultiplier = 60 * 60 * 24 / 30;
        } else {
            const totalSeconds = params.endDateUtcSeconds - params.startDateUtcSeconds;
            const targetDuration = 30;
            timeMultiplier = totalSeconds / targetDuration;
            console.log(`Animation speed set to: ${timeMultiplier}x real time`);
        }
    }

    function animate(now) {
        if (!isPlaying) return;
        if (lastFrameTime === null) {
            lastFrameTime = now; // Capture the start time
            animationId = requestAnimationFrame(animate); // Request next frame
            return; // Exit early without moving the slider
        }
        // 1. Calculate how much real time has passed since the last frame
        // 'now' is provided automatically by requestAnimationFrame
        const deltaTime = (now - lastFrameTime) / 1000; // convert ms to seconds
        lastFrameTime = now; // Update for the next frame

        // 2. Logic to prevent "jumps" (e.g., if the user changes tabs)
        if (deltaTime > 0.1) {
            animationId = requestAnimationFrame(animate);
            return;
        }

        // 3. Advance the slider
        let step = timeMultiplier * deltaTime;
        let newValue = parseFloat(timelineControl.getOffset()) + step;

        // 4. Loop logic
        if (newValue > parseFloat(timelineControl.getMaxOffset())) {
            newValue = 0;
        }

        // 5. Update UI and Map
        timelineControl.setOffset(newValue);
        mapRenderer.updateViewState(createViewState([]));

        // 6. Request the next frame
        animationId = requestAnimationFrame(animate);
    }

    function formatDateTime(ts) {
        return new Date(ts).toLocaleDateString(window.userSettings.selectedLocale, { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function updateStatus(message, current, total) {
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('status-text');
        const overlay = document.getElementById('loading-overlay');

        overlay.style.transition = 'none';
        overlay.style.opacity = '1';

        const percentage = Math.min(100, Math.round((current / total) * 100));
        bar.style.width = `${percentage}%`;

        const currentFormatted = current?.toLocaleString();
        const totalFormatted = total?.toLocaleString();

        text.innerText = message
            .replace('{0}', currentFormatted)
            .replace('{1}', totalFormatted);

        // Handle completion
        if (current >= total) {
            fadeOutOverlay(overlay);
        }
    }

    function fadeOutOverlay(overlay) {
        setTimeout(() => {
            overlay.style.transition = 'opacity 1s ease';
            overlay.style.opacity = '0';
        }, 1500);
    }

    function getSelectedDate() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('startDate') && urlParams.has('endDate')) {
            return urlParams.get('startDate');
        } else if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
            return getCurrentLocalDate();
        } else if (window.userSettings.newestData) {
            return getAsLocalDate(window.userSettings.newestData);
        } else {
            return getCurrentLocalDate();
        }
    }

    function getTimelineParams() {
        const timezone = getUserTimezone();
        if (currentDateRange && currentDateRange.startDate && currentDateRange.endDate) {
            // Range mode - use actual range
            const startDate = new Date(currentDateRange.startDate);
            startDate.setHours(0, 0, 0, 0);
            const requestedStartUTCSeconds = Math.floor(startDate.getTime() / 1000);
            const endDate = new Date(currentDateRange.endDate);
            endDate.setHours(23, 59, 59);
            const requestedEndUTCSeconds = Math.floor(endDate.getTime() / 1000);
            return {
                startDate: currentDateRange.startDate,
                startDateUtcSeconds: requestedStartUTCSeconds,
                endDate: currentDateRange.endDate,
                endDateUtcSeconds: requestedEndUTCSeconds,
                timezone: timezone
            };
        } else {
            throw new Error('Invalid date range');
        }
    }

    function selectUser(userHeader) {
        // Remove active class from all user headers
        document.querySelectorAll('.user-header').forEach(header => {
            header.classList.remove('active');
        });

        // Add active class to clicked user header
        userHeader.classList.add('active');

        // Get the user ID from the clicked header
        const userId = userHeader.getAttribute('data-user-id');

        // Hide all user timeline sections
        document.querySelectorAll('.user-timeline-section').forEach(section => {
            section.classList.remove('active');
        });

        // Show the corresponding user timeline section
        const targetSection = document.querySelector(`.user-timeline-section[data-user-id="${userId}"]`);
        if (targetSection) {
            targetSection.classList.add('active');
        }
    }

    function updateUrlWithDate(currentDateRange) {
        const url = new URL(window.location);
        url.searchParams.set('startDate', currentDateRange.startDate);
        url.searchParams.set('endDate', currentDateRange.endDate);
        url.searchParams.delete('date');
        window.history.pushState({}, '', url);
    }

    function loadStartingDate() {
        const urlParams = new URLSearchParams(window.location.search);

        let startDate = urlParams.get('startDate');
        let endDate = urlParams.get('endDate');
        if (startDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(startDate)) {
                startDate = null;
            }
        }
        if (endDate) {
            // Validate date format (YYYY-MM-DD)
            if (!/^\d{4}-\d{2}-\d{2}$/.test(endDate)) {
                endDate = null;
            }
        }

        if (!startDate && !endDate) {
            if (window.userSettings.uiMode === 'SHARED_LIVE_MODE_ONLY') {
                return [getCurrentLocalDate(), ];
            } else if (window.userSettings.newestData) {
                return [getAsLocalDate(window.userSettings.newestData),];
            } else {
                return [getCurrentLocalDate(), ];
            }
        } else if (!startDate && endDate) {
            return [endDate, ];
        } else if (startDate && !endDate) {
            return [startDate, ];
        } else if (startDate === endDate) {
            return [startDate, ];
        }
        else {
            return [startDate, endDate];
        }
    }

    function handleAutoTodaySelectionTimer(autoUpdateMode) {
        // Check every 30 seconds if we need to switch to today's date
        if (!autoUpdateMode) {
            if (autoUpdateTimer) {
                clearInterval(autoUpdateTimer);
                autoUpdateTimer = null;
            }
        } else {
            autoUpdateTimer = setInterval(() => {
                if (!autoUpdateMode) {
                    return; // Exit if auto-update mode was disabled
                }

                // If the selected date is not today, switch to today
                if (!isSelectedDateToday()) {
                    console.log('Auto-update: Switching to today\'s date');
                    if (window.horizontalDatePicker) {
                        window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate());
                    }
                }
            }, 30000); // 30 seconds
        }
    }

    function isSelectedDateToday() {
        const today = getCurrentLocalDate();
        const selectedDate = getSelectedDate();
        return selectedDate === today;
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable fullscreen: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    function updateTodayFabVisibility() {
        const todayFab = document.getElementById('today-fab');
        if (!todayFab || !window.horizontalDatePicker) return;

        const today = getCurrentLocalDate();
        const isDatePickerHidden = document.body.classList.contains('datepicker-hidden');
        const isTodayVisible = window.horizontalDatePicker.isDateVisible(today);

        // Check if today is selected
        const selectedRange = window.horizontalDatePicker.getSelectedRange();
        const isTodaySelected = selectedRange && selectedRange.startDate === today &&
                               (!selectedRange.endDate || selectedRange.endDate === today);

        // Show FAB if date picker is visible and (today is not visible OR today is not selected)
        if (!isDatePickerHidden && (!isTodayVisible || !isTodaySelected)) {
            todayFab.style.display = 'flex';
        } else {
            todayFab.style.display = 'none';
        }
    }

    function goToToday() {
        if (window.horizontalDatePicker) {
            window.horizontalDatePicker.setSelectedRange(getCurrentLocalDate(), null);
        }
    }

    function updateEditPlaceLinks() {
        const currentUrl = window.location.href;
        const editLinks = document.querySelectorAll('.timeline-container .edit-icon[href*="/settings/places/"]');

        editLinks.forEach(link => {
            const href = link.getAttribute('href');
            const url = new URL(href, window.location.origin);
            url.searchParams.set('returnUrl', currentUrl);
            link.setAttribute('href', url.toString());
        });
    }

    function loadTimelineData(requestedStart, requestedEnd) {
        console.log('loadTimelineData', requestedStart, requestedEnd);
        gpsDataManagers = [];
        const RENDER_CHUNK_SIZE = 50000;

        userConfigs.forEach(config => {
            const gpsDataManager = new GpsDataManager(config, window.userSettings, getUserTimezone());
            gpsDataManagers.push(gpsDataManager)
        });


        mapRenderer.setGpsDataManagers(gpsDataManagers);
        gpsDataManagers.forEach((gpsDataManager, index) => {
            let lastRenderedPointCount = 0;
            gpsDataManager.load(requestedStart, requestedEnd, (current, total, stage) => {

                switch (stage) {
                    case 'metadata':
                        updateStatus("Fetching metadata...", 10, 100);

                        break;
                    case 'streaming':
                        updateStatus("Loading point {0} / {1}", current, total);
                        if (current - lastRenderedPointCount >= RENDER_CHUNK_SIZE) {
                            lastRenderedPointCount = current;
                            requestAnimationFrame(() => {
                                mapRenderer.updateViewState(createViewState());
                            });
                        }
                        break;
                    case 'bundling':
                        updateStatus("Optimizing routes: {0} / {1} points", current, total);
                        break;
                    case 'complete':
                        lastRenderedPointCount = 0;
                        const aggregateToggle = document.getElementById('aggregate-toggle');
                        timelineControl.setup({
                            aggregate: aggregateToggle ? aggregateToggle.checked : false,
                            minTimestamp: gpsDataManager.minTimestamp,
                            maxTimestamp: gpsDataManager.maxTimestamp,
                        })
                        calculateTimelineMultiplier();
                        updateStatus("Finished processing {1} points", current, total);
                        mapRenderer.updateViewState(createViewState());
                        if (index === gpsDataManagers.length - 1) {
                            mapRenderer.finishedLoading();
                        }
                }
            });
        });
    }

    if (window.userSettings.uiMode === "SHARED_LIVE_MODE_ONLY") {
        liveModeController.enterLiveMode();
    }

    function createViewState(highlightTimes = []) {
        const aggregateToggle = document.getElementById('aggregate-toggle');
        const viewModeSelect = document.getElementById('view-mode');
        
        return {
            ...mapControls.getState(),
            aggregated: aggregateToggle ? aggregateToggle.checked : false,
            viewMode: viewModeSelect ? viewModeSelect.value : 'LINEAR',
            currentTime: timelineControl.getValue(),
            animating: !timelineControl.isIdle(),
            highlightTimes: highlightTimes,
            showPhotos: true
        };
    }

    document.addEventListener('DOMContentLoaded', function () {
        if (window.userSettings.uiMode !== 'SHARED_LIVE_MODE_ONLY') {
            // Restore timeline and datepicker state on page load
            settingsMenu.restoreState();
        } else {
            document.body.classList.add('datepicker-hidden')
            document.body.classList.add('timeline-hidden')
        }

        function calculateUserConfigs() {
            const timelineContainers = document.querySelectorAll('.user-timeline-section');
            const configs = [];
            timelineContainers.forEach(container => {
                const config = {
                    id: container.dataset.userId,
                    respectBounds: true,
                    url: container.dataset.rawLocationPointsUrl,
                    color: container.dataset.baseColor,
                    avatarUrl: container.dataset.userAvatarUrl,
                    avatarFallback: container.dataset.avatarFallback,
                    displayName: container.dataset.displayName,
                    map: {
                        metaDataUrl: container.dataset.locationMetadataUrl,
                        streamUrl: container.dataset.locationStreamUrl,
                        visitsUrl: container.dataset.processedVisitsUrl
                    }
                };
                configs.push(config);
            });
            return configs;
        }

        // Add HTMX event handlers for timeline updates
        document.body.addEventListener('htmx:afterSwap', function (event) {
            if (event.detail.target.classList.contains('timeline-container')) {
                userConfigs = calculateUserConfigs();

                stopAnimation();

                const params = getTimelineParams();
                mapRenderer.reset();
                try {
                    fetch(`${window.contextPath}/api/v1/photos/immich/range?timezone=${getUserTimezone()}&startDate=${params.startDate}&endDate=${params.endDate}`)
                        .then(response => {
                                if (response.ok) {
                                    return response.json()
                                } else {
                                    reject(response)
                                }
                            }
                        ).then(value => mapRenderer.setPhotos(value), error => mapRenderer.setPhotos([]));
                } catch (error) {
                    mapRenderer.setPhotos([]);
                }
                const aggregateToggle = document.getElementById('aggregate-toggle');
                timelineControl.setup({
                    minTimestamp: params.startDateUtcSeconds,
                    maxTimestamp: params.endDateUtcSeconds,
                    aggregate: aggregateToggle ? aggregateToggle.checked : false
                });
                loadTimelineData(params.startDateUtcSeconds, params.endDateUtcSeconds);

                // Initialize scroll indicator after timeline is updated
                if (window.timelineScrollIndicator) {
                    window.timelineScrollIndicator.cleanup();
                }
                window.timelineScrollIndicator = new TimelineScrollIndicator();
                window.timelineScrollIndicator.init();

                updateEditPlaceLinks();
            }
        });
        // Handle clicks on timeline entries
        document.querySelector('.timeline-container').addEventListener('click', function (event) {
            const entry = event.target.closest('.timeline-entry');
            if (!entry) return;

            const editingElement = event.target.closest('.editing');
            if (editingElement || event.target.classList.contains('edit-icon')) {
                return;
            }
            // Check if this entry is already active (deselection case)
            const isCurrentlyActive = entry.classList.contains('active');

            // Remove active class from all entries
            document.querySelectorAll('.timeline-container .timeline-entry')
                .forEach(e => e.classList.remove('active'));

            const isTrip = entry.classList.contains('trip');

            if (isCurrentlyActive) {
                mapRenderer.updateViewState(createViewState([]))
            } else {
                entry.classList.add('active');

                const lat = parseFloat(entry.dataset.lat);
                const lng = parseFloat(entry.dataset.lng);
                const startTime = entry.dataset.start;
                const endTime = entry.dataset.end;

                if (isTrip) {
                    mapRenderer.updateViewState(createViewState([Math.floor(new Date(startTime).getTime() / 1000), Math.floor(new Date(endTime).getTime() / 1000)]));
                } else {
                    mapRenderer.updateViewState(createViewState([]))
                    mapRenderer.flyTo({
                        center: [lng, lat],
                        zoom: 15
                    })
                }
            }
        });

        window.horizontalDatePicker = new DatePicker('date-picker-container', {
            daysToShow: 14,
            prefetchDays: 25,
            allowRangeSelection: true,
            singleDateMode: true, // Enable single date mode with locking
            dateFormat: 'YYYY-MM-DD',
            locale: navigator.language,
            strings: {
                clickToUnlockDate: /*[[#{datepicker.click-to-unlock-date}]]*/ 'Click to unlock date',
                clickToLockDate: /*[[#{datepicker.click-to-lock-date}]]*/ 'Click to lock date',
                clickToClearSelection: /*[[#{datepicker.click-to-clear-selection}]]*/ 'Click to clear selection',
                clickToCreateRange: /*[[#{datepicker.click-to-create-range}]]*/ 'Click to create range',
                clickToExpandRangeBackward: /*[[#{datepicker.click-to-expand-range-backward}]]*/ 'Click to expand range backward',
                clickToExpandRangeForward: /*[[#{datepicker.click-to-expand-range-forward}]]*/ 'Click to expand range forward',
                clickToAdjustRangeStart: /*[[#{datepicker.click-to-adjust-range-start}]]*/ 'Click to adjust range start',
                clickToUnlockMonth: /*[[#{datepicker.click-to-unlock-month}]]*/ 'Click to unlock month',
                clickToLockMonth: /*[[#{datepicker.click-to-lock-month}]]*/ 'Click to lock month',
                clickToUnlockYear: /*[[#{datepicker.click-to-unlock-year}]]*/ 'Click to unlock year',
                clickToLockYear: /*[[#{datepicker.click-to-lock-year}]]*/ 'Click to lock year',
                select: /*[[#{datepicker.select}]]*/ 'Select',
                to: /*[[#{datepicker.to}]]*/ 'to'
            }
        });

        window.horizontalDatePicker.on('selectionChange', function (data) {
            console.log(`Selection changed`, data);
            const startDate = new Date(data.startDate + 'T00:00:00');
            let endDate;
            if (data.endDate) {
                endDate = new Date(data.endDate + 'T00:00:00');
            } else {
                switch (data.timeband) {
                    case 'day':
                        endDate = startDate;
                        break;
                    case 'month':
                        endDate = new Date(startDate.getFullYear(), startDate.getMonth() + 1, 0);
                        break;
                    case 'year':
                        endDate = new Date(startDate.getFullYear(), 11, 31);
                        break;
                }
            }
            currentDateRange = {
                startDate: window.horizontalDatePicker.formatDate(startDate),
                endDate: window.horizontalDatePicker.formatDate(endDate)
            };
            updateUrlWithDate(currentDateRange);
            // Trigger HTMX reload of timeline
            document.body.dispatchEvent(new CustomEvent('dateChanged'));
        });

        // Listen for date picker view changes to update FAB visibility
        window.horizontalDatePicker.on('viewChange', function () {
            updateTodayFabVisibility();
        });

        const startingDate = loadStartingDate();

        console.log(`Starting date: ${startingDate[0]} - ${startingDate[1]}`)
        window.horizontalDatePicker.setSelectedRange(startingDate[0], startingDate[1]);

        document.getElementById('speed-selector').onchange = function(e) {
            if (e.target.value === 'auto') {
                calculateTimelineMultiplier();
            } else {
                timeMultiplier = parseInt(e.target.value);
            }
        };

        const settingsBtn = document.getElementById('settings-btn');
        if (settingsBtn) {
            settingsBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // Prevent event bubbling
                settingsMenu.open();
            });
        }

        // Add settings change listener
        document.addEventListener('settingsChanged', function (event) {
            const {setting, value} = event.detail;

            switch (setting) {
                case 'viewMode':
                    mapRenderer.updateViewState(createViewState([]));
                    break;
                case 'aggregate':
                    const params = getTimelineParams();

                    timelineControl.setup({
                        minTimestamp: params.startDateUtcSeconds,
                        maxTimestamp: params.endDateUtcSeconds,
                        aggregate: value
                    });
                    calculateTimelineMultiplier();
                    mapRenderer.updateViewState(createViewState([]));
                    break;
                case 'timelineVisible':
                    document.body.classList.toggle('timeline-hidden', !value);
                    break;
                case 'datepickerVisible':
                    document.body.classList.toggle('datepicker-hidden', !value);
                    break;
            }
        });
        mapRenderer.updateViewState(createViewState([]));

        document.getElementById('toggle-time-control-btn').addEventListener('click', function () {
            toggleTimeControls();
        });
        restoreTimelineControlsState();
    })

    function toggleTimeControls() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const isVisible = timelineControl.isVisible();

        if (isVisible) {
            // Hide the controls
            timelineControl.hide();

            toggleBtn.classList.remove('active');
            toggleBtn.title = window.locale.timeline.state.show;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'true');
        } else {
            timelineControl.show();
            // Show the controls
            toggleBtn.classList.add('active');
            toggleBtn.title = window.locale.timeline.state.hide;

            // Save state to localStorage
            localStorage.setItem('timelineControlsHidden', 'false');
        }
    }

    function restoreTimelineControlsState() {
        const timelineControls = document.getElementById('timeline-controls');
        const toggleBtn = document.getElementById('toggle-time-control-btn');

        if (!timelineControls || !toggleBtn) return;

        const isHidden = localStorage.getItem('timelineControlsHidden') === 'true';

        if (isHidden) {
            timelineControls.classList.add('hidden');
            toggleBtn.title = window.locale.timeline.state.show;
            toggleBtn.classList.remove('active');
        } else {
            timelineControls.classList.remove('hidden');
            toggleBtn.title = window.locale.timeline.state.hide;
            toggleBtn.classList.add('active');
        }
    }
</script>

</body>
</html>
