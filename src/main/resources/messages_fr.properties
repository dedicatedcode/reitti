visit.detection.title=Détection de visites
visit.detection.search.distance=Distance de recherche (en mètres)
visit.detection.search.distance.help=Distance maximale entre plusieurs points pour qu’ils soient considérés comme faisant partie de la même visite. Les petites valeurs (50 à 100 m) détecteront des positions précises, des valeurs plus grandes (200 à 500 m) regrouperont plusieurs positions ensemble. Valeurs typiques : 100m pour des zones urbaines, 200m en banlieues.
visit.detection.minimum.points=Points adjacents minimum
visit.detection.minimum.points.help=Nombre minimum de points consécutifs nécessaires pour détecter une visite. Des valeurs élevées réduisent les faux positifs, mais peuvent rater des visites courtes. Recommandé : 3 à 5 points dans la majorité des cas.
visit.detection.minimum.stay=Temps minimum d’arrêt (en secondes)
visit.detection.minimum.stay.help=Durée minimum pour considérer un emplacement comme une visite plutôt que d’être juste passé. Les valeurs courtes (60 à 300 s) détectent les arrêts rapides, les valeurs hautes (600 à 1800 s) ne détectent que des arrêts significatifs. Valeurs typiques : 300s (5 min) pour un suivi détaillé, 900s (15 min) pour les emplacements généraux seulement.
visit.detection.max.merge.time=Temps maximum de fusion entre plusieurs arrêts (en secondes)
visit.detection.max.merge.time.help=Laps de temps maximal entre des visites au même emplacement, avant de les considérer comme des visites séparées. Si vous quittez puis retournez au même endroit durant ce temps, cela sera traité comme une seule visite continue. Valeurs typiques : 1800s (30 min) pour des déplacements rapides, 3600s (1 h) pour des pauses plus longues.
visit.merging.title=Regroupement des visites
visit.merging.search.duration=Durée de recherche (en heures)
visit.merging.search.duration.help=Fenêtre de temps de recherche pour les visites rapprochées qui devraient être regroupées. Des valeurs hautes regrouperont des visites qui devraient rester séparées, alors que des valeurs plus basses peuvent rater des visites liées. Recommandé : 24 à 72 heures pour la plupart des scénarios.
visit.merging.max.merge.time=Temps maximum de regroupement pour les mêmes visites (en secondes)
visit.merging.max.merge.time.help=Temps maximum entre des visites au même endroit avant de considérer qu’il s’agit d'événements séparés. Cela permet de regrouper des visites qui étaient incorrectement disjointes en raison d'une incohérence de signal GPS ou d’un bref décalage. Valeurs typiques : 3600s (1 heure) pour une séparation stricte, 7200s (2 heures) pour un regroupement plus permissif.
visit.merging.min.distance=Distance minimum entre les visites (en mètres)
visit.merging.min.distance.help=Distance minimum requise entre les visites pour les conserver en tant qu’emplacements séparés. Les visites rapprochées de cette distance peuvent être regroupées si elles ont lieu durant la fenêtre de temps. Recommandé : 50 à 100 m pour une séparation de lieux précise, 200 à 300 m pour un regroupement plus général.
