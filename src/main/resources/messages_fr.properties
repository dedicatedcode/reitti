visit.sensitivity.level.help=Une précision basse détecte des visites plus longues et moins fréquentes. Une précision élevée détecte plus de visites, de plus courte durées. Ajustez ce paramètre suivant vos besoins de suivi : basse pour une localisation générale, haute pour une analyse des mouvements plus détaillée. Ce paramètre dépend fortement de la quantité de données fournies à Reitti. Plus les intervalles de données entrantes sont courts, et plus la précision devrait être élevée.
visit.sensitivity.valid.since.help=Cette configuration s’appliquera à toutes les données de localisation à partir de cette date. Toutes les données avant cette date continueront à utiliser les paramètres de configuration précédents.
visit.sensitivity.default.config.note=Cette configuration par défaut s’applique à toutes les données d’historiques et toutes les périodes qui ne sont pas couvertes par une configuration de date spécifique. Des modifications sur cette configuration affecteront le traitement de toutes vos données de localisation en cas de retraitement.
