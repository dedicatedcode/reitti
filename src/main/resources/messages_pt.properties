visit.detection.title=Detec\u00E7\u00E3o de Visitas
visit.detection.search.distance=Dist\u00E2ncia de Pesquisa (metros)
visit.detection.search.distance.help=Dist\u00E2ncia m\u00E1xima entre pontos de localiza\u00E7\u00E3o para serem considerados parte da mesma visita. Valores menores (50-100m) detetam localiza\u00E7\u00F5es precisas, valores maiores (200-500m) agrupam localiza\u00E7\u00F5es pr\u00F3ximas. Valores t\u00EDpicos: 100m para \u00E1reas urbanas, 200m para \u00E1reas suburbanas.
visit.detection.minimum.points=M\u00EDnimo de Pontos Adjacentes
visit.detection.minimum.points.help=N\u00FAmero m\u00EDnimo de pontos de localiza\u00E7\u00E3o consecutivos necess\u00E1rios para detetar uma visita. Valores maiores reduzem falsos positivos mas podem perder visitas curtas. Recomendado: 3-5 pontos para a maioria dos casos de uso.
visit.detection.minimum.stay=Tempo M\u00EDnimo de Perman\u00EAncia (segundos)
visit.detection.minimum.stay.help=Dura\u00E7\u00E3o m\u00EDnima para considerar uma localiza\u00E7\u00E3o como visita ao inv\u00E9s de apenas passar por ela. Valores menores (60-300s) detetam paragens breves, valores maiores (600-1800s) detetam apenas perman\u00EAncias significativas. Valores t\u00EDpicos: 300s (5 min) para rastreamento detalhado, 900s (15 min) apenas para localiza\u00E7\u00F5es principais.
visit.detection.max.merge.time=Tempo M\u00E1x. de Mesclagem Entre Pontos da Mesma Perman\u00EAncia (segundos)
visit.detection.max.merge.time.help=Intervalo de tempo m\u00E1ximo entre visitas no mesmo local antes de serem consideradas visitas separadas. Se sair e voltar ao mesmo lugar dentro deste tempo, ser\u00E1 tratado como uma visita cont\u00EDnua. Valores t\u00EDpicos: 1800s (30 min) para tarefas breves, 3600s (1 hora) para pausas mais longas.
visit.merging.title=Mesclagem de Visitas
visit.merging.search.duration=Dura\u00E7\u00E3o de Pesquisa (horas)
visit.merging.search.duration.help=Janela de tempo para procurar visitas pr\u00F3ximas que devem ser mescladas. Valores maiores podem mesclar visitas que devem permanecer separadas, valores menores podem perder visitas relacionadas. Recomendado: 24-72 horas para a maioria dos cen\u00E1rios.
visit.merging.max.merge.time=Tempo M\u00E1x. de Mesclagem Entre Mesmas Visitas (segundos)
visit.merging.max.merge.time.help=Tempo m\u00E1ximo entre visitas no mesmo local antes de serem consideradas eventos separados. Isto ajuda a mesclar visitas que foram incorretamente divididas devido a imprecis\u00F5es do GPS ou sa\u00EDdas breves. Valores t\u00EDpicos: 3600s (1 hora) para separa\u00E7\u00E3o rigorosa, 7200s (2 horas) para mesclagem mais permissiva.
visit.merging.min.distance=Dist\u00E2ncia M\u00EDnima Entre Visitas (metros)
visit.merging.min.distance.help=Dist\u00E2ncia m\u00EDnima necess\u00E1ria entre visitas para mant\u00EA-las como localiza\u00E7\u00F5es separadas. Visitas mais pr\u00F3ximas que esta dist\u00E2ncia podem ser mescladas se ocorrerem dentro da janela de tempo. Recomendado: 50-100m para separa\u00E7\u00E3o precisa de localiza\u00E7\u00E3o, 200-300m para agrupamento de \u00E1rea mais ampla.
