integrations.data.quality.recommendation.poor.accuracy=Muitos pontos de localiza\u00E7\u00E3o t\u00EAm precis\u00E3o ruim. Certifique-se de que o GPS esteja ativado e evite rastreamento em ambientes fechados.
integrations.data.quality.recommendation.very.poor.accuracy=A precis\u00E3o m\u00E9dia est\u00E1 bem ruim. Verifique se o seu dispositivo tem uma vis\u00E3o clara do c\u00E9u para melhor rece\u00E7\u00E3o GPS.
integrations.data.quality.recommendation.fluctuating.frequency=A frequ\u00EAncia de rasteamento \u00E9 inconsistente. Verifique as configura\u00E7\u00F5es da sua app m\u00F3vel para intervalos de rasteamento est\u00E1veis.
