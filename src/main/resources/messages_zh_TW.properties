visit.sensitivity.level.help=低靈敏度會檢測到較少且持續時間更長的訪問。高靈敏度會檢測到更多且持續時間更短的訪問。請根據您的追蹤需求進行調整：一般位置追蹤使用低靈敏度，詳細移動分析使用高靈敏度。靈敏度高度取決於集成向 Reitti 發送數據的頻率。數據間隔越小，靈敏度級別應越高。
visit.sensitivity.valid.since.help=此配置將適用於此日期時間之後的所有位置數據。此日期之前的數據將繼續使用之前的配置設置。
