visit.detection.title=訪問檢測
visit.detection.search.distance=搜索距離（米）
visit.detection.search.distance.help=將位置點視為同一次訪問的最大距離。較小的數值（50-100公尺）可檢測精確位置，較大的數值（200-500公尺）會將附近位置歸為一組。典型值：城市地區 100公尺，郊區地區 200公尺。
visit.detection.minimum.points=最小相鄰點數
visit.detection.minimum.points.help=檢測一次訪問所需的最少連續位置點數量。較高的數值可降低誤報，但可能錯過短暫訪問。推薦：大多數情況下 3-5 個點。
visit.detection.minimum.stay=最小停留時間（秒）
visit.detection.minimum.stay.help=將位置視為訪問而非僅僅經過的最短時長。較低的數值（60-300秒）可檢測短暫停留，較高的數值（600-1800秒）僅檢測顯著停留。典型值：詳細跟蹤使用 300秒（5分鐘），僅關注主要地點使用 900秒（15分鐘）。
visit.detection.max.merge.time=相同停留點之間的最大合併時間（秒）
visit.detection.max.merge.time.help=同一地點的兩次訪問之間的最大時間間隔，超過此間隔則視為不同訪問。如果在此時間內離開並返回同一地點，將被視為一次連續訪問。典型值：短暫事務使用 1800秒（30分鐘），較長休息使用 3600秒（1小時）。
visit.merging.title=訪問合併
visit.merging.search.duration=搜索時長（小時）
visit.merging.search.duration.help=用於尋找應合併在一起的附近訪問的時間窗口。較大的數值可能會合併本應保持分開的訪問，較小的數值可能會錯過相關訪問。建議：大多數場景下為 24-72 小時。
visit.merging.max.merge.time=同一訪問之間的最大合併時間（秒）
visit.merging.max.merge.time.help=同一位置的兩次訪問之間被視為獨立事件的最大時間間隔。這有助於合併因 GPS 不准或短暫離開而被錯誤拆分的訪問。典型值：3600 秒（1 小時）用於嚴格分離，7200 秒（2 小時）用於更寬鬆的合併。
visit.merging.min.distance=訪問之間的最小距離（米）
visit.merging.min.distance.help=保持訪問為不同位置所需的最小距離。若訪問之間的距離低於此值且發生在時間窗口內，可能會被合併。建議：精確位置分離為 50-100 米，較大區域分組為 200-300 米。
