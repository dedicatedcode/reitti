worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    proxy_cache_path /var/cache/nginx/osm levels=1:2 keys_zone=osm_tiles:100m max_size=1g inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/vector levels=1:2 keys_zone=vector_tiles:100m max_size=1g inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/terrain levels=1:2 keys_zone=terrain_tiles:100m max_size=500m inactive=30d use_temp_path=off;
    proxy_cache_path /var/cache/nginx/satellite levels=1:2 keys_zone=satellite_tiles:100m max_size=2g inactive=30d use_temp_path=off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'cache:$upstream_cache_status';

    access_log /var/log/nginx/access.log main;


    server {
        listen 80;

        location /osm/ {
            proxy_pass https://tile.openstreetmap.org/;
            proxy_set_header Host tile.openstreetmap.org;
            proxy_set_header User-Agent "Reitti/1.0 (+https://github.com/dedicatedcode/reitti; contact: reitti@dedicatedcode.com)";
            proxy_ssl_server_name on;
            proxy_buffering on;
            proxy_cache osm_tiles;
            proxy_cache_valid 200 302 1y;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /vector/ {
            proxy_pass https://tiles.dedicatedcode.com/planet/latest/;
            proxy_set_header Host tiles.dedicatedcode.com;
            proxy_set_header User-Agent "Reitti/1.0 (+https://github.com/dedicatedcode/reitti; contact: reitti@dedicatedcode.com)";
            proxy_ssl_server_name on;
            proxy_buffering on;
            proxy_cache vector_tiles;
            proxy_cache_valid 200 302 1y;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /terrain/ {
            proxy_pass https://s3.amazonaws.com/elevation-tiles-prod/terrarium/;
            proxy_set_header Host s3.amazonaws.com;
            proxy_set_header User-Agent "Reitti/1.0 (+https://github.com/dedicatedcode/reitti; contact: reitti@dedicatedcode.com)";
            proxy_ssl_server_name on;
            proxy_buffering on;
            proxy_cache terrain_tiles;
            proxy_cache_valid 200 302 1y;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /satellite/ {
            proxy_pass https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/;
            proxy_set_header Host server.arcgisonline.com;
            proxy_set_header User-Agent "Reitti/1.0 (+https://github.com/dedicatedcode/reitti; contact: reitti@dedicatedcode.com)";
            proxy_ssl_server_name on;
            proxy_buffering on;
            proxy_cache satellite_tiles;
            proxy_cache_valid 200 302 1y;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            add_header X-Cache-Status $upstream_cache_status;
        }

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
