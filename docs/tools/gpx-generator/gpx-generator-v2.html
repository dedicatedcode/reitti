<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPX Generator · Workbench look</title>
  <meta name="description" content="Interactive GPX track generator styled like the Reitti Workbench">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/workbench.css">
  <link rel="stylesheet" href="/css/datetime-picker.css">
  <link rel="stylesheet" href="/css/lineicons.css">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.17.0/dist/maplibre-gl.css">
  <style>
    /* tiny overrides / additions not worth a separate file */

    /* override date picker popup direction */
    .datetime-picker .picker-popup {
      bottom: auto !important;
      top: 100% !important;
    }

    /* make room for the fixed header */
    #map { top: 50px; }

    /* push floating panels below the header */
    #pointsPanel { top: 110px; }
    #gpxEditPanel { top: 110px; left: 16px; }

    /* new floating settings panel (edit drawer) */
    #gpxEditPanel {
      position: fixed;
      left: 16px;
      top: 110px;
      display: flex; flex-direction: column;
      background: var(--panel-solid);
      border: 1px solid var(--panel-line);
      border-radius: 10px;
      z-index: 20;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    #gpxEditPanel .history-header { flex-shrink: 0; }
    #gpxEditPanel .gpx-drawer-body {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 16px;
    }

    /* full‑width header at the top */
    #gpxHeader {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 50px;
      background: var(--panel-header-bg, #1a1c23);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }
    #gpxHeader .drawer-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      width: 100%;
      overflow-x: auto;
    }

    /* keep existing point‑list styles */
    .gpx-drawer-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      padding: 16px;
      height: auto;
    }
    .gpx-drawer-section { margin-bottom: 18px; }
    .gpx-drawer-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--color-highlight);
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--panel-line);
    }
    .gpx-drawer .control-group { margin-bottom: 12px; }
    .gpx-drawer .control-label { margin-bottom: 4px; }
    .gpx-drawer input[type="number"],
    .gpx-drawer input[type="range"],
    .gpx-drawer input[type="datetime-local"] {
      width: 100%;
    }
    /* point info panel – same as workbench .selection-info just renamed */
    #pointInfo {
      position: fixed;
      bottom: 200px; left: 16px;
      width: 340px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 50;
    }
    #pointInfo .sel-info-body { padding: 10px 12px; }
    #pointInfo .sel-info-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; }
    #pointInfo .sel-info-row .k { color: var(--ink-faint); }
    #pointInfo .sel-info-row .v { color: var(--ink); text-align: right; }
    #pointInfo .sel-info-actions { display: flex; gap: 6px; padding: 6px 0 0; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; }
    #pointInfo .sel-info-btn { flex:1; }
    /* floating points panel */
    #pointsPanel {
      position: fixed;
      right: 16px; top: 110px;
      width: 340px;
      max-height: calc(100vh - 200px);
      display: flex; flex-direction: column;
      background: var(--panel-solid);
      border: 1px solid var(--panel-line);
      border-radius: 10px;
      z-index: 10;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    #pointsPanel .history-header { flex-shrink: 0; }
    #pointsPanel .history-list { flex:1; overflow-y: auto; }
    .gpx-track-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      cursor: pointer;
    }
    .gpx-track-header:hover { background: rgba(255,255,255,0.05); }
    .gpx-track-header .track-color { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    .gpx-point { padding: 4px 12px 4px 28px; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; display: flex; justify-content: space-between; }
    .gpx-point:hover { background: rgba(255,255,255,0.04); }
    .gpx-point .coords { color: var(--ink-dim); }
    .gpx-point .time { color: var(--ink-faint); min-width: 70px; text-align: right; }
    .speed-color-dot { display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:4px; }
  </style>
</head>
<body style="background: var(--bg); color: var(--ink);">

<!-- fixed header with toolbar -->
<div id="gpxHeader">
  <div class="drawer-head">
    <button class="head-btn active" id="btnEditMode" onclick="toggleEditMode()">✎ Edit</button>
    <div class="sep"></div>
    <button class="head-btn" onclick="document.getElementById('gpxFileInput').click()">📂 Import</button>
    <button class="head-btn" onclick="exportAll()">💾 Export</button>
    <button class="head-btn" onclick="clearAll()" style="color:#e07a6b">🗑 Clear</button>
    <button class="head-btn" onclick="randomizeAll()">🎲 Randomize</button>
  </div>
</div>

<div id="map" style="position:absolute; inset:0; top:50px; left:0; right:0; bottom:0;"></div>

<!-- floating point info -->
<div id="pointInfo" class="floating selection-info" style="display:none">
  <div class="sel-info-head">
    <span class="sel-info-title" id="pointInfoTitle">Point</span>
    <button class="sel-info-close" onclick="hidePointInfo()">×</button>
  </div>
  <div class="sel-info-body" id="pointInfoBody"></div>
</div>

<!-- floating points panel (right side) -->
<div id="pointsPanel">
  <div class="history-header">
    <div style="display:flex; align-items:center; gap:9px;">
      <h4>Points</h4>
      <span class="history-count" id="pointCountBadge">0</span>
    </div>
  </div>
  <div class="history-list" id="pointsList"></div>
</div>

<!-- floating edit drawer (left side) -->
<div id="gpxEditPanel">
  <div class="history-header"><h4>Settings</h4></div>
  <div class="gpx-drawer-body">
    <div>
      <!-- Date & Time section using native datetime-local picker -->
      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Date & Time</div>
        <div class="control-group">
          <label class="control-label">Start Time</label>
          <input type="datetime-local" id="startDatetimeLocal" class="form-control">
        </div>
      </div>

      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Track Settings</div>
        <div class="control-group">
          <label class="control-label">Interval (s)</label>
          <input type="number" id="timeInterval" value="30" min="1" max="3600" class="form-control">
        </div>
        <div class="control-group">
          <label class="control-label">Max Speed (km/h)</label>
          <input type="number" id="maxSpeed" value="25" min="1" max="300" class="form-control">
        </div>
      </div>
      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Elevation & GPS</div>
        <div class="control-group">
          <label class="control-label">Elevation (m)</label>
          <input type="number" id="elevation" value="10" step="0.1" class="form-control">
        </div>
        <div class="control-group">
          <label class="control-label">±Variation (m)</label>
          <input type="number" id="elevationVariation" value="0" min="0" step="0.1" class="form-control">
        </div>
        <div class="control-group">
          <label class="control-label">GPS Accuracy: <span id="accuracyValue">5</span>m</label>
          <input type="range" id="accuracySlider" min="0" max="100" value="5" class="form-control">
        </div>
      </div>
    </div>
    <div>
      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Options</div>
        <div class="control-group">
          <label class="control-label"><input type="checkbox" id="autoNewTrack" checked> Auto new track on day change</label>
          <label class="control-label"><input type="checkbox" id="autoStops"> Add realistic stops</label>
        </div>
      </div>
      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Time Adjustment</div>
        <div class="control-group">
          <label class="control-label">Shift Current Track</label>
          <div style="display:flex; gap:4px; margin-bottom:4px;">
            <button class="head-btn" onclick="shiftTrackTime(-1,'hour')">-1h</button>
            <button class="head-btn" onclick="shiftTrackTime(1,'hour')">+1h</button>
            <button class="head-btn" onclick="shiftTrackTime(-1,'day')">-1d</button>
            <button class="head-btn" onclick="shiftTrackTime(1,'day')">+1d</button>
          </div>
        </div>
      </div>
      <div class="gpx-drawer-section">
        <div class="gpx-drawer-section-title">Drawing</div>
        <button class="head-btn" onclick="newTrack()">New Track</button>
        <button class="head-btn" id="btnPaintMode" onclick="togglePaintMode()">🎨 Paint</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="gpxFileInput" accept=".gpx,.json" multiple style="display:none" onchange="handleGPXFiles(event)">

<script src="https://unpkg.com/maplibre-gl@5.17.0/dist/maplibre-gl.js"></script>
<script src="/js/datetime-picker.js"></script>
<script src="gpx-generator-v2.js"></script>

</body>
</html>
